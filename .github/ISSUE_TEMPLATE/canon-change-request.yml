# <!-- NEW (Proposed) -->
name: Canon Change Request
description: Request a modification to one of the 12 canonical UIAO documents.
title: "[Canon Change] <Document Number>: <Short Description>"
labels: ["canon", "governance"]
body:
  - type: dropdown
    id: document
    attributes:
      label: Which canonical document?
      options:
        - 00_ControlPlaneArchitecture
        - 01_UnifiedArchitecture
        - 02_CanonSpecification
        - 03_FedRAMP20x_Crosswalk
        - 04_FedRAMP20x_Phase2_Summary
        - 05_ManagementStack
        - 06_ProgramVision
        - 07_LeadershipBriefing
        - 08_ModernizationTimeline
        - 09_CrosswalkIndex
        - 10_DirectoryStructure
        - 11_GlossaryAndDefinitions
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: Describe the proposed change
      description: Provide exact text changes. No summaries.
      placeholder: |
        Section: ...
        Current text: ...
        Proposed text: ...
    validations:
      required: true
  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: Why is this change required?
      placeholder: Reference the governance rule, compliance requirement, or architectural rationale.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact Analysis
      description: List all documents, crosswalks, or artifacts affected by this change.
      placeholder: |
        Affected documents: ...
        Affected crosswalks: ...
        Affected parameters: ...
    validations:
      required: true
