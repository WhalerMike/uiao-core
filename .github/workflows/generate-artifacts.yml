name: Generate Artifacts

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'canon/**'
      - 'data/**'
      - 'templates/**'
      - 'visuals/**'
      - 'src/uiao_core/generators/**'

jobs:
  approve:
    name: Await Production Approval
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Approval granted
        run: echo "Deployment to production approved."

  generate:
    name: Generate and Upload Artifacts
    runs-on: ubuntu-latest
    needs: approve
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608  # v4.1.0

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '24'

      - name: Install Mermaid CLI (mmdc)
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Install Python package
        run: pip install -e ".[dev,visuals]"

      - name: Generate artifacts
        run: uiao generate-artifacts --force-visuals

      - name: Upload exports
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: uiao-exports
          path: exports/
