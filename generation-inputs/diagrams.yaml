# generation-inputs/diagrams.yaml
# Canonical Mermaid diagram definitions for UIAO-Core.
# Auto-generated by generate-diagrams CLI command.
# Each entry is rendered to visuals/<key>.mermaid and assets/images/mermaid/<key>.png.

diagrams:
  architecture_overview:
    type: flowchart
    title: UIAO Architecture Overview
    description: >
      High-level view of the five primary UIAO planes and their interconnections,
      showing how Identity, Addressing, Overlay, Telemetry, and Management planes
      interact within the unified architecture.
    content: |
      flowchart TD
          IP["🔐 Identity Plane\n(AuthN / AuthZ)"]
          AP["📍 Addressing Plane\n(DNS / Service Mesh)"]
          OP["🌐 Overlay Plane\n(Network Fabric / SD-WAN)"]
          TP["📊 Telemetry Plane\n(SIEM / Monitoring)"]
          MP["⚙️ Management Plane\n(Policy / Orchestration)"]

          MP -->|"Governs"| IP
          MP -->|"Governs"| AP
          MP -->|"Governs"| OP
          MP -->|"Governs"| TP
          IP -->|"Token / Assertion"| AP
          AP -->|"Route Resolution"| OP
          OP -->|"Traffic Telemetry"| TP
          TP -->|"Alerts / Feedback"| MP

  authorization_boundary:
    type: flowchart
    title: UIAO Authorization Boundary
    description: >
      Depicts the authorization boundary for UIAO, showing the flow from external
      users through CDN/WAF and the UIAO Gateway, into the Identity Plane, and
      finally to internal services and data stores.
    content: |
      flowchart LR
          EU["👤 External Users"]
          CDN["🛡️ CDN / WAF\n(DDoS / TLS termination)"]
          GW["🔀 UIAO Gateway\n(API Gateway / Load Balancer)"]

          subgraph AuthBoundary["Authorization Boundary"]
              direction TB
              IDP["🔐 Identity Plane\n(Okta / CyberArk)"]
              SVC["⚙️ Internal Services\n(Microservices / APIs)"]
              DS["🗄️ Data Stores\n(Encrypted at rest)"]
              IDP -->|"Authorize"| SVC
              SVC -->|"Queries"| DS
          end

          EU --> CDN
          CDN --> GW
          GW -->|"Authenticate"| IDP

  data_flow:
    type: flowchart
    title: UIAO Data Flow
    description: >
      End-to-end data flow from a user request through authentication,
      policy evaluation, service mesh routing, backend processing, and
      telemetry collection.
    content: |
      flowchart LR
          UR["👤 User Request"]
          AUTH["🔐 Authentication\n(Identity Plane)"]
          PE["📋 Policy Engine\n(OPA / Cedar)"]
          SM["🔀 Service Mesh\n(Envoy / Istio)"]
          BE["⚙️ Backend Services"]
          TC["📊 Telemetry Collection\n(SIEM / Sentinel)"]

          UR -->|"HTTPS"| AUTH
          AUTH -->|"JWT / SAML"| PE
          PE -->|"Permit / Deny"| SM
          SM -->|"mTLS"| BE
          BE -->|"Logs / Metrics"| TC
          TC -->|"Alerts"| AUTH

  uiao_planes:
    type: flowchart
    title: UIAO Seven-Layer Model
    description: >
      All seven UIAO layers / planes and their hierarchical relationships,
      from the physical infrastructure up to the governance layer.
    content: |
      flowchart TD
          L7["🏛️ L7 – Governance & Compliance Plane\n(FedRAMP / NIST / FISMA)"]
          L6["⚙️ L6 – Management Plane\n(Policy / Orchestration / Config)"]
          L5["📊 L5 – Telemetry Plane\n(SIEM / Monitoring / Alerts)"]
          L4["🔐 L4 – Identity Plane\n(AuthN / AuthZ / Zero-Trust)"]
          L3["🌐 L3 – Overlay Plane\n(Network Fabric / SD-WAN / VPN)"]
          L2["📍 L2 – Addressing Plane\n(DNS / Service Discovery)"]
          L1["🖥️ L1 – Infrastructure Plane\n(Compute / Storage / Network HW)"]

          L7 -->|"Policies"| L6
          L6 -->|"Config Push"| L5
          L6 -->|"Config Push"| L4
          L6 -->|"Config Push"| L3
          L6 -->|"Config Push"| L2
          L6 -->|"Config Push"| L1
          L4 -->|"Token Enforcement"| L3
          L2 -->|"Route to"| L1
          L3 -->|"Encapsulates"| L1
          L5 -->|"Feedback Loop"| L6

  generation_pipeline:
    type: flowchart
    title: UIAO Document Generation Pipeline
    description: >
      The automated document generation pipeline showing how canon YAML
      flows through Jinja2 templates to produce Markdown, MkDocs HTML,
      Mermaid PNGs, and finally DOCX/PPTX exports.
    content: |
      flowchart LR
          CY["📄 Canon YAML\n(Single Source of Truth)"]
          J2["📝 Jinja2 Templates\n(templates/*.j2)"]
          MD["📋 Markdown Docs\n(docs/*.md)"]
          MK["🌐 MkDocs HTML\n(GitHub Pages)"]
          MER["🔷 Mermaid Diagrams\n(visuals/*.mermaid)"]
          PNG["🖼️ PNG Images\n(assets/images/mermaid/)"]
          EXP["📦 Exports\n(DOCX / PPTX / OSCAL)"]

          CY -->|"render_template()"| J2
          J2 -->|"build_docs()"| MD
          MD -->|"mkdocs build"| MK
          CY -->|"generate_diagrams_from_canon()"| MER
          MER -->|"render_mermaid_file()"| PNG
          PNG -->|"embed"| EXP
          MD -->|"build_rich_docx()"| EXP

  zero_trust_journey:
    type: flowchart
    title: Zero Trust Maturity Journey
    description: >
      Maturity progression from Traditional Perimeter-based security through
      Enhanced and Optimal stages to Advanced Zero Trust Architecture (ZTA),
      including key milestones at each stage.
    content: |
      flowchart LR
          TP["🏰 Traditional Perimeter\n(Castle-and-Moat)\nVPN + Firewall only"]
          EN["🔒 Enhanced\n(Identity-Aware)\nMFA + SSO + RBAC"]
          OP["✅ Optimal\n(Zero Trust Aligned)\nMicro-seg + ABAC + SIEM"]
          ADV["🚀 Advanced ZTA\n(Continuous Verification)\nAI-driven + FedRAMP 20x"]

          TP -->|"Adopt MFA + IdP"| EN
          EN -->|"Deploy Service Mesh\n+ Policy Engine"| OP
          OP -->|"Continuous Auth\n+ ML Anomaly Detection"| ADV

          TP -.->|"ZTA Milestone 1:\nAsset Inventory"| EN
          EN -.->|"ZTA Milestone 2:\nData Classification"| OP
          OP -.->|"ZTA Milestone 3:\nAutomated Response"| ADV
