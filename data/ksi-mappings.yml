ksi_mappings:
  - ksi_id: KSI-IDENTITY-MFA
    title: Phishing-Resistant MFA Enforcement via Entra ID Conditional Access
    description: >-
      Enforces phishing-resistant MFA for all users via Entra ID Conditional
      Access policies, aligned with CISA Zero Trust Identity pillar requirements
      and M-24-15 mandate.
    control_ids:
      - IA-2
      - IA-5
    evidence_source: Microsoft Entra ID Conditional Access Policy Logs
    status: Implemented

  - ksi_id: KSI-TELEMETRY-VISIBILITY
    title: Continuous Telemetry Collection via Sentinel
    description: >-
      Continuous ingestion and correlation of security telemetry across all
      control planes into Microsoft Sentinel for real-time threat detection,
      audit logging, and automated response.
    control_ids:
      - AU-6
      - SI-4
    evidence_source: Microsoft Sentinel Workspace Analytics Rules
    status: Implemented

  - ksi_id: KSI-NETWORK-SEGMENTATION
    title: Zero Trust Network Segmentation via Cisco SD-WAN
    description: >-
      Software-defined network segmentation enforcing least-privilege traffic
      flows via Cisco SD-WAN overlay fabric with identity-aware policies and
      cryptographic boundary enforcement.
    control_ids:
      - SC-7
      - AC-4
    evidence_source: Cisco Catalyst SD-WAN Policy Configuration Exports
    status: Implemented

  - ksi_id: KSI-ENDPOINT-COMPLIANCE
    title: Endpoint compliance via Intune
    description: >-
      Continuous endpoint compliance validation and automated remediation via
      Microsoft Intune, enforcing configuration baselines, patch currency, and
      device health attestation for all managed endpoints.
    control_ids:
      - CM-2
      - CM-6
    evidence_source: Microsoft Intune Compliance Policy Reports
    status: Partial

  - ksi_id: KSI-DATA-PROTECTION
    title: Data loss prevention and encryption
    description: >-
      Data at rest and in transit encryption enforcement combined with data loss
      prevention policies to protect sensitive federal information across all
      UIAO system boundaries.
    control_ids:
      - SC-28
      - SC-13
    evidence_source: Microsoft Purview DLP Policy Reports and Azure Key Vault Audit Logs
    status: Planned
