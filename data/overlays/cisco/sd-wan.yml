# Cisco SD-WAN Overlay
# Restores Cisco Catalyst SD-WAN-specific details for the Network control plane.
# Remove 'cisco' from data/overlay-config.yml to use generic placeholder names instead.

overlay_meta:
  vendor: cisco
  product: sd-wan
  description: "Cisco Catalyst SD-WAN (Viptela/vManage) network fabric overlay"

control_plane_overrides:
  - id: network
    subtitle: "Cisco Catalyst SD-WAN (Viptela/vManage)"
    components:
      - name: vManage
        role: "Centralized policy engine"
        capabilities:
          - Pushes routing/segmentation/security policies to WAN edges
          - Integrates with identity and telemetry for INR
      - name: vSmart
        role: "Control-plane orchestrator"
        capabilities:
          - OMP route distribution
          - Security and segmentation policy distribution
      - name: vBond
        role: "Secure orchestration"
        capabilities:
          - Secure control-plane connections
          - WAN edge device authentication
      - name: "WAN Edge Devices"
        role: "Enforcement points"
        capabilities:
          - Segmentation and routing enforcement
          - IPSEC/GRE overlay maintenance
          - Telemetry emission

fedramp_alignment_overrides:
  - plane_id: network
    evidence_source: "Cisco Catalyst SD-WAN telemetry + Microsoft INR feed"
