# Microsoft Sentinel Overlay
# Restores Microsoft Sentinel / Splunk SIEM details for the Telemetry control plane.
# Remove 'microsoft' from data/overlay-config.yml to use generic placeholder names instead.

overlay_meta:
  vendor: microsoft
  product: sentinel
  description: "Microsoft Sentinel SIEM/SOAR and associated telemetry sources"

control_plane_overrides:
  - id: telemetry
    components:
      - name: "Splunk / Sentinel"
        role: "Aggregation, correlation, compliance"
      - name: "Azure Monitor / CloudWatch"
        role: "Cloud-native telemetry"
      - name: "ThousandEyes / Riverbed"
        role: "Network path truth"
      - name: "InfoBlox"
        role: "DNS/DHCP/IPAM evidence"
      - name: "Defender / MINR"
        role: "Endpoint truth"

fedramp_alignment_overrides:
  - plane_id: telemetry
    evidence_source: "SIEM correlated feeds (Splunk/Sentinel + SD-WAN + Entra)"
