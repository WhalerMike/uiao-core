perimeter_collapse:
  narrative: "The transition from TIC 2.2 to UIAO involves the strategic decommissioning of physical hardware silos in favor of a software-defined identity plane."
  transitions:
    - category: "Connectivity"
      legacy: "MTIPS / Hub-and-Spoke (Centralized Circuit Bottlenecks)"
      uiao: "Cisco SD-WAN Overlay with Direct Internet Access (DIA)"
      impact: "Eliminates circuit-based latency and MTIPS hair-pinning."
    - category: "Enforcement"
      legacy: "Static Physical PEPs (Hardware Firewalls & IDS Silos)"
      uiao: "Distributed PEPs (Virtual Security & Trust Zone Boundaries)"
      impact: "Moves protection to the data/user boundary (TIC 3.0 Zones)."
    - category: "Trust Model"
      legacy: "Location-Based Trust (On-Prem = Trusted)"
      uiao: "Cryptographically Proven Identity (mTLS & FIDO2)"
      impact: "Prevents lateral movement; zero implicit network trust."
    - category: "Routing"
      legacy: "Static MPLS Hairpinning to Data Centers"
      uiao: "Dynamic Microsoft INR (Internet Routing) Optimization"
      impact: "Optimizes path performance for Cloud/SaaS-heavy workloads."
