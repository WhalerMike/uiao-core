# Microsoft vendor overlay for UIAO-Core
#
# Apply this overlay to replace generic abstract component names with
# Microsoft Entra ID-specific values in all generated OSCAL artifacts.
#
# Merge behavior:
#   - dicts  -> deep-merged (overlay values override base/canon)
#   - lists  -> appended then deduplicated (overlay items appended)
#   - scalars -> overlay wins
#
# Usage:
#   Place this file in data/vendor-overlays/ and it will be automatically
#   applied by load_context().  Remove or rename to disable.

control_planes:
  identity_provider:
    name: Microsoft Entra ID
    vendor: Microsoft
    abstract_type: IdentityProvider
    capabilities:
      - SSO
      - MFA
      - SCIM
      - Conditional Access
      - Privileged Identity Management

nist_mappings:
  IA-2: "Microsoft Entra ID MFA and phishing-resistant authentication"
  IA-5: "Microsoft Entra ID password and credential policies"
  AC-2: "Microsoft Entra ID account lifecycle and provisioning"
  AC-7: "Microsoft Entra ID Smart Lockout configuration"
  AC-12: "Microsoft Entra ID token lifetime and session controls"
  IA-8: "Microsoft Entra ID external identity federation"

evidence_sources:
  - name: Microsoft Entra ID Conditional Access Policy
    type: api
    endpoint: /identity/conditionalAccess/policies
  - name: Microsoft Entra ID Authentication Methods
    type: api
    endpoint: /policies/authenticationMethodsPolicy
  - name: Microsoft Entra ID Sign-In Logs
    type: siem_feed
    destination: Microsoft Sentinel
