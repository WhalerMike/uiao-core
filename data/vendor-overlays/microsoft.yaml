# Microsoft / Cisco vendor overlay for UIAO-Core
#
# Apply this overlay to replace the generic abstract component names with
# Microsoft Entra ID / Cisco-specific values in all generated OSCAL artifacts.
#
# Merge behavior:
#   - dicts  → deep-merged (overlay values override base/canon)
#   - lists  → appended then deduplicated (overlay items appended)
#   - scalars → overlay wins
#
# Usage:
#   Place this file in data/vendor-overlays/ and it will be automatically
#   applied by load_context().  Remove or rename to disable.

control_planes:
  identity_provider:
    name: Microsoft Entra ID
    vendor: Microsoft
    abstract_type: IdentityProvider
    capabilities:
      - SSO
      - MFA
      - SCIM
      - Conditional Access
      - Privileged Identity Management

  network_edge:
    name: Cisco Secure Access (formerly Umbrella / Duo)
    vendor: Cisco
    abstract_type: NetworkEdge
    capabilities:
      - ZTNA
      - SWG
      - CASB
      - DNS-layer Security
      - Duo MFA

  dns_ipam:
    name: InfoBlox DDI
    vendor: InfoBlox
    abstract_type: DNSProvider
    capabilities:
      - DNS
      - DHCP
      - IPAM
      - DNSSEC
      - Threat Intelligence
