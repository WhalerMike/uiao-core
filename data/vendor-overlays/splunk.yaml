# Splunk SIEM vendor overlay for UIAO-Core
#
# Apply this overlay to replace the generic abstract component names with
# Splunk-specific values in all generated OSCAL artifacts.
#
# Merge behavior:
#   - dicts  -> deep-merged (overlay values override base/canon)
#   - lists  -> appended then deduplicated (overlay items appended)
#   - scalars -> overlay wins
#
# Usage:
#   Place this file in data/vendor-overlays/ and it will be automatically
#   applied by load_context().  Remove or rename to disable.

control_planes:
  siem:
    name: Splunk Enterprise Security
    vendor: Splunk
    abstract_type: SIEM
    fedramp_families:
      - AU
      - SI
    capabilities:
      - Log Aggregation
      - Correlation Rules
      - SOAR Integration
      - Threat Intelligence
      - Compliance Dashboards
      - Real-time Alerting
      - Custom Search Processing Language (SPL)
      - FedRAMP Audit Log Retention
