# Palo Alto Networks vendor overlay for UIAO-Core
#
# Apply this overlay to replace generic firewall/NGFW abstract component names
# with Palo Alto Networks Panorama / PAN-OS-specific values in all generated
# OSCAL artifacts.
#
# Slot: Network (Slot #2 sub-overlay alongside Cisco SD-WAN)
# Role: NGFW / Firewall / Micro-Segmentation
#
# Merge behavior:
#   - dicts  -> deep-merged (overlay values override base/canon)
#   - lists  -> appended then deduplicated (overlay items appended)
#   - scalars -> overlay wins
#
# Usage:
#   Place this file in data/vendor-overlays/ and it will be automatically
#   applied by load_context().  Remove or rename to disable.

control_planes:
  network_firewall:
    name: Palo Alto Networks NGFW
    vendor: Palo Alto Networks
    abstract_type: NGFWProvider
    management: Panorama
    capabilities:
      - Next-Generation Firewall (NGFW)
      - App-ID Application Identification
      - Threat Prevention (IPS / Anti-Malware)
      - URL Filtering
      - SSL/TLS Decryption
      - Micro-Segmentation (Zone-Based Policy)
      - WildFire Sandbox Analysis
      - GlobalProtect VPN

nist_mappings:
  SC-7:
    description: "Palo Alto NGFW boundary protection with deny-by-default zone policy"
    role: "Perimeter firewall and zone-based segmentation (primary)"
    shared_with: "cisco (SD-WAN fabric segmentation), crowdstrike (endpoint lateral movement)"
  AC-4:
    description: "Palo Alto App-ID information flow enforcement between security zones"
    role: "App-ID zone-based flow enforcement (primary for perimeter)"
    shared_with: "cisco (application-aware SD-WAN routing)"
  SI-3:
    description: "Palo Alto Threat Prevention engine for malicious code protection"
    role: "Network-layer IPS and anti-malware (perimeter)"
    shared_with: "crowdstrike (endpoint malware prevention)"
  SI-4:
    description: "Palo Alto NGFW traffic inspection and IPS monitoring"
    role: "NGFW traffic inspection and threat detection (primary for perimeter)"
    shared_with: "cisco (network DPI), crowdstrike (endpoint EDR), cyberark (privileged session analytics), infoblox (DNS threat intel)"
  SC-8:
    description: "Palo Alto SSL/TLS decryption and re-encryption for traffic inspection"
    role: "SSL/TLS inspection at perimeter"
    shared_with: "cisco (mTLS inter-segment transport encryption)"
  AU-3:
    description: "Palo Alto traffic and threat log generation with full session detail"
    role: "Firewall traffic and threat log generation (contributing)"
    shared_with: "infoblox (DNS query logs), splunk (log aggregation), cyberark (session audit)"
  SC-7(5): "Palo Alto deny-by-default with explicit allow for managed interfaces"
  SI-3(7): "Palo Alto WildFire cloud-based sandbox for zero-day analysis"

evidence_sources:
  - name: Palo Alto Panorama Security Policy Export
    type: api
    endpoint: /restapi/v10.2/Policies/SecurityRules
  - name: Palo Alto Traffic and Threat Logs
    type: siem_feed
    destination: Splunk / Microsoft Sentinel
  - name: Palo Alto WildFire Verdicts
    type: api
    endpoint: /publicapi/get/verdict
  - name: Palo Alto GlobalProtect Gateway Logs
    type: siem_feed
    destination: Splunk / Microsoft Sentinel
