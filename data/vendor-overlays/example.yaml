# Example vendor overlay
#
# This file is an example overlay that can be merged on top of the base generation-inputs/data
# to swap vendor-specific implementations while keeping the same abstract keys.
#
# Merge behavior (intended):
# - dicts: deep-merged (overlay values override base)
# - lists: appended/merged (overlay items appended)

control_planes:
  identity_provider:
    name: Okta Workforce Identity
    vendor: Okta
    capabilities:
      - SSO
      - MFA
      - SCIM

  network_edge:
    name: Palo Alto Prisma Access
    vendor: Palo Alto Networks
    capabilities:
      - ZTNA
      - SWG
      - CASB
