# Cisco vendor overlay for UIAO-Core
#
# Apply this overlay to replace generic network abstract component names with
# Cisco Catalyst SD-WAN-specific values in all generated OSCAL artifacts.
#
# Merge behavior:
#   - dicts  -> deep-merged (overlay values override base/canon)
#   - lists  -> appended then deduplicated (overlay items appended)
#   - scalars -> overlay wins
#
# Usage:
#   Place this file in data/vendor-overlays/ and it will be automatically
#   applied by load_context().  Remove or rename to disable.

control_planes:
  network_overlay:
    name: Cisco Catalyst SD-WAN
    vendor: Cisco
    abstract_type: SDWANProvider
    capabilities:
      - SD-WAN Fabric Orchestration
      - mTLS Inter-Segment Encryption
      - Application-Aware Routing
      - Secure Access (ZTNA / SWG / CASB)
      - DNS-layer Security
      - Duo MFA Integration

nist_mappings:
  SC-8:
    description: "Cisco Catalyst SD-WAN mTLS enforcement on all inter-segment traffic"
    role: "Transport encryption (inter-segment mTLS)"
    shared_with: "paloalto (SSL/TLS inspection at perimeter)"
  SC-7:
    description: "Cisco SD-WAN micro-segmentation with deny-by-default policy"
    role: "SD-WAN fabric segmentation (overlay layer)"
    shared_with: "paloalto (perimeter firewall zones), crowdstrike (endpoint lateral movement)"
  AC-4:
    description: "Cisco SD-WAN application-aware information flow enforcement"
    role: "Application-aware routing and flow control"
    shared_with: "paloalto (App-ID zone-based enforcement)"
  SC-23: "Cisco Secure Access session authenticity via ZTNA broker"
  SI-4:
    description: "Cisco SD-WAN DPI and flow telemetry for network monitoring"
    role: "Network-layer DPI and flow telemetry (contributing)"
    shared_with: "paloalto (NGFW inspection), crowdstrike (endpoint EDR), cyberark (privileged session analytics), infoblox (DNS threat intel)"

evidence_sources:
  - name: Cisco Catalyst SD-WAN Security Policy
    type: api
    endpoint: /dataservice/template/policy/security
  - name: Cisco SD-WAN mTLS Policy Configuration
    type: export
    format: JSON
  - name: Cisco Secure Access ZTNA Logs
    type: siem_feed
    destination: Splunk / Microsoft Sentinel
