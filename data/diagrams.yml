# UIAO-Core Modernization Atlas: Diagram Library
# These strings are injected into Jinja2 templates via generate.py

unified_arch: |
  graph TD
    subgraph "Identity Plane (The 'Who')"
      A[Azure AD / Cisco ISE] -->|SGT / Identity Tags| D{Policy Engine}
    end
    subgraph "Addressing Plane (The 'Where')"
      B[Infoblox IPAM] -->|IP Scopes / VLANs| D
    end
    subgraph "Overlay Plane (The 'How')"
      D -->|Fabric Assignment| E[Cisco Catalyst Center]
      E -->|VXLAN Encapsulation| F[Edge Switch Port]
    end
    subgraph "Telemetry Control Plane (Observation)"
      G[Splunk / Azure Monitor] -.->|Real-time Feedback| D
      G -.->|Audit Logs| E
    end
    style D fill:#f96,stroke:#333,stroke-width:2px
    style F fill:#bbf,stroke:#333,stroke-width:2px

vendor_logic: |
  flowchart LR
    YAML[(program.yml)] --> Python[generate.py Logic]
    subgraph "Logic Processing"
      Python --> RegEx[Hyphen-to-Underscore Translation]
      RegEx --> Jinja[Jinja2 Templates]
    end
    Jinja -->|Output 1| Cisco[Cisco CLI / API Config]
    Jinja -->|Output 2| Blox[Infoblox WAPI Calls]
    Jinja -->|Output 3| Azure[Azure VNet/NSG Rules]
    style YAML fill:#dfd
    style Jinja fill:#ffd

appendix_library: |
  graph LR
    subgraph "Data Source: appendices.yml"
      A[Group A-Z: Core Standards]
      B[Group AA-AZ: Network Patterns]
      C[Group BA-BZ: Security Protocols]
      D[Group CA-CZ: Operational Procedures]
    end
    subgraph "Processing: generate.py"
      Logic{Jinja2 Renderer}
      Logic -->|Lookup ID| A
      Logic -->|Lookup ID| B
      Logic -->|Lookup ID| C
      Logic -->|Lookup ID| D
    end
    subgraph "Output: site/ Documentation"
      Doc1[Appendix A: Global Naming]
      Doc2[Appendix AZ: SD-WAN Edge]
      Doc3[Appendix CZ: Decommissioning]
    end
    Logic --> Doc1
    Logic --> Doc2
    Logic --> Doc3
    style Logic fill:#f9f,stroke:#333,stroke-width:2px
    style A,B,C,D fill:#e1f5fe,stroke:#01579b

multi_plane_integration: |
  graph TB
    subgraph "Telemetry Control Plane (Visibility)"
      direction TB
      S[Splunk / Azure Monitor]
      IB[Infoblox Ecosystem]
    end
    subgraph "Identity Plane"
      ID[Azure AD / Cisco ISE]
    end
    subgraph "Network & Addressing Plane"
      IP[IPAM Scopes]
      SD[Cisco Catalyst Center]
    end
    ID -- "Auth Events" --> S
    IP -- "Lease Data" --> S
    SD -- "Flow Logs / SNMP" --> S
    S -- "Threat Alerts" --> ID
    S -- "Performance Signals" --> SD
    IB -- "DNS Analytics" --> S
    classDef telemetry fill:#f1f8e9,stroke:#558b2f,stroke-width:2px;
    classDef feedback stroke-dasharray: 5 5;
    class S,IB telemetry;

jinja_normalization: |
  flowchart TD
    A[(program.yml / appendices.yml)] -->|Key: 'site-location'| B[generate.py Load]
    B --> C{Normalization Filter}
    C -->|Regex: s/-/_/g| D[Key: 'site_location']
    subgraph "Jinja2 Context"
      D --> E{Render Template}
      F[template.j2] --> E
    end
    E -->|Success| G[site/config.txt]
    E -->|Failure: Hyphen detected| H[Jinja2 UndefinedError]
    style C fill:#fff3e0,stroke:#ef6c00
    style D fill:#e8f5e9,stroke:#2e7b32

# --- Gemini Phase 2 Diagrams (Added 2026-03-21) ---

mission_tech_mapping: |
  graph LR
    subgraph "Technical Planes (The 'How')"
        IP[Identity Plane<br/>(Azure AD / ISE)]
        AP[Addressing Plane<br/>(Infoblox IPAM)]
        OP[Overlay Plane<br/>(SD-Access / SD-WAN)]
        TP[Telemetry Plane<br/>(Splunk / Azure Mon)]
    end
    subgraph "Strategic Outcomes (The 'Why')"
        Agility(Reduced Time-to-Site)
        Security(Enhanced Cybersecurity<br/>Posture)
        Compliance(Audit Compliance<br/>& Visibility)
    end
    IP -->|Zero Trust Policy| Security
    AP -->|Automated Provisioning| Agility
    OP -->|Macro/Micro Segmentation| Security
    OP -->|Pre-staged Configs| Agility
    TP -->|Closed-Loop Feedback| Security
    TP -->|Continuous Compliance| Compliance
    classDef outcome fill:#e1f5fe,stroke:#01579b,stroke-width:2px;
    class Agility,Security,Compliance outcome;

schema_validation_flow: |
  flowchart TD
    A[(appendices.yml)] --> B[Git Commit / PR]
    subgraph "CI/CD Pipeline (GitHub Actions)"
        B --> C[Fetch PR Data]
        D[[Load schema.json]] --> E{Validate Data<br/>against Schema}
        C --> E
        E -->|Pass| F[Pipeline Success]
        E -->|Fail| G[Pipeline Failure]
    end
    G -->|Alert| H[Developer Check<br/>Required Fields / Formats]
    F --> I[Execute generate.py]
    I --> J[Publish Modernization Atlas]
    style E fill:#fff3e0,stroke:#ef6c00,stroke-width:2px
    style G fill:#ffcdd2,stroke:#c62828
    style F fill:#c8e6c9,stroke:#2e7b32

mkdocs_site_map: |
  graph TD
    Home[Home (Executive Summary)]
    Home --> Arch[1. Unified Architecture]
    Home --> Library[2. Appendix Canon]
    Home --> Ops[3. Telemetry Control]
    Home --> Dev[4. Pipeline Logic]
    Arch --> A_Flow[1.1 Architecture Flow]
    Arch --> A_Mission[1.2 Mission Mapping]
    Library --> L_Index[2.1 Index (A-CZ)]
    Library --> L_Search[2.2 Site-Wide Search]
    Ops --> O_Integrate[3.1 Multi-Plane Integration]
    Ops --> O_Dashboard[3.2 Real-time Dashboard]
    style Home fill:#f9f,stroke:#333,stroke-width:2px
    style Library,Ops fill:#bbf,stroke:#333

executive_dashboard_status: |
  graph LR
    subgraph "Deployment Status"
        CI_CD(CI/CD Pipeline)
        Docs(Automation Scripts)
    end
    subgraph "Executive Readiness Gaps"
        App_Canon(Appendix Canon<br/>Content)
        Mission(Mission-to-Tech<br/>Mapping)
        MkDocs(Static Site<br/>UI/UX)
        Validation(Data Schema<br/>Validation)
    end
    CI_CD --- Docs
    classDef complete fill:#c8e6c9,stroke:#2e7b32,stroke-width:2px;
    classDef partial fill:#fff3e0,stroke:#ef6c00,stroke-width:2px;
    classDef blocked fill:#ffcdd2,stroke:#c62828,stroke-width:2px;
    class CI_CD,Docs,Mission complete;
    class App_Canon,MkDocs partial;
    class Validation blocked;

legacy_vs_modernized_comparison: |
  graph TB
    subgraph "LEGACY STATE (Manual, Siloed, Fragile)"
        L_ID[Siloed Identity<br/>AD/On-Prem]
        L_AM[Manual IPAM<br/>Excel Spreadsheets]
        L_OP[Static Overlay<br/>Fixed VLANs/Complex ACLs]
        L_TM[Fragmented Telemetry<br/>Reactive/Manual Logs]
        L_ID -.-> L_AM
        L_AM -.-> L_OP
        L_OP -.-> L_TM
        classDef legacy fill:#ffcdd2,stroke:#c62828,stroke-width:2px;
        class L_ID,L_AM,L_OP,L_TM legacy;
    end
    ModernizationAtlas[Modernization Atlas<br/>(uiao-core)] -->|Automation| uiao_model
    subgraph "MODERNIZED STATE (uiao-core Unified Model)"
        direction TB
        subgraph Planes
            direction LR
            ID[Identity Plane<br/>Unified Azure/ISE]
            AM[Addressing Plane<br/>Automated Infoblox]
            OP[Overlay Plane<br/>Programmable SDA/SDWAN]
        end
        TM[Telemetry Plane<br/>Proactive/Closed-Loop]
        ID <--> TM
        AM <--> TM
        OP <--> TM
        classDef modernized fill:#c8e6c9,stroke:#2e7b32,stroke-width:2px;
        class ID,AM,OP,TM modernized;
    end
    style ModernizationAtlas fill:#fff3e0,stroke:#ef6c00,stroke-width:2px

implementation_roadmap: |
  graph LR
    Start(Project Kickoff) --> P1
    subgraph P1[PHASE 1 (Foundations)]
        direction TB
        M1[CI/CD Workflow Optimized]
        M2[generate.py Initialized]
        M3[Core Appendices A-G Drafted]
        style P1 fill:#e3f2fd,stroke:#1565c0,stroke-width:2px;
    end
    P1 --> Milestone1{Q4 2025: Atlas Live}
    Milestone1 --> P2
    subgraph P2[PHASE 2 (Plane Integration)]
        direction TB
        M4[Identity & Addressing Plane Linked]
        M5[Splunk Telemetry Anchored]
        M6[Security Appendices BA-BZ Drafted]
        style P2 fill:#fff3e0,stroke:#ef6c00,stroke-width:2px;
    end
    P2 --> Milestone2{Q2 2026: End-to-End Visibility}
    Milestone2 --> P3
    subgraph P3[PHASE 3 (Overlay & Scale)]
        direction TB
        M7[SDA Fabric Automation Deployed]
        M8[Full GitOps Integration]
        M9[Operational Appendices CA-CZ Drafted]
        style P3 fill:#c8e6c9,stroke:#2e7b32,stroke-width:2px;
    end
    P3 --> Milestone3{Q4 2026: Executive Ready & Modernized}
    classDef milestone fill:#f9f,stroke:#333,stroke-width:1px;
    class Milestone1,Milestone2,Milestone3 milestone;

regional_scaling_model: |
  graph TD
    Library[(Appendix Canon<br/>Single Source of Truth)]
    subgraph Core[Pattern A: Standard Naming & Identity]
        direction LR
        A1[Appendix A-01]
        A2[Appendix BA-01]
    end
    Library --> Core
    subgraph Scale
        direction LR
        subgraph SmallBranch[1. Regional Office<br/>(Small Scale)]
            S1[2 Edge Nodes]
            S2[1 ISE Policy]
        end
        subgraph RegionalHub[2. Regional Hub<br/>(Medium Scale)]
            RM1[10 Edge Nodes]
            RM2[4 Fabric Nodes]
            RM3[2 ISE Policies]
        end
        subgraph Datacenter[3. Agency DC<br/>(Large Scale)]
            L1[50 Edge Nodes]
            L2[12 Fabric Nodes]
            L3[8 ISE Policies]
            L4[Full Telemetry Stack]
        end
    end
    Core ==>|Apply Same Pattern| SmallBranch
    Core ==>|Apply Same Pattern| RegionalHub
    Core ==>|Apply Same Pattern| Datacenter
    classDef pattern fill:#e1f5fe,stroke:#01579b,stroke-width:2px;
    class Core pattern;
    classDef scale fill:#f1f8e9,stroke:#558b2f;
    class SmallBranch,RegionalHub,Datacenter scale;
