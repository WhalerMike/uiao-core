# NIST SP 800-53 Rev 5 Control Narrative
# Control: IA-2 — Identification and Authentication (Organizational Users)
# Schema: control-library v1.0

control_id: IA-2
title: "Identification and Authentication (Organizational Users)"
status: implemented
family: IA

narrative: |
  {{ organization.name }} uniquely identifies and authenticates all organizational
  users prior to granting access to any system resource. Multi-factor authentication
  (MFA) is enforced for all accounts in accordance with {{ parameters.mfa-requirement }}.

  The IdentityProvider role is fulfilled by the CyberArk Identity Vault, which serves
  as the primary identity and credential management platform. CyberArk Identity Vault
  enforces phishing-resistant MFA mechanisms — including FIDO2 hardware security keys
  and PIV/CAC smart cards — for all privileged accounts and for all users accessing
  high-value assets. Conditional access policies within CyberArk Identity Vault ensure
  that non-privileged accounts are also subject to phishing-resistant MFA.

  The PIVAuthenticationService role is fulfilled by the Federal PIV/CAC Trust Chain.
  PIV and CAC enforcement for federal personnel is managed through the Federal PIV/CAC
  Trust Chain, which validates certificate chains against the Federal PKI (FPKI) trust
  anchor using OCSP and CRL revocation checks. All federal personnel accessing federal
  systems must authenticate using a valid PIV or CAC credential issued by a certified
  Federal PKI issuer.

  Shared or group accounts are prohibited; every user is assigned a unique identifier
  that cannot be reused across the system lifecycle.

  Authentication-related security findings are subject to SLA-based remediation timelines:
    - Critical: remediated or mitigated within 15 days of discovery
    - High: remediated or mitigated within 30 days of discovery

implemented_by:
  - IdentityProvider
  - PIVAuthenticationService

parameters:
  - id: mfa-requirement
    value: "Phishing-resistant MFA (FIDO2 / PIV / CAC) for all accounts"
  - id: piv-requirement
    value: "PIV/CAC required for all federal personnel and privileged users"
  - id: critical-sla-days
    value: 15
  - id: high-sla-days
    value: 30

evidence:
  - mfa-enrollment-report

references:
  - NIST SP 800-53 Rev 5, IA-2
  - M-22-09 (Zero Trust Strategy)
  - M-24-15 (Phishing-Resistant MFA)
  - FIPS 201-3 (PIV Standard)
