narrative: |
  **Information Sharing Governance and Classification**
  The organization employs Microsoft Purview Information Protection to
  enforce information sharing decisions based on data classification and
  sensitivity labeling. All organizational documents and data objects are
  classified using Purview sensitivity labels that define permitted sharing
  actions — including restrictions on forwarding, copying, and external
  distribution. Sensitivity labels are automatically applied based on
  content inspection policies and manually applied by data owners,
  ensuring that sharing decisions align with **AC-3** (Access Enforcement)
  and the data classification requirements of **RA-2** (Security
  Categorization).

  **Technical Enforcement of Sharing Boundaries**
  Entra ID Conditional Access policies enforce cross-tenant sharing
  restrictions through B2B collaboration controls, ensuring that external
  recipients satisfy MFA requirements per **PARAM-IAM-001** and device
  compliance verification before accessing shared organizational content.
  Microsoft Purview Data Loss Prevention (DLP) policies monitor and block
  unauthorized sharing of sensitive information across email, Teams,
  SharePoint, and OneDrive channels. Palo Alto NGFW provides network-layer
  DLP inspection for data in transit, preventing exfiltration of
  classified content through unapproved channels in support of **AC-4**
  (Information Flow Enforcement) and **SC-7** (Boundary Protection).

  **Formal Sharing Agreements and Audit Trail**
  All information sharing arrangements with external organizations are
  documented through formal Interconnection Security Agreements (ISAs)
  managed in ServiceNow ITSM, subject to annual review by the ISSO.
  Sharing activity is logged to Microsoft Sentinel for continuous
  monitoring, supporting **AU-2** (Event Logging) and **AU-6** (Audit
  Record Review) requirements. Unauthorized sharing attempts trigger
  automated alerts for incident response per **IR-4**.

