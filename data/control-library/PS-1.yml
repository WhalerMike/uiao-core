narrative: |
  **Policy Overview**
  The organization develops, documents, and disseminates a
  personnel security policy that addresses purpose, scope, roles,
  responsibilities, management commitment, coordination among
  organizational entities, and compliance. The policy establishes
  the framework for position categorization, screening, access
  agreements, termination, and transfer processes for the UIAO
  system.

  **Policy Maintenance**
  The personnel security policy is approved by the ISSM and
  reviewed at least annually (PARAM-PS-001-001). The policy is
  maintained in the SharePoint Policy Library with version
  control. Policy updates trigger redistribution to all
  personnel with HR and security responsibilities
  (PARAM-PS-001-002) with acknowledgment tracking through
  ServiceNow.

  **Procedures**
  The organization maintains procedures for position risk
  designation, personnel screening, access agreements,
  personnel termination, personnel transfer, and third-party
  personnel security. Procedures align with OPM guidance and
  are reviewed annually.

  **Governance Integration**
  The personnel security policy is integrated into the UIAO
  governance framework and supports the overall risk management
  strategy under PM-9.
