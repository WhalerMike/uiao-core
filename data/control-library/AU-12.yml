# AU-12 - Audit Record Generation
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: Audit and Accountability (AU)
# Last Reviewed: 2025-06-15

control_id: AU-12
family: Audit and Accountability
title: Audit Record Generation
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **System-Wide Audit Record Generation**
  The UIAO platform generates audit records for all auditable events
  defined in **AU-2** (Event Logging) across every information system
  component. Microsoft Sentinel serves as the centralized audit
  collection platform, receiving structured audit records from Azure
  Active Directory (Entra ID), Microsoft 365 workloads, CrowdStrike
  Falcon EDR sensors, Palo Alto NGFW appliances, and CyberArk
  Privileged Access Security. Each audit record includes the event
  type, timestamp, source, subject identity, outcome, and associated
  network metadata to satisfy content requirements under **AU-3**
  (Content of Audit Records).

  **Distributed Generation Across Platform Components**
  Audit generation is enabled at every architectural tier. Azure
  platform diagnostic settings export resource-level audit logs to
  the centralized Log Analytics workspace. CrowdStrike Falcon sensors
  generate endpoint audit records for process execution, file system
  changes, network connections, and registry modifications across all
  managed endpoints. Palo Alto NGFW generates traffic, threat, URL
  filtering, and WildFire analysis logs for all network transactions
  traversing organizational boundaries. Cisco SD-WAN edge devices
  generate session, routing, and tunnel audit records for all branch
  and remote site connectivity.

  **Authorized Configuration of Audit Generation**
  The selection of auditable events and audit record generation
  configuration is managed by authorized security personnel through
  change-controlled processes in ServiceNow ITSM. Modifications to
  audit logging configurations require ISSO approval and are tracked
  as configuration changes under **CM-3** (Configuration Change
  Control). Audit generation coverage is validated quarterly as part
  of the continuous monitoring program, supporting **AU-3** (Content
  of Audit Records) and **CA-7** (Continuous Monitoring) requirements.

related_controls:
  - AU-2   # Event Logging
  - AU-3   # Content of Audit Records
  - AU-5   # Response to Audit Logging Process Failures
  - CA-7   # Continuous Monitoring
  - CM-3   # Configuration Change Control
  - SI-4   # System Monitoring

automation:
  tool: Microsoft Sentinel
  method: Diagnostic settings, CEF/Syslog connectors, API ingestion
  frequency: continuous
  evidence_artifact: sentinel-audit-generation-dashboard
