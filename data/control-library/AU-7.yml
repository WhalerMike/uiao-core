# AU-7 - Audit Record Reduction and Report Generation
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: Audit and Accountability (AU)
# Last Reviewed: 2025-06-15

control_id: AU-7
family: Audit and Accountability
title: Audit Record Reduction and Report Generation
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Audit Reduction and Analytical Capabilities**
  The UIAO platform provides comprehensive audit record reduction and
  report generation capabilities through Microsoft Sentinel as the
  centralized SIEM and analytics platform. Sentinel workbooks and
  Kusto Query Language (KQL) analytics rules enable security analysts
  to filter, correlate, and reduce large volumes of audit data from
  Azure Active Directory (Entra ID), CrowdStrike Falcon EDR, Palo
  Alto NGFW, CyberArk Privileged Access Security, and Cisco SD-WAN
  into actionable intelligence. Predefined and custom queries support
  on-demand investigation of security events, privileged access
  activity, and policy violations aligned with **AU-6** (Audit
  Record Review, Analysis, and Reporting) requirements.

  **Automated Report Generation and Distribution**
  Microsoft Sentinel provides automated report generation through
  scheduled workbooks, Logic App playbooks, and Power BI integration
  for executive and operational security reporting. Standard reports
  include privileged access summaries from CyberArk PSM sessions,
  authentication anomaly reports from Entra ID, endpoint threat
  summaries from CrowdStrike Falcon, and network security posture
  reports from Palo Alto Panorama. Reports are generated on daily,
  weekly, and monthly schedules and distributed to designated security
  personnel through automated email notifications managed by Logic
  Apps.

  **Preservation of Original Audit Content**
  The audit reduction and report generation capability does not alter
  the original content or time ordering of audit records. All raw
  audit data is preserved in the Log Analytics workspace with
  immutable storage policies enforced through Azure Storage lifecycle
  management. Reduced datasets and generated reports reference the
  original audit records, maintaining full traceability to source
  events. This approach supports **AU-9** (Protection of Audit
  Information) and **AU-11** (Audit Record Retention) requirements
  by ensuring original records remain unmodified throughout the
  retention period.

