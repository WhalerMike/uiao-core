# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : AC-22
# Title      : Publicly Accessible Content
# Schema     : data/control-library (uiao-core canonical format)

control_id: AC-22
title: Publicly Accessible Content
family: Access Control
status: implemented

implemented_by:
  - entra-id
  - microsoft-purview
  - servicenow-itsm

evidence:
  - public-content-review-authorization-records
  - purview-sensitivity-label-public-content-policy
  - servicenow-content-publication-approval-workflow

parameters:
  - id: ac_22_public_content_review_frequency
    description: >-
      Frequency at which the organization reviews information available
      on publicly accessible systems for nonpublic content.
    value: "Quarterly review by designated content authorizing officials"
  - id: ac_22_authorized_posting_personnel
    description: >-
      Organizational personnel authorized to post information onto
      publicly accessible systems.
    value: "Public Affairs Officer and designated content managers only"

narrative: |
  **Designated Content Authorization and Publication Controls**
  The organization designates individuals authorized to post information
  onto publicly accessible organizational systems and trains those
  individuals to ensure that publicly accessible content does not contain
  nonpublic information. All public content publication requests are
  routed through a ServiceNow ITSM approval workflow requiring sign-off
  by the Public Affairs Officer before content is made externally
  available. Microsoft Purview sensitivity labels are enforced to prevent
  documents classified above the public tier from being posted to
  external-facing systems, directly supporting **AC-3** (Access
  Enforcement) and **AC-21** (Information Sharing).

  **Automated Content Classification Review**
  Microsoft Purview content inspection policies automatically scan
  documents and data objects destined for public-facing repositories,
  flagging or blocking content that matches sensitivity patterns for
  Controlled Unclassified Information (CUI), Personally Identifiable
  Information (PII), or other nonpublic data categories. Entra ID
  Conditional Access policies restrict publication permissions to
  authorized content managers, ensuring that only vetted personnel can
  modify publicly accessible content in alignment with **AC-6** (Least
  Privilege) and **IA-2** (Identification and Authentication).

  **Periodic Review and Remediation**
  The organization conducts quarterly reviews of all publicly accessible
  content to verify that no nonpublic information has been inadvertently
  posted. Review findings are documented in ServiceNow and any identified
  nonpublic content is immediately removed by authorized personnel. All
  content publication and review activities are logged to Microsoft
  Sentinel, supporting **AU-2** (Event Logging) and **SI-4** (System
  Monitoring) continuous monitoring requirements.

related_controls:
  - AC-3   # Access Enforcement
  - AC-6   # Least Privilege
  - AC-21  # Information Sharing
  - AU-2   # Event Logging
  - IA-2   # Identification and Authentication
