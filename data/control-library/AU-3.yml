parameters:
  - id: au_3_audit_record_content
    description: >-
      Required fields captured in each audit record to support
      after-the-fact investigation of security incidents.
    value: >-
      What (event type), when (timestamp), where (source/destination),
      who (user identity), outcome (success/failure), source IP,
      target resource, session ID

narrative: |
  **Standardized Audit Record Content**
  The organization ensures that audit records contain sufficient
  information to establish what type of event occurred, when the event
  occurred, where the event occurred, the source of the event, the
  outcome of the event, and the identity of any individuals, subjects,
  or objects associated with the event. Microsoft Sentinel ingests
  structured audit data from all organizational data sources using
  standardized schemas that capture event type, UTC timestamp, source
  and destination addresses, authenticated user principal name, event
  outcome (success/failure), session identifier, and target resource
  path. This comprehensive record content supports **AU-6** (Audit
  Record Review) and **IR-4** (Incident Handling) forensic analysis.

  **Identity and Network Layer Audit Content**
  Entra ID sign-in and audit logs capture rich identity context
  including user principal name, device compliance state, Conditional
  Access policy evaluation results, MFA method used, risk level, and
  application accessed. Palo Alto NGFW traffic and threat logs capture
  source/destination IP, port, application identification via App-ID,
  URL category, threat signature, and user identity via User-ID
  integration. Splunk normalizes all ingested data to the Common
  Information Model (CIM) for consistent cross-source correlation,
  supporting **SI-4** (System Monitoring) and **AU-2** (Event Logging).

  **Audit Content Integrity and Completeness**
  All audit record schemas are validated during initial connector
  configuration and periodically reviewed to ensure required fields
  are populated. Missing or malformed audit records trigger automated
  alerts in Sentinel, ensuring completeness of the audit trail.
  Audit content requirements are maintained in alignment with FedRAMP
  Moderate baseline expectations and **AU-12** (Audit Record
  Generation) standards.

