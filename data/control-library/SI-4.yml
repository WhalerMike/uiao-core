# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : SI-4
# Title      : Information System Monitoring
# Schema     : data/control-library (uiao-core canonical format)

control_id: SI-4
title: Information System Monitoring
family: System and Information Integrity
status: implemented

implemented_by:
  - microsoft-sentinel
  - azure-monitor-logs

evidence:
  - sentinel-incident-logs
  - immutable-storage-configuration-policy

parameters:
  - id: si_4_retention_period
    description: >-
      Retention window for security-relevant monitoring data.
    value: "365 days"

narrative: |
  **Real-Time Telemetry and SIEM Integration**
  The system employs **Microsoft Sentinel** as the centralized SIEM,
  aggregating logs from Azure Front Door, Network Security Groups, and
  Application Insights.

  **Indicators of Compromise (IoC) Detection**
  Custom **KQL (Kusto Query Language)** detection rules are deployed to
  identify Indicators of Compromise, such as brute-force attempts or
  unauthorized API calls.  All logs are stored in a **Log Analytics
  Workspace** with immutable storage policies to prevent tampering or
  unauthorized deletion of audit evidence.

related_controls:
  - AU-6  # Audit Record Review, Analysis, and Reporting
  - IR-4  # Incident Handling
  - SC-7  # Boundary Protection
  - SI-2  # Flaw Remediation
