control-id: CP-9
title: Information System Backup
status: implemented
implemented-by:
  - azure-backup
  - recovery-services-vault
narrative: |
  **Automated Backup Operations**
  The system performs automated backups of all critical data and system state information using Azure Backup. Recovery Services Vaults are configured with Cross-Region Restore (CRR) to ensure data availability even in the event of a regional outage.

  **Integrity and Confidentiality of Backups**
  Backups are encrypted at rest using platform-managed keys or customer-managed keys (CMK) in Azure Key Vault. To protect against ransomware, "Multi-User Authorization" (MUA) and immutable "Soft Delete" settings are enabled on the vaults.
parameters:
  backup-frequency: "Daily / Weekly Full"
  retention-period: "30 Days (Production)"
evidence:
  - type: configuration
    ref: backup-vault-policy-settings
related_controls:
