# NIST SP 800-53 Rev 5 — Control Narrative
# Control ID : SC-28
# Title      : Protection of Information at Rest
# Schema     : data/control-library (uiao-core canonical format)

control_id: SC-28
title: Protection of Information at Rest
status: implemented

implemented_by:
  - EncryptedDataStore
  - KMSOverlay

evidence:
  - encryption-at-rest-config
  - kms-key-rotation-report
  - fips-module-certification

parameters:
  - id: encryption-key-rotation-days
    description: >-
      Maximum number of days between mandatory rotation cycles for data-at-rest
      encryption keys managed by the KMSOverlay, measured from the key's
      creation or last-rotation date.
    value: "{{ parameters['encryption-key-rotation-days'] }}"
  - id: inventory-source
    description: >-
      Authoritative asset inventory source used to enumerate all storage
      resources subject to encryption-at-rest requirements and to verify
      that no unencrypted data stores exist within the authorization boundary.
    value: "{{ parameters['inventory-source'] }}"

narrative: |
  {{ organization.name }} protects all information at rest within the
  authorization boundary in accordance with NIST SP 800-53 Rev 5 SC-28.
  Encryption is enforced at both the volume and object layers, with all
  cryptographic operations performed by FIPS 140-2 validated modules
  under the governance of the KMSOverlay.

  **FIPS 140-2 Validated Encryption**
  All encryption algorithms and cryptographic modules used to protect
  data at rest are validated under FIPS 140-2 (or FIPS 140-3 where
  available).  Symmetric encryption uses AES-256-GCM or AES-256-CBC as
  mandated by agency cryptographic policy.  No non-FIPS-approved cipher
  suites are permitted for the protection of federal data within the
  boundary.  Current FIPS module certifications are maintained in the
  fips-module-certification artifact and reviewed annually.

  **Volume-Level and Object-Level Encryption**
  Storage encryption is applied at two complementary layers.  At the
  volume level, all virtual machine disk images and block-storage volumes
  are encrypted using platform-native, FIPS 140-2 validated encryption
  prior to any data being written.  At the object level, individual data
  objects stored in cloud or on-premises object stores are encrypted
  using per-object keys derived from the KMSOverlay, ensuring that access
  to raw storage media does not yield readable data.

  **KMS Key Lifecycle and Rotation**
  The KMSOverlay centralises lifecycle management of all encryption keys
  used for data at rest.  All storage resources enumerated in
  {{ parameters['inventory-source'] }} are registered with the overlay,
  which enforces a deny-by-default posture: any storage resource that
  cannot present a valid KMS key association is automatically flagged as
  non-compliant.  Encryption keys are rotated at least every
  {{ parameters['encryption-key-rotation-days'] }} days; rotation events
  are logged in the kms-key-rotation-report artifact.  Key-access events
  are correlated with authenticated principal identities from the
  {{ organization.name }} identity plane, providing a complete chain of
  custody for every decryption operation within the boundary.

  **Continuous Compliance Verification**
  The encryption-at-rest-config evidence artifact is generated automatically
  on each deployment pipeline run.  The artifact includes a full enumeration
  of storage resources sourced from {{ parameters['inventory-source'] }},
  their encryption configurations, KMS key identifiers, FIPS module
  certification references, and key rotation timestamps.  Any deviation
  from the approved encryption baseline causes the pipeline to halt and
  raises a POA&M candidate for remediation within the defined SLA window.
  The ISSO reviews the artifact monthly and signs off prior to each
  FedRAMP assessment.

  **Evidence and Audit Artefacts**
  - encryption-at-rest-config: Machine-readable export of all storage
    encryption configurations, FIPS module references, KMS key policy
    definitions, and automated rotation schedules.
  - kms-key-rotation-report: Quarterly report documenting all key rotation
    events, associated storage resources, rotation dates, and authorizing
    principals.
  - fips-module-certification: Registry of all FIPS 140-2/140-3 validated
    cryptographic modules in use, including certificate numbers and
    expiration dates.

related_controls:
  - SC-7   # Boundary Protection
  - SC-8   # Transmission Confidentiality and Integrity
  - AC-3   # Access Enforcement
  - IA-5   # Authenticator Management
  - AU-9   # Protection of Audit Information
  - CM-6   # Configuration Settings
