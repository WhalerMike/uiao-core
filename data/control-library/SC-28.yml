# SC-28 - Protection of Information at Rest
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: System and Communications Protection (SC)
# Last Reviewed: 2025-06-15

control_id: SC-28
family: System and Communications Protection
title: Protection of Information at Rest
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Encryption of Data at Rest Across All Storage Tiers**
  The UIAO platform protects the confidentiality and integrity of
  information at rest through encryption across all storage tiers.
  Azure Storage Service Encryption (SSE) with AES-256 automatically
  encrypts all data written to Azure Blob Storage, Azure Files, Azure
  Queue Storage, and Azure Table Storage. Azure Disk Encryption
  protects virtual machine OS and data disks using BitLocker for
  Windows VMs and DM-Crypt for Linux VMs. Azure SQL Database
  Transparent Data Encryption (TDE) protects database files at rest.
  All encryption utilizes FIPS 140-2 validated cryptographic modules
  aligned with **SC-13** (Cryptographic Protection) requirements.

  **Platform-Specific Data-at-Rest Protection**
  CyberArk Privileged Access Security vault encrypts all stored
  credentials, session recordings, and audit logs using AES-256
  encryption with vault-managed keys. Microsoft 365 data including
  Exchange Online mailboxes, SharePoint Online document libraries,
  and OneDrive for Business files are protected through Microsoft-
  managed encryption at rest. CrowdStrike Falcon cloud storage
  encrypts all endpoint telemetry and detection data at rest.
  Microsoft Intune managed endpoints enforce BitLocker drive
  encryption through device configuration profiles with recovery
  key escrow to Azure Active Directory (Entra ID) for centralized
  key management under **SC-12** (Cryptographic Key Establishment
  and Management).

  **Encryption Compliance Monitoring and Enforcement**
  Azure Policy assignments enforce encryption-at-rest requirements
  for all deployed resources, preventing creation of unencrypted
  storage accounts, databases, or virtual machine disks. Microsoft
  Defender for Cloud continuously evaluates encryption configurations
  and generates compliance scores against the Azure Security
  Benchmark. Microsoft Sentinel analytics rules alert on detection
  of unencrypted data stores or encryption configuration changes.
  Encryption compliance is assessed quarterly as part of the
  continuous monitoring program under **CA-7** (Continuous Monitoring)
  and validated during annual security assessments supporting
  **AU-9** (Protection of Audit Information) retention requirements.

related_controls:
