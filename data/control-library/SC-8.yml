# NIST SP 800-53 Rev 5 Control Narrative: SC-8
# Transmission Confidentiality and Integrity
# Canonical source for UIAO-Core SSP and OSCAL artifact generation.
# Template variables are rendered via Jinja2 at generation time.

control_id: SC-8
title: Transmission Confidentiality and Integrity
family: System and Communications Protection (SC)
status: implemented

narrative: >
  {{ organization.name }} implements cryptographic mechanisms to prevent
  unauthorized disclosure and modification of information during transmission.
  All data in transit across system boundaries is protected using TLS 1.2 or
  higher, enforced at both the TLS termination layer and the API gateway.
  Cryptographic modules employed to implement this control are FIPS 140-2
  validated, in accordance with NIST SP 800-52 Rev 2 guidelines for the
  selection, configuration, and use of TLS implementations in federal
  information systems. {{ organization.name }} prohibits the use of cipher
  suites that do not meet FIPS 140-2 requirements and disables protocol
  versions below TLS 1.2.

implemented-by:
  - type: TLSTerminationLayer
    description: >
      Enforces TLS 1.2+ with FIPS 140-2 validated cipher suites on all
      inbound and outbound connections at the network perimeter and service
      mesh boundaries.
  - type: APIGateway
    description: >
      Validates TLS session parameters and rejects connections that do not
      meet the minimum protocol version or approved cipher suite requirements
      before forwarding traffic to back-end services.

evidence:
  - artifact: tls-compliance-scan
    description: >
      Automated TLS compliance scan results confirming TLS 1.2+ enforcement
      and FIPS 140-2 validated cipher suites across all {{ organization.name }}
      system endpoints.
    collector: automated

parameters:
  - id: SC-8-P1
    name: Minimum TLS Version
    value: "TLS 1.2"
    fips_validated: true
  - id: SC-8-P2
    name: Cryptographic Module Standard
    value: "FIPS 140-2"
