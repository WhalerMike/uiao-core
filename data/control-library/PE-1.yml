narrative: |
  **Policy Overview**
  The organization develops, documents, and disseminates a physical and environmental protection policy that addresses purpose, scope, roles, responsibilities, management commitment, coordination among organizational entities, and compliance. The policy establishes requirements for physical access controls, visitor management, environmental protections, and facility monitoring within all UIAO-designated facilities.

  **Policy Maintenance**
  The physical and environmental protection policy is approved by the ISSM and reviewed at least annually (PARAM-PE-001-001). The policy is maintained in the SharePoint Policy Library with version control. Policy updates trigger redistribution to all personnel with physical security responsibilities (PARAM-PE-001-002) with acknowledgment tracking through ServiceNow.

  **Procedures**
  The organization maintains procedures for physical access authorization, monitoring, visitor escort, emergency shutoff, power and lighting, fire protection, temperature and humidity controls, and water damage protection. Procedures align with NIST guidelines and are reviewed annually.

  **Governance Integration**
  The physical and environmental protection policy is integrated into the UIAO governance framework and supports the overall risk management strategy under PM-9.
