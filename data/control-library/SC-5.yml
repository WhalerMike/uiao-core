control-id: SC-5
title: Denial-of-Service Protection
status: implemented
implemented-by:
  - azure-ddos-protection
  - azure-front-door
narrative: |
{{ organization.name }} protects the system against denial-of-service attacks.

**Network Layer Protection**
All virtual networks have Azure DDoS Protection Standard enabled for automatic Layer 3/4 mitigation and adaptive tuning.

**Application Layer Protection**
External traffic is routed through Azure Front Door with Web Application Firewall (WAF) in Prevention mode, including rate limiting and custom rules to block volumetric and application-layer attacks before they reach the origin.
parameters:
  ddos-tier: "Azure DDoS Network Protection Standard"
  waf-mode: "Prevention"
