narrative: |
  **Authorization Overview**

  The Authorizing Official (AO) authorizes the UIAO system for
  operation based on a determination that the residual risk to
  organizational operations, assets, and individuals is
  acceptable. The authorization decision is informed by the
  Security Assessment Report (SAR) from CA-2, the Plan of
  Action and Milestones (POA&M) from CA-5, and the continuous
  monitoring posture from CA-7. Authorization is granted by
  the designated AO (PARAM-CA-006-001).

  **Authorization Package**

  The authorization package includes the System Security Plan
  (SSP), Security Assessment Report (SAR), Plan of Action and
  Milestones (POA&M), continuous monitoring strategy, and
  supporting evidence artifacts. The package is maintained in
  the SharePoint Compliance Library with version control and
  access restrictions limiting visibility to authorized
  personnel.

  **Authorization Decision**

  The AO reviews the authorization package and makes one of
  three decisions: authorize (accept residual risk), deny
  authorization (unacceptable risk), or authorize with
  conditions (accept risk with specific remediation
  requirements). The authorization decision considers
  residual risk levels and POA&M status
  (PARAM-CA-006-003). The ATO letter documents the
  authorization decision, conditions, and authorization
  termination date.

  **Ongoing Authorization**

  Authorization is reviewed at least every three years or
  upon significant system changes (PARAM-CA-006-002).
  Continuous monitoring data from Microsoft Sentinel and
  Defender for Cloud provides ongoing risk visibility
  between formal reauthorization cycles. Significant
  changes that may trigger reauthorization include
  architecture modifications, new data types, boundary
  changes, or critical vulnerability discoveries.
  Authorization status is tracked in ServiceNow GRC.

