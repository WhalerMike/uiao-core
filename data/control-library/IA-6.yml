parameters:
  - id: ia_6_feedback_obscuring_method
    description: >-
      Method used to obscure authentication feedback during the
      authentication process to protect credentials from observation.
    value: "Password fields masked with dots/asterisks; no credential echo on CLI; FIDO2 PIN masked"

narrative: |
  **Obscured Authentication Feedback Across All Interfaces**
  The organization obscures feedback of authentication information
  during the authentication process to protect credentials from
  possible exploitation by unauthorized individuals. Microsoft Entra ID
  sign-in interfaces mask all password and PIN input fields, displaying
  dot or asterisk characters in place of actual credential values. FIDO2
  security key PIN entry and PIV/CAC PIN prompts similarly obscure input
  to prevent shoulder-surfing and visual observation attacks. These
  protections apply across all Entra ID-integrated applications,
  including Microsoft 365, Azure Portal, and custom SAML/OIDC
  applications, supporting **IA-2** (Identification and Authentication)
  and **IA-5** (Authenticator Management).

  **Privileged Session and Network Device Feedback Protection**
  CyberArk Privileged Session Manager obscures all credential input
  during privileged session initiation, with vaulted credentials injected
  directly into target sessions without displaying password values to the
  operator. This credential injection architecture ensures that
  privileged passwords are never visible in the authentication feedback
  loop, supporting **AC-6** (Least Privilege) zero-standing-privilege
  objectives. Cisco Catalyst network infrastructure enforces CLI
  password masking for all console, SSH, and HTTPS management
  authentication prompts, preventing credential exposure during
  network device administration.

  **Continuous Compliance and Monitoring**
  Authentication feedback configurations are validated through Intune
  compliance policies for managed endpoints and through periodic
  configuration audits for network infrastructure devices. Any
  deviation from credential masking standards triggers automated alerts
  in Microsoft Sentinel, supporting **CM-6** (Configuration Settings)
  and **SI-4** (System Monitoring) continuous monitoring requirements.

