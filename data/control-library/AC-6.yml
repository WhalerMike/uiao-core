# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : AC-6
# Title      : Least Privilege
# Schema     : data/control-library (uiao-core canonical format)

control_id: AC-6
title: Least Privilege
family: Access Control
status: implemented

implemented_by:
  - azure-pim
  - azure-rbac

evidence:
  - pim-elevation-audit-logs
  - rbac-assignment-report

parameters:
  - id: ac_6_elevation_timeout
    description: >-
      Maximum duration for a JIT privileged session before automatic
      revocation.
    value: "8 hours"

narrative: |
  **Just-In-Time Privileged Access**
  The system enforces least privilege by requiring all administrative actions
  to be performed via **Azure Privileged Identity Management (PIM)**.  Users
  do not hold standing privileges; instead, they must request JIT elevation,
  providing a business justification and passing phishing-resistant MFA.

  **Role-Based Access Control (RBAC)**
  Permissions are scoped to the resource-group level using custom **Azure
  RBAC** roles.  All standard user accounts are restricted to 'Reader' or
  specific application-row-level access, ensuring no single account has broad
  delete or modification rights across the production environment.

related_controls:
  - AC-2  # Account Management
  - AC-3  # Access Enforcement
  - IA-2  # Identification and Authentication
