narrative: |
  **Security Categorization Overview**

  The UIAO system is categorized in accordance with FIPS 199
  (Standards for Security Categorization of Federal Information and
  Information Systems) and CNSSI 1253 (Security Categorization and
  Control Selection for National Security Systems). The categorization
  identifies the information types processed, stored, and transmitted
  by UIAO and assigns impact levels (low, moderate, high) for
  confidentiality, integrity, and availability.

  **Categorization Process**

  The Security Categorization Report documents the system boundary,
  information types per NIST SP 800-60 Volume II, and resulting
  impact levels. The FIPS 199 worksheet provides the formal
  calculation of the overall system categorization. The Authorizing
  Official (AO) reviews and approves the categorization at least
  annually (PARAM-RA-002-001) or upon significant system changes
  including mission changes, new data types, or architectural
  modifications.

  **Data Classification Integration**

  Microsoft Purview Information Protection labels are configured to
  align with the approved security categorization. Sensitivity labels
  (CUI, FOUO, Public) enforce classification markings across
  Microsoft 365 workloads including Exchange, SharePoint, OneDrive,
  and Teams. Label policies automatically apply default
  classifications based on content inspection rules and user-applied
  markings.

  **Governance Integration**

  The security categorization feeds the control baseline selection
  per NIST SP 800-53 Rev 5 and informs the system security plan
  (SSP). Categorization results are recorded in ServiceNow CMDB
  and referenced in the Executive Dashboard compliance posture
  score. The categorization supports **RA-1** (Risk Assessment
  Policy) and **PM-7** (Enterprise Architecture).

