narrative: |
  **Access Authorization**
  The organization develops, approves, and maintains a list of individuals with authorized access to the facility where the UIAO system resides. Authorization is based on position, role, and need for physical access. The Physical Security Office maintains the authoritative access roster.

  **Authorization Process**
  Personnel requiring facility access submit requests through ServiceNow. Requests are approved by the facility manager and validated by the Physical Security Office. Approved individuals receive appropriate badge credentials through the Badge Management System.

  **Review and Updates**
  The physical access authorization list is reviewed quarterly (PARAM-PE-002-001). Individuals no longer requiring access are promptly removed. Transfers, terminations, and role changes trigger immediate access roster updates coordinated with PS-4 and PS-5.

  **Credential Management**
  Badge credentials are issued, tracked, and revoked through the Badge Management System. Lost or stolen badges are reported immediately and deactivated within 4 hours.
