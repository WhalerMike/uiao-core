# IR-5 - Incident Monitoring
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: Incident Response (IR)
# Last Reviewed: 2025-06-15

control_id: IR-5
family: Incident Response
title: Incident Monitoring
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Continuous Incident Monitoring and Tracking**
  The UIAO platform implements continuous incident monitoring through
  the integration of Microsoft Sentinel SIEM with ServiceNow ITSM
  incident management workflows. All security incidents are tracked
  from initial detection through final resolution and closure in
  ServiceNow with automated status updates, escalation triggers, and
  timeline tracking. Microsoft Sentinel provides real-time monitoring
  of security events across Azure Active Directory (Entra ID),
  CrowdStrike Falcon EDR, Palo Alto NGFW, CyberArk Privileged Access
  Security, and Cisco SD-WAN components, correlating events into
  actionable incidents aligned with **IR-4** (Incident Handling)
  procedures.

  **Threat Intelligence Integration and Trend Analysis**
  Incident monitoring incorporates threat intelligence feeds from
  Microsoft Threat Intelligence, CrowdStrike Falcon Intelligence,
  and Palo Alto Unit 42 threat feeds to enrich incident context and
  identify emerging threat patterns. Microsoft Sentinel Threat
  Intelligence workbooks correlate organizational incidents with
  known threat actor tactics, techniques, and procedures (TTPs)
  mapped to the MITRE ATT&CK framework. Trend analysis dashboards
  provide visibility into incident volume, category distribution,
  mean time to detect (MTTD), mean time to respond (MTTR), and
  resolution effectiveness metrics supporting organizational risk
  management decisions.

  **Incident Reporting and Organizational Awareness**
  Incident monitoring data is compiled into regular security status
  reports distributed to organizational leadership, the Authorizing
  Official, and relevant stakeholders. Monthly incident summary
  reports document incident counts by category and severity, response
  effectiveness metrics, and trend analysis. Significant incidents
  are reported through **IR-6** (Incident Reporting) channels to
  US-CERT and FedRAMP within required timelines. Monitoring data
  supports continuous improvement of detection capabilities under
  **SI-4** (System Monitoring) and informs risk assessment updates
  under **RA-3** (Risk Assessment) and **CA-7** (Continuous
  Monitoring) requirements.

