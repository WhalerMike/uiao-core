# NIST SP 800-53 Rev 5 — Control Narrative
# Control ID : AT-2
# Title      : Literacy Training and Awareness
# Schema     : data/control-library (uiao-core canonical format)

control_id: AT-2
title: Literacy Training and Awareness
status: implemented

implemented_by:
  - LearningManagementSystem
  - TelemetryPlane

evidence:
  - security-awareness-training-completion-report
  - phishing-simulation-campaign-results

parameters:
  - id: training-completion-window
    description: >-
      Maximum number of calendar days after onboarding (or annual renewal
      date) within which all personnel must complete the mandatory security
      awareness training curriculum in the LMS.
    value: "{{ parameters['training-completion-window'] }}"
  - id: phishing-simulation-frequency
    description: >-
      Minimum number of phishing simulation campaigns conducted per calendar
      year across the workforce to measure and reinforce security awareness.
    value: "{{ parameters['phishing-simulation-frequency'] }}"

narrative: |
  {{ organization.name }} implements AT-2 Literacy Training and Awareness
  through a continuous security education programme delivered via the
  LearningManagementSystem (LMS) and reinforced by telemetry-driven
  phishing simulations.

  **Annual Security Awareness Training**
  All personnel with access to {{ organization.name }} systems are required
  to complete the mandatory security awareness training curriculum within
  {{ parameters['training-completion-window'] }} days of their start date
  and annually thereafter upon renewal of their access credentials.  The
  curriculum covers: recognising social-engineering and phishing attacks,
  handling of Controlled Unclassified Information (CUI), acceptable-use
  policies, incident reporting procedures, and secure remote-access
  practices.  Training completion status is tracked in real time by the
  LearningManagementSystem, which enforces access gates — accounts with
  overdue training are automatically flagged and escalated to the user's
  supervisor and the ISSO.

  **Role-Based Training for Privileged Users**
  Personnel assigned to privileged roles (system administrators, security
  operations analysts, cloud infrastructure engineers) receive an
  additional role-based curriculum that covers: secure configuration
  management, principle of least privilege, just-in-time access workflows,
  incident response procedures, and the specific threats relevant to their
  technical domain.  Role-based training is completed annually and whenever
  a user is elevated to a new privileged role.  Evidence of completion is
  retained in the LMS and exported to the security-awareness-training-
  completion-report artefact on a monthly basis.

  **Phishing Simulation Campaigns**
  {{ organization.name }} conducts a minimum of
  {{ parameters['phishing-simulation-frequency'] }} phishing simulation
  campaigns per calendar year targeting the full workforce.  Campaigns are
  designed using current threat intelligence to mimic realistic attack
  vectors (credential harvesting, malicious attachments, QR-code lures).
  Users who interact with a simulated phishing message are automatically
  enrolled in a just-in-time remediation module within the LMS.  Campaign
  outcomes — click rates, submission rates, and remediation completion
  rates — are reported to the CISO quarterly and are available as the
  phishing-simulation-campaign-results evidence artefact.

  **Training Compliance Telemetry**
  The TelemetryPlane ingests LMS completion events and phishing simulation
  outcomes via a structured API integration.  Completion metrics are
  surfaced in the continuous-monitoring (ConMon) dashboard alongside
  Key Security Indicators (KSIs) so that compliance posture is visible
  to {{ organization.name }}'s governance, risk, and compliance (GRC) team
  in near-real-time.  Any decline in completion rates or increase in
  phishing click rates triggers a Microsoft Sentinel alert, which is
  automatically routed to the Plan of Action and Milestones (POA&M) tracker
  for corrective-action documentation.

  **Evidence and Audit Artefacts**
  Training compliance evidence is maintained as follows:
  - security-awareness-training-completion-report: A monthly export from the
    LMS listing every user, their assigned curriculum modules, completion
    dates, and scores.  The export is cryptographically signed and stored in
    the evidence repository.
  - phishing-simulation-campaign-results: A quarterly report summarising
    campaign design parameters, targeted population, click and submission
    rates by role group, and remediation completion rates.

  Both artefacts are available to the 3PAO during annual assessments and
  continuous-monitoring reviews, satisfying the evidence requirements for
  AT-2 under the FedRAMP Moderate baseline.

related_controls:
  - AT-3   # Role-Based Training
  - AT-4   # Training Records
  - PL-4   # Rules of Behaviour
  - PS-7   # External Personnel Security
  - IR-2   # Incident Response Training
