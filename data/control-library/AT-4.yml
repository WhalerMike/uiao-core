# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : AT-4
# Title      : Training Records
# Schema     : data/control-library (uiao-core canonical format)

control_id: AT-4
title: Training Records
family: Awareness and Training
status: implemented

implemented_by:
    - lms-platform
    - sharepoint
    - servicenow

evidence:
    - lms-training-completion-export
    - training-record-retention-policy
    - individual-training-transcripts

parameters:
    - id: PARAM-AT-004-001
      description: >-
          Retention period for individual training records.
      value: "Duration of employment plus 3 years"
    - id: PARAM-AT-004-002
      description: >-
          Frequency of training record review and reconciliation.
      value: "Quarterly"

narrative: |
  **Learning Management System Training Records**
  The organization documents and monitors individual information
  security and privacy training activities through the Learning
  Management System (LMS). The LMS maintains a complete training
  transcript for each employee and contractor including: course
  title, completion date, assessment score, certification status,
  and training track assignment. Records are generated automatically
  upon course completion and stored in the LMS database with
  immutable timestamps.

  **Training Record Retention**
  Training records are retained for PARAM-AT-004-001 (duration of
  employment plus 3 years) in accordance with federal records
  management requirements. Records are archived to SharePoint
  document libraries with retention policies enforced through
  Microsoft Purview. Archived records maintain the same access
  controls as active records, supporting **AU-11** (Audit Record
  Retention) requirements.

  **Quarterly Reconciliation**
  The ISSO conducts quarterly reconciliation (PARAM-AT-004-002)
  of training records against the personnel roster to identify:
  personnel with overdue training, new hires awaiting initial
  training, departures requiring record archival, and role changes
  requiring updated role-based training assignments. Reconciliation
  results are reported to the compliance dashboard and feed the
  compliance posture score in the Executive Dashboard.

  **Compliance Reporting**
  Training completion metrics are reported to the Authorizing
  Official (AO) as part of the monthly compliance dashboard review.
  Metrics include: overall completion rate, role-based training
  coverage, phishing simulation pass rate, and overdue training
  count. Non-compliance trends trigger the remediation workflow
  defined in the Operational Governance Charter, supporting
  **AT-1** (Policy and Procedures) and **AT-2** (Security
  Literacy Training).

related_controls:
    - AT-1   # Security Awareness and Training Policy
    - AT-2   # Security Literacy Training
    - AT-3   # Role-Based Security Training
    - AU-11  # Audit Record Retention
    - PM-13  # Security and Privacy Workforce
