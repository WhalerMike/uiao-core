# NIST 800-53 Rev 5 Control Narrative — IA-5 Authenticator Management
# Generated for: {{ organization.name }}
# Schema: control-library v1.0

control-id: IA-5
title: Authenticator Management
status: implemented

implemented-by:
  - abstract-type: IdentityProvider

evidence:
  - authenticator-management-policy

narrative: |
  {{ organization.name }} manages information system authenticators by verifying
  the identity of individuals, groups, or devices before distributing
  authenticators. Prior to issuing any authenticator, the identity of the
  recipient is confirmed through an approved identity-proofing process in
  accordance with NIST SP 800-63B.

  Password-based authenticators enforce complexity requirements including a
  minimum of 16 characters with mixed case, numbers, and special characters.
  Automated controls within the IdentityProvider enforce these requirements at
  account creation and password change events.

  Authenticator expiry and rotation are managed automatically. Passwords expire
  on a scheduled basis and users are required to rotate credentials before
  expiration. Privileged account credentials are rotated more frequently and
  are vaulted within the organization's privileged access management solution.

  Lost, compromised, or damaged authenticators are revoked immediately upon
  notification. The IdentityProvider enforces single-use recovery codes and
  phishing-resistant MFA (FIDO2/PIV) as primary authenticator methods,
  reducing reliance on shared secrets.

  {{ organization.name }} maintains an inventory of all issued authenticators
  and conducts periodic reviews to ensure authenticators are revoked for
  accounts that are no longer active or authorized.
