# NIST SP 800-53 Rev 5 — Control Narrative
# Control ID : IA-5
# Title      : Authenticator Management
# Schema     : data/control-library (uiao-core canonical format)

control_id: IA-5
title: Authenticator Management
status: implemented

implemented_by:
  - IdentityProvider
  - PrivilegedAccessManagement

evidence:
  - authenticator-management-policy
  - mfa-enrollment-report
  - credential-rotation-audit-log

parameters:
  - id: password-min-length
    description: >-
      Minimum number of characters required for all human-account passwords,
      enforced at account creation and every password-change event by the
      IdentityProvider authentication methods policy.
    value: "{{ parameters['password-min-length'] }}"
  - id: privileged-credential-rotation-days
    description: >-
      Maximum number of days between mandatory credential rotations for
      privileged accounts and service accounts managed by the Privileged
      Access Management vault.
    value: "{{ parameters['privileged-credential-rotation-days'] }}"

narrative: |
  {{ organization.name }} manages information system authenticators in
  accordance with NIST SP 800-53 Rev 5 IA-5, ensuring that authenticators
  are properly issued, protected, and revoked throughout their lifecycle.

  **Identity Proofing and Initial Issuance**
  Prior to issuing any authenticator, the identity of the recipient is
  confirmed through an approved identity-proofing process aligned with
  NIST SP 800-63B Identity Assurance Level 2 (IAL2).  For new hires,
  identity verification is performed by HR during onboarding.  For
  contractors and external users, identity proofing is conducted via
  the IdentityProvider self-service portal with document verification.
  No authenticator is activated until the identity-proofing workflow
  completes successfully.

  **Password Complexity and Rotation**
  Password-based authenticators enforce a minimum length of
  {{ parameters['password-min-length'] }} characters with mixed-case,
  numeric, and special-character requirements, consistent with NIST
  SP 800-63B memorized-secret guidance.  Automated controls within the
  IdentityProvider enforce these requirements at account creation and
  every password-change event.  Privileged account credentials stored
  in the PrivilegedAccessManagement vault are rotated at least every
  {{ parameters['privileged-credential-rotation-days'] }} days and are
  not reusable across rotations.

  **Phishing-Resistant MFA Enforcement**
  {{ organization.name }} enforces phishing-resistant multi-factor
  authentication (FIDO2 hardware tokens and PIV/CAC smart cards) as the
  primary authenticator method for all human accounts.  FIDO2 and PIV
  credentials are registered per-device and per-user, preventing credential
  sharing or replay attacks.  SMS and voice OTP authenticators are not
  permitted for access to federal data within the authorization boundary.
  MFA enrollment status is tracked in the mfa-enrollment-report artifact
  and surfaced on the ConMon dashboard.

  **Authenticator Revocation and Recovery**
  Lost, compromised, or damaged authenticators are revoked immediately upon
  notification to the security operations team.  The IdentityProvider
  enforces a break-glass recovery process using single-use, time-limited
  recovery codes that are issued only through an approved identity
  re-proofing workflow.  Revocation events are logged in the
  credential-rotation-audit-log artifact and reviewed monthly by the ISSO.

  **Evidence and Audit Artefacts**
  - authenticator-management-policy: The authoritative policy document
    defining authenticator types, complexity requirements, rotation
    schedules, and revocation procedures.
  - mfa-enrollment-report: Monthly export from the IdentityProvider
    listing all active MFA methods per user, enrollment dates, and
    any accounts with no MFA enrollment on record.
  - credential-rotation-audit-log: Continuous log of all credential
    issuance, rotation, and revocation events for both standard and
    privileged accounts.

