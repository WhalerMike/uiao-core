# NIST SP 800-53 Rev 5 — Control Narrative
# Control ID : AC-3
# Title      : Access Enforcement
# Schema     : data/control-library (uiao-core canonical format)

control_id: AC-3
title: Access Enforcement
status: implemented

implemented_by:
  - IdentityProvider
  - PolicyEnforcementPoint

evidence:
  - access-control-policy-v1

narrative: >
  {{ organization.name }} enforces access control decisions through a layered
  Role-Based Access Control (RBAC) model applied at both the application and
  infrastructure layers.  All access requests are evaluated by the Policy
  Enforcement Point before resources are made available; permit or deny
  decisions are derived from the subject's assigned roles and the
  least-privilege principle.

  At the application layer, the Identity Provider issues cryptographically
  signed tokens that carry role assertions (e.g., reader, contributor, admin).
  Every service validates these tokens on each request and refuses access when
  the required role is absent.  Role assignments are reviewed quarterly and
  automatically revoked when a user's job function changes (mover/leaver
  lifecycle events).

  At the infrastructure layer, {{ organization.name }} enforces network-segment
  access through policy rules that deny traffic by default and permit only the
  minimum connectivity required for each workload.  Privileged administrative
  access to infrastructure components is gated behind just-in-time (JIT)
  elevation workflows, ensuring that elevated rights are time-bound and fully
  audited.

  Together these controls satisfy the AC-3 requirement that the information
  system enforces approved authorizations for logical access to information
  and system resources in accordance with applicable access control policies.
