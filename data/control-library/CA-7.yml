narrative: |
  **Continuous Monitoring Overview**

  The organization implements a continuous monitoring strategy
  for the UIAO system that maintains ongoing awareness of
  security posture, vulnerabilities, and threats. The strategy
  defines monitoring frequencies, metrics, assessment
  procedures, and reporting requirements aligned with NIST
  SP 800-137 (Information Security Continuous Monitoring).
  The strategy is reviewed and updated at least annually
  (PARAM-CA-007-001).

  **Automated Monitoring Infrastructure**

  Microsoft Sentinel serves as the central SIEM platform
  aggregating security telemetry from all UIAO system
  components. Analytics rules provide real-time detection
  of security events, anomalies, and policy violations.
  Microsoft Defender for Cloud continuously assesses Azure
  resource configurations against security benchmarks and
  provides Secure Score trending. Defender for Endpoint
  monitors endpoint security posture including threat
  detection, vulnerability status, and compliance state.

  **Monitoring Coverage**

  Automated monitoring covers all 20 NIST SP 800-53 control
  families (PARAM-CA-007-003) through a combination of
  technical controls, log analysis, and configuration
  assessment. The Telemetry Evidence Map documents the
  mapping between monitoring data sources and control
  families. Key metrics include Secure Score, open
  vulnerability count, mean time to remediate, incident
  response times, and compliance percentage.

  **Reporting and Response**

  Security posture reports are provided to the AO at least
  monthly (PARAM-CA-007-002) through the Executive Dashboard
  and formal ConMon reports. The dashboard provides real-time
  compliance posture scoring, trend analysis, and drill-down
  capability into individual control assessments. Monitoring
  findings that indicate degraded security posture trigger
  the POA&M process (CA-5) and may inform reauthorization
  decisions (CA-6).

