control-id: CM-3
title: Configuration Change Control
status: implemented
implemented-by:
  - github-actions
  - terraform-cloud
narrative: |2
  {{ organization.name }} controls changes to the system configuration through a formal Changes-as-Code process.

  **Change Management Workflow**
  All configuration changes are submitted as Pull Requests with mandatory peer review and automated security linting (terraform validate, OPA policies, etc.).

  **Automated Deployment**
  Approved changes are deployed via GitHub Actions or Terraform Cloud pipelines. A complete immutable audit trail is maintained in the version control history.
parameters:
  deployment-method: "Automated CI/CD Pipeline"
  review-requirement: "Minimum 1 peer reviewer + automated checks"
evidence:
  - type: configuration
    ref: CM-3-evidence
