# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : RA-1
# Title      : Risk Assessment Policy and Procedures
# Schema     : data/control-library (uiao-core canonical format)

control_id: RA-1
title: Risk Assessment Policy and Procedures
family: Risk Assessment
status: implemented

implemented_by:
    - sharepoint-policy-library
    - servicenow
    - governance-framework

evidence:
    - risk-assessment-policy-document
    - policy-review-approval-records
    - risk-assessment-procedures-document

parameters:
    - id: PARAM-RA-001-001
      description: >-
          Frequency of risk assessment policy review and update.
      value: "Annually, or upon significant change"
    - id: PARAM-RA-001-002
      description: >-
          Personnel or roles to whom the policy is disseminated.
      value: "All organizational personnel with system access"

narrative: |
  **Risk Assessment Policy**
  The organization develops, documents, and disseminates a risk
  assessment policy that addresses purpose, scope, roles,
  responsibilities, management commitment, coordination among
  organizational entities, and compliance. The policy is approved
  by the Authorizing Official (AO) and reviewed at least annually
  (PARAM-RA-001-001). The policy is maintained in the SharePoint
  policy library with version control and access logging. Policy
  updates trigger redistribution to all personnel
  (PARAM-RA-001-002) with acknowledgment tracking through
  ServiceNow.

  **Risk Assessment Procedures**
  The organization develops, documents, and maintains procedures
  to facilitate the implementation of the risk assessment policy
  and associated controls. Procedures define the risk assessment
  methodology, scope determination, threat identification,
  vulnerability analysis, likelihood and impact determination,
  risk calculation, risk response strategies, and documentation
  requirements. Procedures align with NIST SP 800-30 Rev 1
  (Guide for Conducting Risk Assessments) and are reviewed
  annually consistent with the policy review cycle.

  **Governance Integration**
  The risk assessment policy is integrated into the UIAO
  governance framework defined in the Operational Governance
  Charter. Risk assessment findings feed the compliance posture
  score in the Executive Dashboard and inform the Plan of Action
  and Milestones (POA&M) management process. The policy supports
  **PM-9** (Risk Management Strategy) and **PM-28** (Risk
  Framing).

related_controls:
