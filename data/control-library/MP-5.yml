control_id: MP-5
title: Media Transport
family: Media Protection (MP)
status: Implemented
implemented_by:
  - BitLocker Drive Encryption
  - ServiceNow Change Management
  - Encrypted Courier Services
evidence:
  - artifact: Media Transport Log
    location: ServiceNow > Asset Management > Transport Records
    format: CMDB Export
  - artifact: Encryption Verification Records
    location: SharePoint > UIAO Compliance > Evidence > MP Transport
    format: DOCX/PDF
parameters:
  - id: PARAM-MP-005-001
    text: Media transported outside controlled areas is encrypted with FIPS 140-2 validated encryption
    value: FIPS 140-2 validated BitLocker or AES-256 encryption
  - id: PARAM-MP-005-002
    text: Media transport activities are tracked and documented
    value: ServiceNow transport request with chain of custody
narrative: |
  **Transport Protection**
  The organization protects and controls digital and
  non-digital media during transport outside of controlled
  areas using FIPS 140-2 validated encryption
  (PARAM-MP-005-001). All portable media leaving the facility
  is encrypted using BitLocker or equivalent AES-256 encryption.

  **Chain of Custody**
  Media transport activities are tracked through ServiceNow
  change management with chain-of-custody documentation
  (PARAM-MP-005-002). Transport requests require approval from
  the data owner and the ISSO. Each handoff is logged with
  timestamp, sender, and recipient identification.

  **Courier Requirements**
  External media shipments use authorized courier services
  with tracking capabilities. Sensitive media shipments require
  bonded courier or registered mail with return receipt.
  Electronic transmission of sensitive data uses TLS 1.2+ or
  IPsec VPN tunnels per SC-8.

  **Accountability**
  The organization maintains accountability for media during
  transport by documenting activities associated with the
  transport of information system media using ServiceNow
  workflows and restricting transport to authorized personnel.
