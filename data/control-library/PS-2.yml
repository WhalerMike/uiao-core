    location: ServiceNow > HR Module > Position Designations
    format: CSV/PDF Export
  - artifact: Position Sensitivity Matrix
    location: SharePoint > UIAO Compliance > Personnel > Sensitivity Matrix
    format: XLSX/PDF
parameters:
  - id: PARAM-PS-002-001
    text: All positions are assigned a risk designation
    value: All positions
  - id: PARAM-PS-002-002
    text: Position risk designations are reviewed periodically
    value: Annually
narrative: |
  **Position Risk Designation**
  The organization assigns a risk designation to all positions
  associated with the UIAO system and establishes screening
  criteria for individuals filling those positions. Position
  risk designations are consistent with OPM position designation
  guidance and 5 CFR 731.

  **Risk Categories**
  Positions are categorized as High Risk, Moderate Risk, or
  Low Risk based on the potential for damage to the UIAO system
  and its data. The Position Sensitivity Matrix maintained in
  SharePoint documents each role designation along with
  corresponding screening requirements.

  **Review and Updates**
  Position risk designations are reviewed at least annually
  (PARAM-PS-002-002) and updated when duties change
  significantly. Changes to position risk levels trigger
  re-screening requirements under PS-3.
