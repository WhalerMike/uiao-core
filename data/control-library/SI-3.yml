# SI-3 - Malicious Code Protection
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: System and Information Integrity (SI)
# Last Reviewed: 2025-06-15

control_id: SI-3
family: System and Information Integrity
title: Malicious Code Protection
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Endpoint Malicious Code Protection**
  The UIAO platform employs CrowdStrike Falcon as the primary
  endpoint detection and response (EDR) solution across all
  Microsoft Intune managed endpoints. CrowdStrike Falcon provides
  real-time behavioral analysis, machine learning-based threat
  detection, and signature-based malicious code identification.
  Microsoft Defender for Endpoint serves as a complementary
  anti-malware layer providing cloud-delivered protection,
  automatic sample submission, and tamper protection. Both
  solutions are deployed through Intune device configuration
  profiles ensuring consistent coverage across all managed
  devices aligned with **CM-6** (Configuration Settings)
  requirements.

  **Malicious Code Protection Updates**
  CrowdStrike Falcon sensor updates and threat intelligence
  feeds are delivered continuously through the CrowdStrike
  cloud infrastructure without requiring endpoint reboots.
  Microsoft Defender antivirus definitions are updated at
  least every four hours through Windows Update for Business
  managed by Intune. Azure cloud workloads are protected by
  Microsoft Defender for Cloud which provides agentless
  scanning for virtual machines, container registries, and
  serverless functions. Update compliance is monitored through
  the CrowdStrike Falcon console and Microsoft Defender
  security dashboard.

  **Malicious Code Detection and Response**
  Malicious code detection events from CrowdStrike Falcon and
  Microsoft Defender are forwarded to Microsoft Sentinel for
  centralized security event correlation and incident response
  under **IR-4** (Incident Handling) procedures. CrowdStrike
  Falcon provides automated containment capabilities including
  network isolation of compromised endpoints and real-time
  response actions. Microsoft Sentinel analytics rules trigger
  automated playbooks for common malware scenarios. Malicious
  code incidents are reported through ServiceNow incident
  management and tracked through resolution. False positive
  management is conducted through coordinated exception
  policies reviewed quarterly under **CA-7** (Continuous
  Monitoring) requirements.

