narrative: |
{{ organization.name }} reviews and analyzes audit records on an ongoing basis.

**Automated Analysis**
Microsoft Sentinel analytics rules continuously scan logs for indicators of compromise, anomalous behavior, and compliance violations.

**Reporting and Escalation**
High-priority findings are escalated via automated playbooks. Weekly summary reports are generated for the ISSO and security team.
