narrative: |
  **Policy Overview**
  The organization develops, documents, and disseminates a
  media protection policy that addresses purpose, scope, roles,
  responsibilities, management commitment, coordination among
  organizational entities, and compliance. The policy establishes
  requirements for media access, marking, storage, transport,
  sanitization, and use within the UIAO system boundary.

  **Policy Maintenance**
  The media protection policy is approved by the ISSM and
  reviewed at least annually (PARAM-MP-001-001). The policy is
  maintained in the SharePoint Policy Library with version
  control. Policy updates trigger redistribution to all
  personnel with media handling responsibilities
  (PARAM-MP-001-002) with acknowledgment tracking through
  ServiceNow.

  **Procedures**
  The organization maintains procedures for media access
  control, marking, storage, transport, sanitization, and
  acceptable use. Microsoft Intune enforces removable media
  policies on managed endpoints. Procedures align with NIST
  guidelines and are reviewed annually.

  **Governance Integration**
  The media protection policy is integrated into the UIAO
  governance framework and supports the overall risk management
  strategy under PM-9.
