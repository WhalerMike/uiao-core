control_id: PS-4
title: Personnel Termination
family: Personnel Security (PS)
status: Implemented
implemented_by:
  - Entra ID
  - ServiceNow
  - CyberArk
evidence:
  - artifact: Termination Checklist Records
    location: ServiceNow > HR Module > Terminations
    format: CSV/PDF Export
  - artifact: Access Revocation Logs
    location: Entra ID > Audit Logs > User Lifecycle
    format: Portal Screenshot
parameters:
  - id: PARAM-PS-004-001
    text: System access is disabled upon personnel termination
    value: Same day as termination
  - id: PARAM-PS-004-002
    text: Authenticators and credentials are revoked upon termination
    value: Immediately upon termination
narrative: |
  **Termination Process**
  Upon termination of individual employment, the organization
  disables system access within the same day (PARAM-PS-004-001),
  terminates and revokes authenticators and credentials
  (PARAM-PS-004-002), conducts exit interviews, retrieves all
  security-related organizational information system property,
  and retains access to organizational information formerly
  controlled by the terminated individual.

  **Automated Access Revocation**
  ServiceNow HR termination workflows trigger automated Entra
  ID account disablement through the identity lifecycle
  management integration. CyberArk privileged accounts are
  immediately revoked. Conditional Access policies block
  terminated users from all UIAO system resources.

  **Property and Information Retrieval**
  The termination checklist ensures retrieval of badges,
  hardware tokens, laptops, mobile devices, and any
  removable media. Information previously accessible to
  the terminated individual is reviewed and reassigned
  to appropriate personnel.
