# CM-7 - Least Functionality
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: Configuration Management (CM)
# Last Reviewed: 2025-06-15

control_id: CM-7
family: Configuration Management
title: Least Functionality
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Restriction of Essential Functions and Services**
  The UIAO platform is configured to provide only essential
  capabilities required to support authorized mission functions.
  Azure virtual machines and platform services are deployed with
  minimal service configurations, disabling unnecessary ports,
  protocols, and services. Microsoft Intune device configuration
  profiles enforce application whitelisting policies on managed
  endpoints, restricting software installation to approved
  applications cataloged in the organizations software baseline.
  Azure Policy assignments enforce resource type restrictions,
  preventing deployment of unauthorized service types within
  production subscriptions aligned with **CM-2** (Baseline
  Configuration) requirements.

  **Prohibited and Restricted Software Management**
  The organization maintains a list of prohibited and restricted
  software that is enforced through CrowdStrike Falcon prevention
  policies and Microsoft Intune compliance policies. CrowdStrike
  Falcon monitors for and blocks execution of unauthorized software,
  peer-to-peer applications, remote access tools not sanctioned by
  the organization, and known vulnerable applications. Palo Alto
  NGFW App-ID technology identifies and controls application traffic
  traversing network boundaries, blocking unauthorized applications
  and protocols at the network perimeter. Cisco SD-WAN application-
  aware routing policies restrict traffic to approved application
  categories across branch and remote site connections.

  **Continuous Monitoring of System Functionality**
  System functionality is continuously monitored through Microsoft
  Sentinel analytics rules that detect installation of unauthorized
  software, activation of disabled services, and opening of
  restricted network ports. Azure Defender for Cloud provides
  adaptive application control recommendations that identify
  anomalous application execution patterns. Quarterly reviews of
  enabled system functions, ports, protocols, and services are
  conducted to verify alignment with the approved baseline under
  **CA-7** (Continuous Monitoring). Deviations from the approved
  configuration trigger remediation actions tracked through
  ServiceNow ITSM under **CM-3** (Configuration Change Control)
  and **SI-2** (Flaw Remediation) processes.

related_controls:
