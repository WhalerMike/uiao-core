control_id: PS-6
title: Access Agreements
family: Personnel Security (PS)
status: Implemented
implemented_by:
  - ServiceNow
  - Entra ID
  - SharePoint Policy Library
evidence:
  - artifact: Access Agreement Templates
    location: SharePoint > UIAO Compliance > Personnel > Access Agreements
    format: DOCX/PDF
  - artifact: Signed Agreement Records
    location: ServiceNow > Policy Management > Access Agreements
    format: CSV/PDF Export
parameters:
  - id: PARAM-PS-006-001
    text: Access agreements are completed before system access is granted
    value: Prior to access
  - id: PARAM-PS-006-002
    text: Access agreements are reviewed and re-signed periodically
    value: Annually
narrative: |
  **Access Agreement Requirements**
  The organization requires individuals to complete appropriate
  access agreements (e.g., nondisclosure agreements, acceptable
  use agreements, rules of behavior, conflict-of-interest
  agreements) before being granted access to the UIAO system
  (PARAM-PS-006-001).

  **Agreement Management**
  Access agreements are maintained in the ServiceNow Policy
  Management module with digital signature tracking. Entra ID
  Terms of Use Conditional Access policies enforce agreement
  acceptance as a prerequisite for system access. Agreements
  are reviewed and re-signed annually (PARAM-PS-006-002).

  **Agreement Updates**
  When access agreements are updated, the organization
  requires re-acknowledgment. Users who have not signed
  current agreements are restricted from access until
  compliance is achieved. Agreement status is tracked in
  the Executive Dashboard.
