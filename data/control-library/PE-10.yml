evidence:
  - artifact: Emergency Shutoff Procedures
    location: Facilities Management > Emergency Procedures
    format: DOCX/PDF
parameters:
  - id: PARAM-PE-010-001
    text: Frequency of emergency shutoff testing
    value: Annually
narrative: |
  **Emergency Shutoff Capability**
  The organization provides the capability to shut off power to UIAO system components in emergency situations. Emergency power-off switches are located at facility exits and within the data center. Shutoff mechanisms are clearly labeled and accessible.

  **Testing**
  Emergency shutoff capability is tested annually (PARAM-PE-010-001) as part of contingency plan testing. Tests verify that all critical systems can be safely powered down and that shutoff switches function correctly.

  **Safeguards**
  Emergency shutoff switches are protected from accidental activation by protective covers. Activation procedures are documented and included in facility emergency plans.
