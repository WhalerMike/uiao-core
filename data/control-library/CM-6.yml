control-id: CM-6
title: Configuration Settings
status: implemented
implemented-by:
  - azure-policy
  - microsoft-intune
narrative: |
{{ organization.name }} establishes and enforces secure configuration settings for the information system.

**Baseline Enforcement**
Azure Policy enforces the CIS Microsoft Azure Foundations Benchmark and FedRAMP Moderate baselines across all subscriptions and resources.

**Drift Detection & Remediation**
Daily compliance scans detect configuration drift. Non-compliant resources are automatically flagged, with DeployIfNotExists policies used for automatic remediation where possible.
parameters:
  baseline-standard: "CIS Azure Foundations + FedRAMP Moderate"
  scan-frequency: "Daily"
evidence:
  - type: configuration
    ref: CM-6-evidence
related_controls:
  - CM-2
  - SC-7

