narrative: |
  **Emergency Lighting**
  The organization employs and maintains automatic emergency lighting for the UIAO facility that activates in the event of a power outage or disruption. Emergency lighting covers all exits, corridors, server rooms, and data center spaces.

  **Testing and Maintenance**
  Emergency lighting systems are tested quarterly (PARAM-PE-012-001). Battery backup units are inspected and replaced per manufacturer schedules. Test results are documented and maintained by Facilities Management.
