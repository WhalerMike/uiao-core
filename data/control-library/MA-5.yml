narrative: |
  **Personnel Authorization**
  The organization establishes a process for authorizing
  maintenance personnel and maintains a list of authorized
  maintenance organizations or personnel for the UIAO system.
  All maintenance personnel require prior authorization before
  accessing system components (PARAM-MA-005-001). The authorized
  personnel list is maintained in the SharePoint Compliance
  Library and reviewed quarterly (PARAM-MA-005-003).

  **Access Controls for Maintenance Personnel**
  Authorized maintenance personnel are provisioned with
  dedicated CyberArk accounts that provide just-in-time
  privileged access scoped to specific maintenance tasks.
  Entra ID Conditional Access policies enforce MFA and
  device compliance for all maintenance sessions. Access
  is time-limited and automatically revoked upon task
  completion through CyberArk session management.

  **Escort Requirements**
  Maintenance personnel who lack appropriate security
  clearances or access authorizations are escorted and
  supervised during maintenance activities
  (PARAM-MA-005-002). Escort duties are assigned to
  authorized personnel with appropriate clearances.
  Escort and supervision activities are logged in
  ServiceNow Facilities module for audit purposes.

  **Monitoring and Oversight**
  All maintenance sessions are monitored through CyberArk
  Privileged Session Manager with full keystroke logging
  and video recording. Microsoft Defender for Endpoint
  provides real-time behavioral monitoring during
  maintenance windows. Anomalous maintenance activities
  trigger alerts to the SOC and initiate incident
  response procedures under IR-4.
