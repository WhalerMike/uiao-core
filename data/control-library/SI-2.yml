# NIST SP 800-53 Rev 5 Control Narrative
# Control: SI-2 — Flaw Remediation
# Schema: data/control-library
# Do NOT edit generated artifacts in docs/ or exports/; edit this file instead.

control_id: SI-2
title: Flaw Remediation
status: implemented

implemented_by:
  - VulnerabilityScanner
  - POAMTracker

evidence:
  - poam-findings.yml

narrative: |
  {{ organization.name }} implements SI-2 Flaw Remediation through an integrated
  vulnerability management and POA&M tracking capability.

  Vulnerability scanning is performed on a defined schedule using the designated
  VulnerabilityScanner component. Authenticated scans cover all in-scope system
  components within the authorization boundary and produce findings that are
  ingested into the POA&M tracking workflow.

  All findings are cross-referenced against the POA&M register maintained in
  poam-findings.yml by the POAMTracker component. Critical and high findings are
  subject to SLA-based remediation timelines:
    - Critical: remediated or mitigated within 15 days of discovery
    - High: remediated or mitigated within 30 days of discovery
    - Moderate: remediated or mitigated within 90 days of discovery
    - Low: remediated or mitigated within 180 days of discovery

  {{ organization.name }} reviews vulnerability scan results and POA&M status on
  a monthly basis. Findings that cannot be remediated within the defined SLA are
  escalated to the ISSO and documented with an approved deviation or risk
  acceptance in the POA&M register.

  Patches and updates are tested in a staging environment prior to deployment to
  production. Emergency patches for Critical findings may be applied directly to
  production following change-control expedited approval and are back-documented
  within 72 hours.

parameters:
  scan_schedule: "weekly"
  critical_sla_days: 15
  high_sla_days: 30
  moderate_sla_days: 90
  low_sla_days: 180

related_controls:
  - RA-5   # Vulnerability Monitoring and Scanning
  - CA-7   # Continuous Monitoring
  - CM-6   # Configuration Settings
  - IR-4   # Incident Handling
  - SA-11  # Developer Testing and Evaluation
