narrative: |
  **Vulnerability Monitoring Overview**

  The UIAO system implements continuous vulnerability monitoring
  and scanning using Microsoft Defender for Cloud and Microsoft
  Defender for Endpoint Threat and Vulnerability Management (TVM).
  Vulnerability scanning covers all system components including
  Azure infrastructure, endpoints managed through Intune, web
  applications, and database services. Scanning identifies
  software flaws, missing patches, misconfigurations, and known
  exploitable vulnerabilities referenced by CVE identifiers.

  **Scanning Frequency and Coverage**

  Automated vulnerability assessments run continuously through
  Defender for Cloud for Azure resources. Endpoint vulnerability
  scans execute through Defender for Endpoint TVM on all
  Intune-managed devices. Operating system scans are conducted
  at least monthly and web application scans at least weekly
  (PARAM-RA-005-001). Ad hoc scans are triggered when new
  critical vulnerabilities are announced (e.g., CISA KEV catalog
  additions) or after significant system changes.

  **Remediation and Tracking**

  Discovered vulnerabilities are automatically ingested into
  ServiceNow Vulnerability Response module for triage and
  remediation tracking. Remediation timelines follow the
  organization's vulnerability management SLA: critical
  vulnerabilities within 15 days, high within 30 days, and
  moderate within 90 days (PARAM-RA-005-002). Remediation
  progress is tracked through ServiceNow workflows with
  automated escalation for overdue items.

  **Reporting and Correlation**

  Microsoft Sentinel aggregates vulnerability data from Defender
  for Cloud and Defender for Endpoint into the Vulnerability
  Overview workbook. Scan results are correlated with threat
  intelligence to prioritize actively exploited vulnerabilities.
  Results are shared with the ISSO, System Owner, SOC Team,
  and CISO (PARAM-RA-005-003) through automated reporting and
  the Executive Dashboard compliance posture score.

