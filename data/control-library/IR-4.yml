control-id: IR-4
title: Incident Handling
status: implemented
implemented-by:
  - microsoft-sentinel
  - defender-for-cloud
narrative: |
  **Incident Lifecycle Management**
  The organization implements an incident handling capability for security incidents that includes preparation, detection, analysis, containment, recovery, and user response activities. Microsoft Sentinel serves as the primary SOAR (Security Orchestration, Automation, and Response) platform.

  **Automated Response (Playbooks)**
  Logic Apps are used as Sentinel Playbooks to automate initial containment steps, such as disabling a compromised user account in Entra ID or isolating a suspicious VM. This reduces the mean time to remediate (MTTR) for known threat patterns.
parameters:
  soar-platform: "Microsoft Sentinel"
  containment-time-target: "60 Minutes for High Alerts"
evidence:
