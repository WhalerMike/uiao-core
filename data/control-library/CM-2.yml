# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : CM-2
# Title      : Baseline Configuration
# Schema     : data/control-library (uiao-core canonical format)

control_id: CM-2
title: Baseline Configuration
family: Configuration Management
status: implemented

implemented_by:
  - terraform-iac-templates
  - github-actions-cicd

evidence:
  - git-commit-history
  - configuration-drift-reports

parameters:
  - id: cm_2_review_policy
    description: >-
      Requirement for at least one independent maintainer to approve
      baseline changes.
    value: "Mandatory peer review"

narrative: |
  **Infrastructure as Code (IaC) Source of Truth**
  The authoritative baseline for the information system is maintained as
  **Terraform and Bicep** templates within the version-controlled `uiao-core`
  repository.

  **Change Control and Integrity**
  Any deviation from the baseline requires a formal **Pull Request (PR)**.
  Automated GitHub Actions workflows perform security linting and
  plan-validation before any change is applied.  The "as-deployed" state is
  verified against this baseline daily to detect configuration drift, with
  all discrepancies logged in **Microsoft Sentinel**.

related_controls:
  - CM-3  # Configuration Change Control
  - CM-6  # Configuration Settings
  - SA-10 # Developer Configuration Management
