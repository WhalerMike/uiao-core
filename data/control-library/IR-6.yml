control-id: IR-6
title: Incident Reporting
status: implemented
implemented-by:
  - microsoft-sentinel
  - azure-service-health
narrative: |
  **Reporting Requirements and Timelines**
  The organization reports security incidents to the designated authorities (e.g., US-CERT, Parent Agency SOC) within the required timeframes. High-severity incidents are escalated to the ISSO immediately upon confirmation.

  **Automated Notification Workflows**
  Sentinel automation rules are configured to send real-time alerts via Email and Teams to the incident response team. These notifications include deep links to the affected resources and the initial threat assessment data.
parameters:
  reporting-window: "1 Hour (Critical) / 24 Hours (General)"
  authority-contact: "Agency SOC / US-CERT"
evidence:
  - type: logs
    ref: incident-notification-audit-trail
related_controls:
  - IR-4
  - AU-2
