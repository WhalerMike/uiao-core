# CP-3 - Contingency Training
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: Contingency Planning (CP)
# Last Reviewed: 2025-06-15

control_id: CP-3
family: Contingency Planning
title: Contingency Training
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Role-Based Contingency Training Program**
  The UIAO platform provides contingency training to personnel with
  assigned contingency roles and responsibilities within 10 days of
  assuming their contingency role, when required by system changes,
  and annually thereafter. Training covers the organizations
  contingency plan, individual recovery responsibilities, Azure
  cloud failover procedures, and communication protocols during
  contingency events. Training content addresses recovery of Azure
  Active Directory (Entra ID) identity services, Microsoft 365
  workloads, Microsoft Sentinel SIEM operations, and CyberArk
  Privileged Access Security vault restoration procedures aligned
  with **AT-3** (Role-Based Security Training) requirements.

  **Practical Exercise Integration**
  Contingency training incorporates practical exercises derived from
  **CP-4** (Contingency Plan Testing) scenarios to reinforce
  theoretical knowledge with hands-on experience. Personnel practice
  Azure region failover procedures, Palo Alto NGFW redundancy
  activation, Cisco SD-WAN alternate path routing configuration,
  and CrowdStrike Falcon endpoint recovery workflows. Tabletop
  exercises simulate realistic contingency scenarios including
  ransomware events, data center outages, and identity provider
  compromise to validate personnel readiness and decision-making
  capabilities under stress.

  **Training Documentation and Compliance Tracking**
  All contingency training activities are documented and tracked
  through ServiceNow ITSM learning management integration. Training
  completion records include participant names, dates, topics covered,
  and assessment results. The ISSO monitors training compliance
  quarterly and reports completion metrics as part of the continuous
  monitoring program under **CA-7** (Continuous Monitoring).
  Training deficiencies are tracked as POAMs in ServiceNow and
  addressed within established remediation timelines under **PM-4**
  (Plan of Action and Milestones) processes.

