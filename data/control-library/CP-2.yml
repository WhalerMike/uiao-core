control-id: CP-2
title: Contingency Plan
status: implemented
implemented-by:
  - azure-site-recovery
  - azure-traffic-manager
narrative: |
  **Business Continuity and Disaster Recovery (BCDR)**
  The organization maintains a formal Contingency Plan that coordinates recovery efforts for essential missions and business functions. Azure Site Recovery (ASR) is utilized to provide automated replication of virtual machines to a secondary geographic region.

  **Plan Testing and Update**
  The plan is tested annually through tabletop exercises and functional failover tests. Results are documented in a formal After Action Report (AAR), and the plan is updated to address any identified gaps in the recovery time objective (RTO).
