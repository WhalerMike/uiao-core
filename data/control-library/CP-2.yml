control-id: CP-2
title: Contingency Plan
status: implemented
implemented-by:
  - azure-site-recovery
  - azure-traffic-manager
narrative: |
  {{ organization.name }} maintains a formal Contingency Plan for system recovery and continuity of operations.

  **Business Continuity & Disaster Recovery**
  Azure Site Recovery provides automated replication of critical virtual machines to a secondary geographic region. Recovery Time Objective (RTO) and Recovery Point Objective (RPO) targets are defined and tested.

  **Plan Maintenance**
  The contingency plan is reviewed and updated annually or after significant system changes. Tabletop exercises and functional failover tests are conducted with documented After-Action Reports.
parameters:
  recovery-time-objective: "4 Hours"
  test-frequency: "Annual"
evidence:
  - type: configuration
    ref: CP-2-evidence
related_controls:
