narrative: |
  **Controlled Maintenance Overview**

  The organization schedules, documents, and reviews records of
  maintenance and repairs on UIAO system components in accordance
  with manufacturer specifications and organizational requirements.
  All maintenance activities are planned through ServiceNow Change
  Management with required approvals prior to execution
  (PARAM-MA-002-001).

  **Maintenance Scheduling and Approval**

  Routine maintenance windows are established through the
  ServiceNow maintenance calendar. Change requests document the
  maintenance scope, affected components, rollback procedures,
  and post-maintenance verification steps. The Change Advisory
  Board (CAB) reviews and approves standard changes. Emergency
  maintenance follows expedited approval procedures with
  emergency CAB authorization within 2 hours (PARAM-MA-002-002).

  **Automated Patch Management**

  Azure Update Manager orchestrates patching for Azure virtual
  machines and Arc-enabled servers. Intune manages endpoint
  patching for Windows and macOS devices through update rings
  and compliance policies. Patch deployment follows the
  vulnerability remediation SLA defined in RA-5 with critical
  patches deployed within 15 days and high within 30 days.

  **Maintenance Records and Monitoring**

  All maintenance activities are logged in ServiceNow with
  timestamps, personnel involved, components affected, and
  actions taken. Microsoft Sentinel monitors for unauthorized
  maintenance activities through correlation of change records
  with system modification events. Maintenance records are
  retained for at least three years (PARAM-MA-002-003) in
  compliance with federal records management requirements.

