# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : AT-3
# Title      : Role-Based Training
# Schema     : data/control-library (uiao-core canonical format)

control_id: AT-3
title: Role-Based Training
status: implemented

implemented_by:
  - LearningManagementSystem
  - IdentityProvider

evidence:
  - role-based-training-completion-report
  - privileged-user-training-records
  - training-curriculum-review-log

parameters:
  - id: role-training-completion-window
    description: >-
      Maximum number of calendar days after role assignment within
      which personnel must complete all role-specific security
      training modules.
    value: "{{ parameters['role-training-completion-window'] }}"
  - id: role-training-refresh-interval
    description: >-
      Maximum number of calendar months between mandatory refresher
      training sessions for personnel in security-significant roles.
    value: "{{ parameters['role-training-refresh-interval'] }}"

narrative: |
  {{ organization.name }} provides role-based security and privacy
  training to all personnel with assigned security roles or access
  to systems processing controlled unclassified information (CUI)
  before authorising access and at defined intervals thereafter.

  **Role Identification and Curriculum Mapping**
  The ISSO maintains a role-to-training matrix that maps each
  security-significant role (system administrator, security analyst,
  database administrator, network engineer, developer, auditor) to
  a set of required training modules.  The matrix is reviewed and
  updated annually or whenever significant system changes occur.

  **Initial Role-Based Training**
  Within {{ parameters['role-training-completion-window'] }} days of
  being assigned a privileged or security-significant role, personnel
  must complete all mapped training modules in the
  LearningManagementSystem.  Topics include secure configuration
  management, least privilege, incident response procedures, log
  review, vulnerability management, and threats specific to the
  role's technical domain.

  **Refresher Training**
  Personnel in security-significant roles complete refresher training
  every {{ parameters['role-training-refresh-interval'] }} months.
  Refresher content is updated to address emerging threats, lessons
  learned from incidents, and changes to organizational policy.

  **Practical Exercises**
  Role-based training includes hands-on exercises such as tabletop
  incident response drills, red-team/blue-team simulations, and
  secure-coding challenges appropriate to each role.  Exercise
  results are documented and fed into continuous improvement.

  **Compliance Enforcement**
  The IdentityProvider enforces training compliance as an access
  gate: accounts for personnel who have not completed required
  role-based training within the defined window are automatically
  flagged and access privileges are suspended until training is
  verified complete.  Completion status is reported to the ISSO
  monthly.

related_controls:
  - AT-2  # Literacy Training and Awareness
  - AC-2  # Account Management
  - AC-6  # Least Privilege
  - IR-2  # Incident Response Training
