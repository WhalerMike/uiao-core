# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : AT-3
# Title      : Role-Based Security Training
# Schema     : data/control-library (uiao-core canonical format)

control_id: AT-3
title: Role-Based Security Training
family: Awareness and Training
status: implemented

implemented_by:
  - enterprise-lms
  - identity-governance-workflows

evidence:
  - training-completion-certificates
  - privileged-access-attestation-report

parameters:
  - id: at_3_refresher_frequency
    description: >-
      How often role-based training must be re-certified.
    value: "Annual"

narrative: |
  **Specialized Curricula by Role**
  The organization provides specialized security training based on user
  roles (e.g., Developers, SysAdmins, End Users).

  **Automated Compliance Tracking**
  Training is delivered and tracked via an integrated Learning Management
  System (LMS).  Access to privileged environments (via **IA-2** and
  **AC-6**) is programmatically gated by the completion of the required
  annual training modules.  Failure to complete training within the 30-day
  window results in automatic suspension of administrative tokens.

related_controls:
  - AT-2  # Literacy Training and Awareness
  - AC-2  # Account Management
  - AC-6  # Least Privilege
  - IA-2  # Identification and Authentication
