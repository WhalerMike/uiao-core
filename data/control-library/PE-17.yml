narrative: |
  **Alternate Work Site Controls**
  The organization employs security controls at alternate work sites (telework locations) equivalent to those at the primary facility. Microsoft Intune enforces device compliance policies, BitLocker encryption, and endpoint protection on all managed devices regardless of location.

  **Remote Access Security**
  Azure Virtual Desktop provides secure access to UIAO resources from alternate work sites. All remote connections require MFA through EntraID and traverse encrypted VPN tunnels. Split tunneling is prohibited.

  **Assessment**
  Alternate work site security is assessed annually (PARAM-PE-017-001). Assessments verify device compliance, network security, and physical security of the remote work environment.
