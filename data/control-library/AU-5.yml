      affected system isolated if audit cannot be restored within 1 hour

narrative: |
  **Automated Detection of Audit Logging Failures**
  The organization alerts designated personnel in the event of an
  audit logging process failure and takes defined additional actions
  to ensure audit continuity. Microsoft Sentinel ingestion health
  monitoring rules continuously validate that all configured data
  connectors are actively forwarding audit records at expected
  intervals. Splunk deployment server and forwarder health dashboards
  monitor agent connectivity and indexing throughput. Any detected
  interruption in audit log ingestion triggers automated alerts to
  SOC analysts and the ISSO within minutes, supporting **SI-4**
  (System Monitoring) real-time detection capabilities.

  **Incident Response and Escalation Procedures**
  Upon detection of an audit logging failure, a ServiceNow ITSM
  Priority 2 incident is automatically created with pre-populated
  remediation runbook steps. System administrators are dispatched to
  restore audit logging within the defined one-hour restoration
  window. If audit logging cannot be restored within this timeframe,
  the affected system is isolated from organizational network segments
  via Cisco Catalyst VLAN quarantine policies to prevent unaudited
  activity, directly supporting **IR-4** (Incident Handling) and
  **AC-4** (Information Flow Enforcement) requirements.

  **Audit Continuity and Failover Architecture**
  The dual-SIEM architecture (Sentinel and Splunk) provides inherent
  audit logging redundancy. If the primary Sentinel ingestion path
  fails, Splunk continues to collect and retain audit records from
  shared log forwarding infrastructure. This failover capability
  ensures that no audit record gaps occur during single-platform
  outages, supporting **AU-4** (Audit Log Storage Capacity) and
  **CP-2** (Contingency Plan) continuity objectives.

