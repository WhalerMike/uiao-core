# NIST SP 800-53 Rev 5 - Control Narrative
# Control ID : AC-14
# Title      : Permitted Actions Without Identification or Authentication
# Schema     : data/control-library (uiao-core canonical format)

control_id: AC-14
title: Permitted Actions Without Identification or Authentication
family: Access Control
status: implemented

implemented_by:
  - entra-id
  - cisco-catalyst
  - palo-alto-ngfw

evidence:
  - entra-id-anonymous-access-review-report
  - network-access-control-policy-documentation
  - palo-alto-unauthenticated-traffic-policy-baseline

parameters:
  - id: ac_14_permitted_unauthenticated_actions
    description: >-
      Enumerated list of system actions explicitly authorized without
      identification or authentication, as approved by the organization's
      authorizing official.
    value: "Public-facing static content delivery; network ICMP health probes"

narrative: |
  **Strict Minimization of Unauthenticated Access**
  The organization explicitly identifies and restricts the set of actions
  that may be performed on information systems without requiring
  identification or authentication. Entra ID enforces authentication as
  a prerequisite for access to all organizational applications, data
  repositories, and administrative interfaces, with the only permitted
  unauthenticated actions being limited to public-facing static content
  delivery and network-layer ICMP health probes as documented in
  ac_14_permitted_unauthenticated_actions. This posture directly
  supports **AC-3** (Access Enforcement) and **IA-2** (Identification
  and Authentication).

  **Network-Layer Enforcement**
  Cisco Catalyst network access control policies and Palo Alto NGFW
  security rules enforce that all traffic destined for internal resources
  passes through authenticated and authorized channels. Unauthenticated
  traffic is blocked at perimeter ingress points, with Palo Alto App-ID
  and User-ID policies ensuring no unauthenticated lateral movement is
  possible within the enterprise network. This layer-2/layer-3 enforcement
  complements identity-layer controls in **IA-3** (Device Identification
  and Authentication).

  **Periodic Review and Documentation**
  The organization conducts an annual review of all permitted
  unauthenticated actions as part of the continuous monitoring program.
  Any newly identified business requirement for unauthenticated access
  is subject to formal risk acceptance and authorizing official approval
  before implementation, ensuring alignment with **AC-1** (Access Control
  Policy) and the overall Zero Trust architecture principle of explicit
  verification.

related_controls:
