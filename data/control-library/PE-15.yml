narrative: |
  **Water Detection**
  The organization protects the UIAO system from damage resulting from water leakage. Water detection sensors are installed under raised floors, near HVAC units, and adjacent to plumbing in data center and server room areas.

  **Automatic Response**
  Water detection sensors trigger immediate alerts to the building management system and Facilities Management. Automatic shutoff valves isolate water sources when leaks are detected near critical equipment.

  **Testing**
  Water detection systems are tested quarterly (PARAM-PE-015-001). Sensor functionality and alert routing are verified during each test cycle.
