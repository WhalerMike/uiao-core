# SI-7 - Software, Firmware, and Information Integrity
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: System and Information Integrity (SI)
# Last Reviewed: 2025-06-15

control_id: SI-7
family: System and Information Integrity
title: Software, Firmware, and Information Integrity
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Integrity Verification Mechanisms**
  The UIAO platform employs integrity verification tools to detect
  unauthorized changes to software, firmware, and information.
  CrowdStrike Falcon provides file integrity monitoring (FIM)
  capabilities across all managed endpoints, detecting unauthorized
  modifications to critical system files, configuration files, and
  registry entries. Microsoft Defender for Cloud monitors Azure
  virtual machine file integrity through the Change Tracking and
  Inventory solution, alerting on unexpected modifications to
  operating system files, application binaries, and configuration
  data aligned with **CM-3** (Configuration Change Control)
  requirements.

  **Software and Firmware Authenticity**
  All software deployments to UIAO managed endpoints are delivered
  through Microsoft Intune application management, which enforces
  code signing verification for Windows applications and validates
  package integrity through hash verification. Azure DevOps
  pipelines enforce signed commits and artifact integrity
  verification for all UIAO platform code deployments. Firmware
  updates for network devices including Palo Alto NGFW and Cisco
  SD-WAN are validated against vendor-published checksums before
  deployment. BitLocker Secure Boot on managed endpoints ensures
  firmware and boot process integrity through TPM-based
  attestation under **SC-13** (Cryptographic Protection)
  requirements.

  **Integrity Violation Response**
  Integrity violations detected by CrowdStrike FIM or Defender
  for Cloud trigger automated alerts forwarded to Microsoft
  Sentinel for correlation and incident response under **IR-4**
  (Incident Handling) procedures. CrowdStrike Falcon provides
  automated response actions including process termination and
  endpoint isolation for confirmed integrity violations.
  Integrity monitoring results are reviewed as part of the
  continuous monitoring program under **CA-7** (Continuous
  Monitoring) and integrity baselines are updated following
  authorized changes approved through **CM-3** (Configuration
  Change Control) processes.

related_controls:
  - CM-3  # Configuration Change Control
  - SC-13 # Cryptographic Protection
  - IR-4  # Incident Handling
  - CA-7  # Continuous Monitoring
  - SI-3  # Malicious Code Protection
  - CM-6  # Configuration Settings

automation:
