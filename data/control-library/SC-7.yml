# NIST SP 800-53 Rev 5 — Control Narrative
# Control ID : SC-7
# Title      : Boundary Protection
# Schema     : data/control-library (uiao-core canonical format)

control_id: SC-7
title: Boundary Protection
status: implemented

implemented_by:
  - NetworkOverlay
  - FirewallCluster

evidence:
  - network-boundary-diagram
  - firewall-rule-baseline
  - boundary-crossing-event-log

parameters:
  - id: boundary-rule-review-frequency
    description: >-
      Frequency at which firewall and boundary-protection policy rules are
      formally reviewed against the approved traffic matrix and updated to
      reflect current mission requirements.
    value: "{{ parameters['boundary-rule-review-frequency'] }}"
  - id: inventory-source
    description: >-
      Authoritative asset inventory source used to validate boundary
      membership and enforce deny-by-default posture for unrecognised
      endpoints attempting to traverse an authorization boundary.
    value: "{{ parameters['inventory-source'] }}"

narrative: |
  {{ organization.name }} enforces boundary protection at all external and
  internal network demarcation points in accordance with NIST SP 800-53
  Rev 5 SC-7.  The overlay-based architecture provides cryptographically
  enforced, auditable boundaries between all security zones.

  **External Boundary Monitoring**
  All ingress and egress traffic crossing the authorization boundary is
  inspected by the FirewallCluster, which enforces an explicit-deny posture:
  only traffic matching approved rules in the agency traffic matrix is
  permitted.  The cluster performs stateful deep-packet inspection and
  forwards anomalous flows to the telemetry plane (Microsoft Sentinel) for
  near-real-time alerting and automated incident response.  Firewall policy
  rules are reviewed on a {{ parameters['boundary-rule-review-frequency'] }}
  cadence, version-controlled, and documented in the firewall-rule-baseline
  artifact.

  **Internal Boundary Segmentation**
  The UIAO NetworkOverlay partitions the network into discrete security zones
  using VRF-based macro-segmentation on Cisco Catalyst SD-WAN.  Each VRF
  represents an authorization boundary segment (e.g., management, production,
  guest).  Inter-VRF routing is denied by default; approved flows require an
  explicit policy statement reviewed during each change-management cycle.
  This architecture ensures that a breach in one zone cannot propagate
  laterally without traversing a monitored boundary checkpoint.

  **Overlay Architecture and mTLS Enforcement**
  The NetworkOverlay provides a logical boundary layer independent of the
  physical topology.  All inter-site traffic is carried over mTLS-anchored
  tunnels (AES-256-GCM), ensuring that boundary traversal is authenticated,
  encrypted, and auditable.  Boundary-crossing events are correlated with
  the deterministic asset inventory sourced from
  {{ parameters['inventory-source'] }}, enabling {{ organization.name }}
  to detect and quarantine unauthorized endpoints before they traverse a
  boundary.  Endpoints absent from the authoritative inventory are
  automatically blocked and flagged for investigation.

  **Deny-by-Default and Change Control**
  Every boundary policy begins from a deny-all baseline.  Permitted traffic
  flows are individually documented, justified in a change-control record,
  and approved by a designated network-security authorizer before activation.
  Emergency rule additions follow an expedited change-control process and
  are back-documented within 24 hours.  The complete rule history is
  retained in version control and forms part of the firewall-rule-baseline
  evidence artifact.

  **Evidence and Audit Artefacts**
  - network-boundary-diagram: Architectural diagram depicting all external
    and internal authorization boundaries, demarcation points, FirewallCluster
    placement, and NetworkOverlay VRF topology.
  - firewall-rule-baseline: Version-controlled export of all boundary
    protection rules, their justifications, approval records, and last-review
    dates.
  - boundary-crossing-event-log: Continuous SIEM log of all boundary traversal
    events, permit/deny decisions, and quarantine actions keyed to the
    authoritative asset inventory.

