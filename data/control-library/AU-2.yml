control-id: AU-2
title: Event Logging
status: implemented
implemented-by:
  - microsoft-sentinel
  - azure-monitor
narrative: |
{{ organization.name }} determines the events to be logged within the system.

**Comprehensive Audit Coverage**
Events include successful and failed logons, privilege use (PIM elevations), security group changes, and configuration modifications. 

**Centralized Collection**
All audit events are streamed in real-time to a Log Analytics workspace via Azure Diagnostic Settings enforced by Azure Policy. This creates a tamper-resistant telemetry plane for security and compliance.
parameters:
  collection-method: "Azure Diagnostic Settings"
  log-retention-period: "365 days"
evidence:
  - type: configuration
    ref: AU-2-evidence
related_controls:
  - AU-2
  - SI-4

