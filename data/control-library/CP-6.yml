# CP-6 - Alternate Storage Site
# NIST 800-53 Rev 5 | UIAO-Core Control Library
# Control Family: Contingency Planning (CP)
# Last Reviewed: 2025-06-15

control_id: CP-6
family: Contingency Planning
title: Alternate Storage Site
status: implemented
responsible_role: ISSO
implementation_status: fully-implemented

control_narrative: |
  **Geographically Separated Alternate Storage**
  The UIAO platform establishes alternate storage sites through Azure
  geo-redundant storage (GRS) replication to geographically separated
  Azure paired regions. All critical system data including Azure
  Active Directory (Entra ID) configuration data, Microsoft 365
  workload backups, Microsoft Sentinel log archives, and application
  databases are replicated asynchronously to the designated alternate
  Azure region. The alternate storage site is geographically separated
  from the primary site to mitigate the risk of a single geographic
  event impacting both locations, satisfying separation requirements
  under **CP-2** (Contingency Plan) recovery strategy.

  **Data Protection and Accessibility**
  Data stored at the alternate site maintains equivalent security
  protections as the primary site through Azure Storage Service
  Encryption (SSE) with Microsoft-managed keys and Azure Private
  Endpoints restricting network access. CyberArk Privileged Access
  Security vault data is replicated to the disaster recovery vault
  instance in the alternate region with encrypted replication
  channels. Palo Alto Panorama configuration backups and Cisco
  SD-WAN vManage configuration snapshots are stored in geo-redundant
  Azure Blob Storage containers. Backup accessibility is validated
  during **CP-4** (Contingency Plan Testing) exercises to confirm
  data integrity and recovery capability.

  **Alternate Storage Site Agreements and Monitoring**
  The alternate storage capability is provided through the Azure
  cloud service provider agreement which includes contractual
  commitments for data replication, availability SLAs, and geographic
  separation guarantees. Azure Monitor and Storage Analytics provide
  continuous monitoring of replication health, lag times, and storage
  availability metrics. Replication failures trigger automated alerts
  through Microsoft Sentinel for immediate investigation by the
  Cloud Infrastructure team. Storage site configurations are reviewed
  annually as part of **CP-2** (Contingency Plan) updates and
  validated through **CP-4** (Contingency Plan Testing) exercises.

