# UIAO Control Library - AC-17 Remote Access
# NIST SP 800-53 Rev 5 Control Implementation Narrative
# Generated for FedRAMP Moderate / 20x Phase 2 Pilot

control-id: AC-17
title: Remote Access
status: implemented

narrative: >-
  {{ organization.name }} restricts remote access to information systems and
  enforces multi-factor authentication for all remote sessions. The MFA
  requirement applied to remote connections is: {{ parameters['mfa-requirement'] }}.
  All remote access traverses the VPN Gateway, which establishes encrypted
  tunnels and enforces split-tunnel restrictions to ensure that no traffic
  bypasses agency security controls. The Identity Provider authenticates each
  remote user and device prior to session establishment, applying conditional
  access policies that verify MFA completion, device health, and authorized
  role assignment before permitting connectivity. All remote session events —
  including authentication attempts, session initiation, duration, and
  termination — are forwarded in real time to the SIEM Overlay for centralized
  log aggregation, correlation, and anomaly detection. The SIEM Overlay
  generates alerts for unauthorized access attempts and produces the audit
  records required for continuous monitoring and FedRAMP annual assessments.

implemented-by:
  - VPNGateway
  - IdentityProvider
  - SIEMOverlay

evidence:
  - remote-access-audit-log
