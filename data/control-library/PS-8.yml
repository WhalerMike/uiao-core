evidence:
  - artifact: Sanctions Process Documentation
    location: SharePoint > UIAO Compliance > Personnel > Sanctions
    format: DOCX/PDF
  - artifact: Sanctions Tracking Records
    location: ServiceNow > HR Module > Disciplinary Actions
