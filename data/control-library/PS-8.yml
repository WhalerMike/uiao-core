parameters:
  - id: PARAM-PS-008-001
    text: Formal sanctions process is employed for personnel failing to comply
    value: Formal process per HR policy
  - id: PARAM-PS-008-002
    text: Sanctions are initiated within defined timeframe
    value: Within 5 business days of confirmed violation
narrative: |
  **Sanctions Process**
  The organization employs a formal sanctions process for
  individuals failing to comply with established information
  security and privacy policies and procedures
  (PARAM-PS-008-001). Sanctions are initiated within 5
  business days of a confirmed policy violation
  (PARAM-PS-008-002).

  **Notification and Documentation**
  The ISSO and HR are notified when sanctions are initiated.
  All sanctions actions are documented in ServiceNow HR
  module with appropriate confidentiality protections.
  Sanctions may range from verbal counseling to termination
  depending on severity.

  **Integration with Incident Response**
  Security violations identified through Microsoft Sentinel
  alerts or incident response processes under IR-4 may
  trigger the sanctions process. The sanctions process
  supports deterrence of insider threats and reinforces
  accountability for security compliance.
