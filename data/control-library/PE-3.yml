narrative: |
  **Access Control Mechanisms**
  The organization enforces physical access authorizations at facility entry and exit points using badge readers, biometric scanners, and security guards. All UIAO-designated facilities employ multi-factor physical authentication for server rooms and data centers.

  **Access Verification**
  Physical access devices (badges, keys, PINs) are verified against the PE-2 authorization list before granting entry. Unauthorized access attempts trigger real-time alerts to the Security Operations Center. CCTV cameras monitor all entry points continuously.

  **Visitor Management**
  Visitors are escorted at all times within restricted areas. Visitor badges are issued at reception, logged in the visitor management system, and collected upon departure. Visitor access is limited to approved areas only.

  **Device Inventory**
  Physical access devices are inventoried quarterly (PARAM-PE-003-001). Lost, stolen, or compromised devices are deactivated immediately and replaced through the Badge Management System.
