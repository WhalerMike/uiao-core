control_id: PS-5
title: Personnel Transfer
family: Personnel Security (PS)
status: Implemented
implemented_by:
  - Entra ID
  - ServiceNow
evidence:
  - artifact: Transfer Checklist Records
    location: ServiceNow > HR Module > Transfers
    format: CSV/PDF Export
  - artifact: Access Modification Logs
    location: Entra ID > Audit Logs > Role Changes
    format: Portal Screenshot
parameters:
  - id: PARAM-PS-005-001
    text: Access authorizations are reviewed upon personnel transfer
    value: Within 5 business days
  - id: PARAM-PS-005-002
    text: Access is modified to match new position requirements
    value: Within 5 business days of transfer
narrative: |
  **Transfer Process**
  The organization reviews and confirms ongoing operational
  need for current logical and physical access authorizations
  when individuals are reassigned or transferred to other
  positions within the organization. Access reviews occur
  within 5 business days of transfer (PARAM-PS-005-001).

  **Access Modification**
  Access authorizations are modified as needed to correspond
  with any changes in operational need due to reassignment
  or transfer (PARAM-PS-005-002). Entra ID group memberships
  and role assignments are updated through ServiceNow change
  requests to reflect new position requirements.

  **Role Transition**
  The transfer process ensures separation of duties is
  maintained per AC-5. Previous role access is removed
  before or concurrent with new role provisioning to
  prevent accumulation of excessive privileges.
related_controls:
  - PS-1  # Personnel Security Policy
  - PS-4  # Personnel Termination
  - AC-2  # Account Management
  - AC-5  # Separation of Duties
