# Agency-specific POA&M findings (manual overrides)
# These entries are merged into the auto-detected gaps from
# unified_compliance_matrix.yml and fedramp-20x.yml by
# scripts/generate_poam.py
#
# Each entry should include:
#   title: Short description of the gap
#   control-ids: List of NIST 800-53 control IDs
#   description: Detailed description of the finding
#   severity: high | medium | low
#   remediation: Planned remediation action
#   source: Origin of the finding (e.g., "manual-review")

- title: "Example: Legacy TIC 2.0 path gap"
  control-ids: ["SC-7"]
  description: "Unmonitored egress from legacy network segment"
  severity: "high"
  remediation: "Implement SD-WAN policy update by Q3 2026"
  source: "manual-review"

- title: "Example: Incomplete CUI marking in collaboration tools"
  control-ids: ["SC-13", "MP-4"]
  description: "Sensitivity labels not enforced on all SharePoint sites"
  severity: "medium"
  remediation: "Deploy Purview sensitivity labels to remaining sites"
  source: "manual-review"
