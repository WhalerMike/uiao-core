# UIAO TIC 3.0 Roadmap and Modernization Timeline Data

workstreams:
  - id: A
    name: Identity (Entra ID + ICAM)
  - id: B
    name: Network (Cisco Catalyst SD-WAN)
  - id: C
    name: Addressing (InfoBlox IPAM)
  - id: D
    name: Telemetry + Location Services

tic3_phases:
  - id: phase-0
    name: Current State (TIC 2.0)
    tasks:
      - Centralized hairpin
      - AD-centric identity
      - Fragmented IPAM
      - No INR
      - Limited telemetry
  - id: phase-1
    name: Foundations
    identity:
      - Entra ID baseline
      - Conditional Access baseline
    network:
      - SD-WAN pilot
      - DIA pilot
    ipam:
      - InfoBlox authoritative baseline
    telemetry:
      - M365 + SD-WAN telemetry pipeline
    tic:
      - TIC 3.0 Cloud Use Case request
  - id: phase-2
    name: Hybrid TIC
    identity:
      - ICAM governance
      - PIM + Access Reviews
    network:
      - Cloud OnRamp for M365
      - Segmentation baseline
    ipam:
      - Cloud IPAM reconciliation
    telemetry:
      - E911 location mapping
      - IPAM to Telemetry correlation
    tic:
      - TIC 3.0 Branch Use Case request
  - id: phase-3
    name: TIC 3.0 Cloud + Branch
    identity:
      - Full Zero Trust identity enforcement
    network:
      - DIA everywhere
      - INR production
    ipam:
      - Multi-cloud IPAM governance
    telemetry:
      - CDM/CLAW integration
      - SLA monitoring
    tic:
      - Retire TIC 2.0 hairpins
  - id: phase-4
    name: Optimization
    items:
      - Automated routing decisions
      - Continuous monitoring
      - Executive dashboards
      - Full ICAM maturity
      - Multi-cloud optimization

implementation_phases:
  - id: phase-0
    name: Canon Alignment
    description: Socialize 17-Point Canon and architecture with leadership
  - id: phase-1
    name: Discovery and Baseline
    description: Inventory identity, addressing, overlay, and telemetry capabilities
  - id: phase-2
    name: Pilot Build
    description: Implement constrained pilot with identity-derived addressing
  - id: phase-3
    name: Validation and Resilience
    description: Test conversation continuity, failover, attestation
  - id: phase-4
    name: Scale and Harden
    description: Expand to more sites and workloads
  - id: phase-5
    name: Enterprise and Federate
    description: Extend to partners and cross-agency trust fabrics

timeline:
  duration: 6 months
  milestones:
    - id: M1
      month: 1
      deliverables:
        - workstream: A
          item: Entra ID Baseline Complete
          dependencies: []
        - workstream: B
          item: SD-WAN HLD Complete
          dependencies: []
        - workstream: C
          item: IPAM HLD Complete
          dependencies: []
        - workstream: D
          item: Telemetry HLD Complete
          dependencies: []
    - id: M2
      month: 2
      deliverables:
        - workstream: A
          item: Conditional Access Baseline
          dependencies: [M1-A]
        - workstream: B
          item: SD-WAN LLD Complete
          dependencies: [M1-B]
        - workstream: C
          item: DNS/DHCP Modernization Plan
          dependencies: [M1-C]
        - workstream: D
          item: Location Services Modernization Plan
          dependencies: [M1-D]
    - id: M3
      month: 3
      deliverables:
        - workstream: A
          item: MFA/SSPR Modernization
          dependencies: [M2-A]
        - workstream: B
          item: DIA Pilot Branches Live
          dependencies: [M2-B]
        - workstream: B
          item: Cloud OnRamp for M365 Pilot
          dependencies: [M2-B]
        - workstream: C
          item: Cloud IPAM Reconciliation
          dependencies: [M2-C]
        - workstream: D
          item: E911 Dynamic Location Mapping
          dependencies: [M2-D]
        - workstream: D
          item: IPAM-Based Location Inference
          dependencies: [M2-D, M3-C]
    - id: M4
      month: 4
