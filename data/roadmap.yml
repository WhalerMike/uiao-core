          item: PIM + Access Reviews
          dependencies: [M3-A]
        - workstream: B
          item: Segmentation Baseline Deployed
          dependencies: [M3-B]
        - workstream: B
          item: SD-WAN Telemetry Export Operational
          dependencies: [M3-B]
        - workstream: C
          item: IPAM > SD-WAN Integration
          dependencies: [M3-C]
        - workstream: C
          item: IPAM > Telemetry Integration
