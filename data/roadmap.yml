          item: ICAM Governance Package
          dependencies: [M4-A]
        - workstream: B
          item: Identity-Aware Routing Integration
          dependencies: [M4-B, M4-A]
        - workstream: C
          item: Addressing Governance Approved
          dependencies: [M4-C]
        - workstream: D
          item: TIC 3.0 Cloud Use Case Package
          dependencies: [M4-D]
    - id: M6
      month: 6
      deliverables:
        - workstream: A
          item: Identity > Telemetry Integration
          dependencies: [M5-A]
        - workstream: B
          item: INR Readiness Complete
          dependencies: [M5-B]
        - workstream: C
          item: IPAM Lifecycle Automation
          dependencies: [M5-C]
        - workstream: D
          item: TIC 3.0 Branch Use Case Package
          dependencies: [M5-D]
        - workstream: D
          item: CDM/CLAW Integration
          dependencies: [M5-D]
