# Defines telemetry sources that feed into continuous monitoring
monitoring_sources:
  - name: Microsoft Sentinel
    type: siem
    telemetry:
      - signal: identity_anomaly
        maps_to_control: AC-2
        poam_status_trigger: open
        description: Anomalous identity behavior detected
      - signal: mfa_bypass_attempt
        maps_to_control: IA-2
        poam_status_trigger: open
        description: MFA bypass or fallback detected
      - signal: network_segmentation_alert
        maps_to_control: SC-7
        poam_status_trigger: open
        description: Unexpected cross-segment traffic detected
      - signal: privileged_access_escalation
        maps_to_control: AC-6
        poam_status_trigger: open
        description: Unauthorized privilege escalation detected
