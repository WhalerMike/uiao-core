      - id: M3
        description: "E911 dynamic location mapping"
        target: "Month 3"
      - id: M4
        description: "IPAM-based location inference"
        target: "Month 3"
      - id: M5
        description: "SD-WAN telemetry export operational"
        target: "Month 4"
      - id: M6
        description: "M365 Network Telemetry integrated"
        target: "Month 4"
      - id: M7
        description: "TIC 3.0 Cloud Use Case package"
        target: "Month 5"
      - id: M8
        description: "TIC 3.0 Branch Use Case package"
        target: "Month 6"
      - id: M9
        description: "CDM/CLAW integration"
        target: "Month 6"
