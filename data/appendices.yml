BA-01:
  title: Identity Plane Policy (ISE/SGT)
  status: Approved
  owner: Security Architecture
  last_updated: '2026-03-21'
  description: Defines the Zero-Trust enforcement model by mapping authenticated Azure
    AD identities to Scalable Group Tags (SGTs).
  source_file: security/IA-ZeroTrust-Identity-v1.4.pdf
  config_snippet: "identity_mapping:\n  provider: \"Azure AD / Cisco ISE\"\n  trust_model:\
    \ \"Zero-Trust (Identity-Defined)\"\n  mappings:\n    - ad_group: \"Agency-Privileged-Admin\"\
    \n      sgt_name: \"INFRA_ADMIN\"\n      sgt_id: 2\n    - ad_group: \"Agency-Employee-Standard\"\
    \n      sgt_name: \"EMPLOYEE\"\n      sgt_id: 4\n    - ad_group: \"Agency-Contractor-External\"\
    \n      sgt_name: \"CONTRACTOR\"\n      sgt_id: 6\n"
A-04:
  title: Global Time & Directory Standard
  status: Approved
  owner: Infrastructure Operations
  last_updated: '2026-03-21'
  description: Establishes the authoritative hierarchy for time synchronization and
    name resolution.
  source_file: standards/IA-Directory-Services-v3.0.pdf
  config_snippet: "directory_services:\n  ntp_hierarchy:\n    stratum_1: \"gps.agency.gov\"\
    \n    stratum_2: [\"ntp-p1.agency.gov\", \"ntp-p2.agency.gov\"]\n  dns_zones:\n\
    \    internal: \"internal.agency.gov\"\n    external: \"agency.gov\"\n  ad_structure:\n\
    \    forest_functional_level: \"Windows Server 2022\"\n    top_level_ou: \"OU=Agency_Assets,DC=internal,DC=agency,DC=gov\"\
    \n"
BA-02:
  title: Micro-segmentation Baseline
  status: Approved
  owner: Cybersecurity Operations (SecOps)
  last_updated: '2026-03-21'
  description: Defines the default-deny posture and the SGACL matrix for granular
    traffic control between SGTs.
  source_file: security/IA-Microsegmentation-Baseline-v2.0.pdf
  config_snippet: "segmentation_policy:\n  default_posture: \"Deny All / Log All\"\
    \n  sgacl_matrix:\n    - source: \"EMPLOYEE\"\n      destination: \"INFRA_ADMIN\"\
    \n      action: \"Deny\"\n    - source: \"CONTRACTOR\"\n      destination: \"\
    EMPLOYEE\"\n      action: \"Deny\"\n    - source: \"ANY\"\n      destination:\
    \ \"SHARED_SERVICES\"\n      action: \"Permit (DNS, NTP, HTTPs)\"\n"
