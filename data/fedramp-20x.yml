fedramp_20x_config:
  authorization_level: "Moderate"
  framework_version: "2026.1 (Consolidated Rules)"
  compliance_strategy: "OSCAL-based Telemetry Validation"
  submission_format: "OSCAL 1.1.0"
  security_inbox: "automated-triage@agency.gov"
  ksi_dashboard_status: "Operational"
  oscal_readiness: "High"
  mTLS_enforcement: "Global"
  core_mappings:
    - concept: "Conversation as Atomic Unit"
      nist_rev5_control: "AC-4"
      ksi_category: "KSI-CNA"
      evidence_source: "Cisco Catalyst SD-WAN Flow Telemetry"
    - concept: "Identity as Root Namespace"
      nist_rev5_control: "IA-2 / AC-2"
      ksi_category: "KSI-IAM"
      evidence_source: "Microsoft Entra ID / CyberArk Logs"
    - concept: "Deterministic Addressing"
      nist_rev5_control: "CM-8 / AC-4"
      ksi_category: "KSI-PIY"
      evidence_source: "Infoblox BloxOne DDI API"
    - concept: "Cert-Anchored Overlay"
      nist_rev5_control: "SC-8 / IA-5"
      ksi_category: "KSI-SVC"
      evidence_source: "Cisco Catalyst SD-WAN mTLS Configuration"
    - concept: "Telemetry as Control"
      nist_rev5_control: "CA-7 / SI-4"
      ksi_category: "KSI-MLA"
      evidence_source: "Microsoft INR Telemetry Feed"
    - concept: "Embedded Governance"
      nist_rev5_control: "CM-2"
      ksi_category: "KSI-CMT"
      evidence_source: "GitHub Repository YAML Baseline"
    - concept: "Public Service First"
      nist_rev5_control: "PT-2"
      ksi_category: "KSI-CED"
      evidence_source: "Identity and Overlay Layer Data Minimization"
  audit_anchors:
    - pillar: "Identity"
      method: "Phishing-Resistant MFA (FIDO2/PIV)"
      validator: "Microsoft Entra ID"
    - pillar: "Addressing"
      method: "Deterministic IPAM"
      validator: "Infoblox BloxOne API"
    - pillar: "Overlay"
      method: "Encrypted mTLS Service Chain"
      validator: "Cisco Catalyst + Palo Alto"
  mandatory_2026_requirements:
    - id: "NTC-0003"
      name: "Automated Security Inbox"
      status: "Required"
      deadline: "2026-01-05"
    - id: "RFC-0024"
      name: "OSCAL Machine-Readability"
      status: "Required"
      deadline: "2026-09-30"
    - id: "M-24-15"
      name: "Phishing-Resistant MFA"
      status: "Required"
      deadline: "2026-09-30"
