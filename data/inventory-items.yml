# System inventory items derived from core stack components
# Each item links to a control plane component via implemented_components
inventory_items:
  - id: inv-entra-id
    asset_type: software
    description: Microsoft Entra ID - Identity Provider
    responsible_party: agency-admin
    implemented_components:
      - component-identity
    props:
      - name: vendor
        value: Microsoft
      - name: asset-category
        value: identity-management

  - id: inv-sentinel
    asset_type: software
    description: Microsoft Sentinel - SIEM Platform
    responsible_party: agency-soc
    implemented_components:
      - component-telemetry
    props:
      - name: vendor
        value: Microsoft
      - name: asset-category
        value: security-monitoring

  - id: inv-cisco-sdwan
    asset_type: software
    description: Cisco SD-WAN - Network Segmentation
    responsible_party: agency-network
    implemented_components:
      - component-network
    props:
      - name: vendor
        value: Cisco
      - name: asset-category
        value: network-infrastructure

  - id: inv-infoblox-ddi
    asset_type: software
    description: InfoBlox DDI - DNS/DHCP/IPAM
    responsible_party: agency-network
    implemented_components:
      - component-addressing
    props:
      - name: vendor
        value: InfoBlox
      - name: asset-category
        value: network-services
