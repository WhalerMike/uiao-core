nist_800_53_crosswalk:
  - component: "Microsoft Intune"
    pillar: "U (Identity)"
    controls:
      - id: "AC-19"
        name: "Access Control for Mobile Devices"
        implementation: "Enforces device health/encryption before issuing UIAO Identity Certificates."
      - id: "CM-8"
        name: "System Component Inventory"
        implementation: "Automated real-time hardware/software inventory for all UIAO-joined endpoints."
  - component: "ServiceNow"
    pillar: "Governance"
    controls:
      - id: "CA-7"
        name: "Continuous Monitoring"
        implementation: "Centralized hub for SCuBA and GitHub Action telemetry; triggers automated drift alerts."
      - id: "IR-4"
        name: "Incident Handling"
        implementation: "Automated ticket creation for Cisco SD-WAN overlay policy violations or unauthorized IP attempts."
  - component: "Cisco Catalyst SD-WAN"
    pillar: "O (Overlay)"
    controls:
      - id: "AC-4"
        name: "Information Flow Enforcement"
        implementation: "Verified Identity (U) and Deterministic IP (A) used to gate all overlay fabric entry."
      - id: "SC-8"
        name: "Transmission Confidentiality and Integrity"
        implementation: "mTLS-secured overlay tunnels anchored to Federal Root CA certificate chain."
