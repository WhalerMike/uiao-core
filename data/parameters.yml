# UIAO Parameters - OSCAL-aligned system configuration parameters
# Maps to FedRAMP Moderate / 20x Phase 2 control requirements
# Referenced by: canon-spec.yml, control-planes.yml, fedramp-20x.yml

parameters:
  identity:
    - id: "PARAM-IAM-001"
      name: "MFA Enforcement"
      nist_control: "IA-2"
      value: "Required for all privileged and non-privileged users"
      method: "Phishing-resistant (FIDO2 / PIV / CAC)"
      evidence_source: "Microsoft Entra ID Conditional Access Policy"

    - id: "PARAM-IAM-002"
      name: "Session Timeout - Privileged"
      nist_control: "AC-12"
      value: "15 minutes"
      scope: "CyberArk PSM / PTA sessions"
      evidence_source: "CyberArk Vault Configuration Export"

    - id: "PARAM-IAM-003"
      name: "Session Timeout - Standard"
      nist_control: "AC-12"
      value: "30 minutes"
      scope: "Entra ID token lifetime policy"
      evidence_source: "Microsoft Entra ID Token Configuration"

    - id: "PARAM-IAM-004"
      name: "Password Complexity"
      nist_control: "IA-5(1)"
      value: "Minimum 16 characters, complexity enforced"
      scope: "All human accounts"
      evidence_source: "Entra ID Authentication Methods Policy"

    - id: "PARAM-IAM-005"
      name: "Account Lockout Threshold"
      nist_control: "AC-7"
      value: "5 consecutive failed attempts"
      lockout_duration: "30 minutes or admin unlock"
      evidence_source: "Entra ID Smart Lockout Configuration"

  addressing:
    - id: "PARAM-ADDR-001"
      name: "IPAM Deterministic Assignment"
      nist_control: "CM-8"
      value: "All endpoints registered in Infoblox DDI"
      scope: "Enterprise network segments"
      evidence_source: "Infoblox BloxOne DDI API"

    - id: "PARAM-ADDR-002"
      name: "DNS Resolution Logging"
      nist_control: "AU-3 / SI-4"
      value: "All DNS queries logged with source IP and timestamp"
      retention: "365 days minimum"
      evidence_source: "Infoblox DNS Query Log Export"

  overlay:
    - id: "PARAM-OVL-001"
      name: "mTLS Enforcement"
      nist_control: "SC-8 / IA-5"
      value: "Required on all inter-segment traffic"
      scope: "Cisco Catalyst SD-WAN fabric"
      evidence_source: "Catalyst SD-WAN mTLS Policy Configuration"

    - id: "PARAM-OVL-002"
      name: "Network Segmentation"
      nist_control: "SC-7 / AC-4"
      value: "Micro-segmentation via SD-WAN policy with deny-by-default"
      scope: "All VPN and branch connections"
      evidence_source: "Cisco Catalyst SD-WAN Security Policy"

  telemetry:
    - id: "PARAM-TEL-001"
      name: "Audit Log Retention"
      nist_control: "AU-11"
      value: "365 days online, 3 years archived"
      scope: "All SIEM-ingested log sources"
      evidence_source: "Microsoft Sentinel Retention Policy"

    - id: "PARAM-TEL-002"
      name: "Continuous Monitoring Interval"
      nist_control: "CA-7"
      value: "Real-time for critical, 5-minute polling for standard"
      scope: "INR telemetry feed, Sentinel analytics rules"
      evidence_source: "Microsoft INR Telemetry Configuration"

    - id: "PARAM-TEL-003"
      name: "Incident Response Time"
      nist_control: "IR-4"
      value: "Critical: 1 hour, High: 4 hours, Medium: 24 hours"
      scope: "SOC triage workflow"
      evidence_source: "Sentinel Automation Playbook SLA"

  governance:
    - id: "PARAM-GOV-001"
      name: "Configuration Baseline Scan"
      nist_control: "CM-6"
      value: "Weekly automated scan against approved baseline"
      scope: "All managed endpoints and servers"
      evidence_source: "Microsoft Intune Compliance Policy"

    - id: "PARAM-GOV-002"
      name: "Vulnerability Scan Frequency"
      nist_control: "RA-5"
      value: "Authenticated scan every 72 hours"
      scope: "All internet-facing and internal assets"
      evidence_source: "Tenable / Defender Vulnerability Management"

    - id: "PARAM-GOV-003"
      name: "Plan of Action & Milestones Review"
      nist_control: "PM-4"
      value: "Monthly review cycle with 3PAO validation"
      scope: "All open POA&M items"
      evidence_source: "OSCAL POA&M Export"
