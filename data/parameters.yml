# UIAO Parameters - OSCAL-aligned system configuration parameters
# Maps to FedRAMP Moderate / 20x Phase 2 control requirements
# Referenced by: canon-spec.yml, control-planes.yml, fedramp-20x.yml

parameters:
  identity:
    - id: "PARAM-IAM-001"
      name: "MFA Enforcement"
      nist_control: "IA-2"
      value: "Required for all privileged and non-privileged users"
      method: "Phishing-resistant (FIDO2 / PIV / CAC)"
      evidence_source: "Microsoft Entra ID Conditional Access Policy"

    - id: "PARAM-IAM-002"
      name: "Session Timeout - Privileged"
      nist_control: "AC-12"
      value: "15 minutes"
      scope: "CyberArk PSM / PTA sessions"
      evidence_source: "CyberArk Vault Configuration Export"

    - id: "PARAM-IAM-003"
      name: "Session Timeout - Standard"
      nist_control: "AC-12"
      value: "30 minutes"
      scope: "Entra ID token lifetime policy"
      evidence_source: "Microsoft Entra ID Token Configuration"

    - id: "PARAM-IAM-004"
      name: "Password Complexity"
      nist_control: "IA-5(1)"
      value: "Minimum 16 characters, complexity enforced"
      scope: "All human accounts"
      evidence_source: "Entra ID Authentication Methods Policy"

    - id: "PARAM-IAM-005"
      name: "Account Lockout Threshold"
      nist_control: "AC-7"
      value: "5 consecutive failed attempts"
      lockout_duration: "30 minutes or admin unlock"
      evidence_source: "Entra ID Smart Lockout Configuration"

  addressing:
    - id: "PARAM-ADDR-001"
      name: "IPAM Deterministic Assignment"
      nist_control: "CM-8"
      value: "All endpoints registered in Infoblox DDI"
      scope: "Enterprise network segments"
      evidence_source: "Infoblox BloxOne DDI API"

    - id: "PARAM-ADDR-002"
      name: "DNS Resolution Logging"
      nist_control: "AU-3 / SI-4"
      value: "All DNS queries logged with source IP and timestamp"
      retention: "365 days minimum"
      evidence_source: "Infoblox DNS Query Log Export"

  overlay:
    - id: "PARAM-OVL-001"
      name: "mTLS Enforcement"
      nist_control: "SC-8 / IA-5"
      value: "Required on all inter-segment traffic"
      scope: "Cisco Catalyst SD-WAN fabric"
      evidence_source: "Catalyst SD-WAN mTLS Policy Configuration"

    - id: "PARAM-OVL-002"
      name: "Network Segmentation"
      nist_control: "SC-7 / AC-4"
      value: "Micro-segmentation via SD-WAN policy with deny-by-default"
      scope: "All VPN and branch connections"
      evidence_source: "Cisco Catalyst SD-WAN Security Policy"

  telemetry:
    - id: "PARAM-TEL-001"
      name: "Audit Log Retention"
      nist_control: "AU-11"
      value: "365 days online, 3 years archived"
      scope: "Microsoft Sentinel (GSA OneGov Tier - Primary AU-11) and Splunk Enterprise (Operational Forensics - Sub-Tier)"
      evidence_source: "Microsoft Sentinel Workspace Retention Policy (GSA OneGov Tier)"
      note: "Microsoft Sentinel (GSA OneGov Tier) is the primary AU-11 authority. Splunk provides 90-day operational forensics as Sub-Tier per PARAM-SPL-002."

    - id: "PARAM-TEL-002"
      name: "Continuous Monitoring Interval"
      nist_control: "CA-7"
      value: "Real-time for critical, 5-minute polling for standard"
      scope: "INR telemetry feed, Sentinel analytics rules"
      evidence_source: "Microsoft INR Telemetry Configuration"

    - id: "PARAM-TEL-003"
      name: "Incident Response Time"
      nist_control: "IR-4"
      value: "Critical: 1 hour, High: 4 hours, Medium: 24 hours"
      scope: "SOC triage workflow"
      evidence_source: "Sentinel Automation Playbook SLA"

  governance:
    - id: "PARAM-GOV-001"
      name: "Configuration Baseline Scan"
      nist_control: "CM-6"
      value: "Weekly automated scan against approved baseline"
      scope: "All managed endpoints and servers"
      evidence_source: "Microsoft Intune Compliance Policy"

    - id: "PARAM-GOV-002"
      name: "Vulnerability Scan Frequency"
      nist_control: "RA-5"
      value: "Authenticated scan every 72 hours"
      scope: "All internet-facing and internal assets"
      evidence_source: "ServiceNow Vulnerability Response (via Tenable scan import)"
      note: "Tenable scans -> imports into ServiceNow Vulnerability Response -> ServiceNow tracks remediation. Tenable is the scanning authority; ServiceNow VR is the remediation tracker."
            evidence_path: "api/now/table/sn_vul_entry"

    - id: "PARAM-GOV-003"
      name: "Plan of Action & Milestones Review"
      nist_control: "PM-4"
      value: "Monthly review cycle with 3PAO validation"
      scope: "All open POA&M items"
      evidence_source: "ServiceNow IRM POA&M Export (authoritative for PM-4)"
      note: "ServiceNow Xanadu IRM is the authoritative PM-4 platform. Replaces legacy manual OSCAL exports. POA&M artifacts now auto-generated from ServiceNow IRM."

  # --- Vendor-Specific: Splunk ---
  splunk:
    - id: "PARAM-SPL-001"
      name: "Log Ingestion - Splunk Enterprise"
      nist_control: "AU-3 / AU-6"
      value: "All security-relevant log sources forwarded to Splunk indexers"
      scope: "Splunk Enterprise / Splunk Cloud"
      evidence_source: "Splunk Inputs.conf / HEC Configuration"

    - id: "PARAM-SPL-002"
      name: "Splunk Search Head Retention"
      nist_control: "AU-11"
      value: "90 days searchable"
      scope: "All Splunk indexes"
      evidence_source: "Splunk Indexes.conf Retention Policy"

  # --- Vendor-Specific: CrowdStrike ---
  crowdstrike:
    - id: "PARAM-CS-001"
      name: "Endpoint Detection - CrowdStrike Falcon"
      nist_control: "SI-4 / IR-4"
      value: "Real-time EDR on all managed endpoints"
      scope: "CrowdStrike Falcon Sensor deployment"
      evidence_source: "CrowdStrike Falcon Console Sensor Policy"

    - id: "PARAM-CS-002"
      name: "CrowdStrike Prevention Policy"
      nist_control: "SI-3 / SC-7"
      value: "Block mode enabled for malware, exploits, and lateral movement"
      scope: "All Falcon-managed hosts"
      evidence_source: "CrowdStrike Falcon Prevention Policy Export"

  # --- Vendor-Specific: CyberArk (PAM) ---
  pam:
    - id: "PARAM-PAM-001"
      name: "Privileged Session Management"
      nist_control: "AC-6 / AC-17"
      value: "All privileged sessions brokered through CyberArk PSM with full recording"
      scope: "CyberArk Privilege Cloud / PAS"
      evidence_source: "CyberArk Vault Configuration Export"

    - id: "PARAM-PAM-002"
      name: "Credential Rotation"
      nist_control: "IA-5"
      value: "Automated rotation every 30 days for service accounts, immediate on check-in for interactive"
      scope: "CyberArk Central Policy Manager (CPM)"
      evidence_source: "CyberArk CPM Rotation Logs"

    - id: "PARAM-PAM-003"
      name: "Privileged Threat Analytics"
      nist_control: "SI-4 / AU-6"
      value: "Real-time behavioral analytics on all vaulted account activity"
      scope: "CyberArk PTA"
      evidence_source: "CyberArk PTA Alert Feed to Splunk / Sentinel"

  # --- Vendor-Specific: ServiceNow Xanadu (GRC) ---
  grc:
    - id: "PARAM-GRC-001"
      name: "GRC Platform - Continuous Authorization"
      nist_control: "PM-4 / CA-2"
      value: "Continuous ATO monitoring with automated evidence collection"
      scope: "ServiceNow Xanadu IRM module"
      evidence_source: "ServiceNow GRC Continuous Authorization Dashboard"

    - id: "PARAM-GRC-002"
      name: "POA&M Lifecycle Management"
      nist_control: "PM-4"
      value: "Automated POA&M tracking with milestone validation and 3PAO integration"
      scope: "ServiceNow Xanadu IRM"
      evidence_source: "ServiceNow IRM POA&M Export API"

    - id: "PARAM-GRC-003"
      name: "Vendor Risk Management"
      nist_control: "SA-9"
      value: "Third-party vendor risk assessments with continuous monitoring"
      scope: "ServiceNow Xanadu VRM module"
      evidence_source: "ServiceNow VRM Risk Register"

  # --- Vendor-Specific: Palo Alto Networks (NGFW) ---
  paloalto:
    - id: "PARAM-PA-001"
      name: "NGFW Boundary Protection"
      nist_control: "SC-7"
      value: "Deny-by-default zone-based firewall policy on all perimeter interfaces"
      scope: "Palo Alto NGFW managed by Panorama"
      evidence_source: "Palo Alto Panorama Security Policy Export"

    - id: "PARAM-PA-002"
      name: "Threat Prevention (IPS)"
      nist_control: "SI-3 / SI-4"
      value: "Inline threat prevention with IPS, anti-malware, and WildFire sandbox"
      scope: "All Palo Alto NGFW managed interfaces"
      evidence_source: "Palo Alto Threat Prevention Profile Configuration"

    - id: "PARAM-PA-003"
      name: "SSL/TLS Decryption Policy"
      nist_control: "SC-8"
      value: "SSL forward proxy decryption on all outbound traffic except exempted categories"
      scope: "Palo Alto NGFW decryption policy"
      evidence_source: "Palo Alto Decryption Policy and Certificate Profile Export"
