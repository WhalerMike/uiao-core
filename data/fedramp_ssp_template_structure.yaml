# FedRAMP Rev 5 SSP Template Structure
# Based on the official FedRAMP System Security Plan (SSP) Template - Revision 5
# Sections 1-12 + Appendix A (Moderate Baseline)
# Maps every required section to its OSCAL 1.0.4 field path.

version: "rev5"
oscal_version: "1.0.4"
impact_level: "moderate"
fedramp_rev: "5"

# FedRAMP-required profile (import-profile href)
profile_href: "https://raw.githubusercontent.com/GSA/fedramp-automation/refs/heads/develop/src/content/rev5/baselines/json/FedRAMP_rev5_MODERATE-baseline_profile.json"

# -------------------------------------------------------------------
# Required metadata roles (FedRAMP SSP Sections 3-6)
# -------------------------------------------------------------------
required_roles:
  - id: "system-owner"
    title: "System Owner"
  - id: "authorizing-official"
    title: "Authorizing Official"
  - id: "authorizing-official-poc"
    title: "Authorizing Official POC"
  - id: "system-poc-management"
    title: "System POC - Management"
  - id: "system-poc-technical"
    title: "System POC - Technical"
  - id: "system-poc-other"
    title: "System POC - Other"
  - id: "information-system-security-officer"
    title: "Information System Security Officer (ISSO)"
  - id: "senior-agency-information-security-officer"
    title: "Senior Agency Information Security Officer"
  - id: "prepared-by"
    title: "Prepared By"
  - id: "prepared-for"
    title: "Prepared For"
  - id: "admin"
    title: "System Administrator"
  - id: "agency-admin"
    title: "Agency Administrator"
  - id: "agency-soc"
    title: "Agency Security Operations Center"
  - id: "agency-network"
    title: "Agency Network Administrator"

# -------------------------------------------------------------------
# Required metadata props (fedramp-version, impact-level, etc.)
# -------------------------------------------------------------------
required_metadata_props:
  - name: "fedramp-version"
    value: "rev5"
    ns: "https://fedramp.gov/ns/oscal"
  - name: "impact-level"
    value: "moderate"
    ns: "https://fedramp.gov/ns/oscal"
  - name: "authorization-type"
    value: "fedramp-agency"
    ns: "https://fedramp.gov/ns/oscal"
  - name: "publication-date"
    value: "PLACEHOLDER_DATE"  # resolved at generation time
    ns: "https://fedramp.gov/ns/oscal"
  - name: "markup-type"
    value: "json"
    ns: "https://fedramp.gov/ns/oscal"

# -------------------------------------------------------------------
# Required system-characteristics props (cloud model, deployment)
# -------------------------------------------------------------------
required_system_props:
  - name: "cloud-service-model"
    value: "saas"
    ns: "https://fedramp.gov/ns/oscal"
  - name: "cloud-deployment-model"
    value: "government-only-community"
    ns: "https://fedramp.gov/ns/oscal"

# -------------------------------------------------------------------
# SSP Sections 1-12
# -------------------------------------------------------------------
sections:
  - number: "1"
    title: "Information System Name and Title"
    description: >
      Identifies the official name, abbreviation, and unique identifier
      of the information system being authorized.
    oscal_path: "system-security-plan.system-characteristics"
    required_fields:
      - system-ids
      - system-name
      - system-name-short
      - description

  - number: "2"
    title: "Information System Categorization"
    description: >
      Documents the FIPS 199 security categorization of the system,
      including information types and impact levels for confidentiality,
      integrity, and availability.
    oscal_path: "system-security-plan.system-characteristics"
    required_fields:
      - system-information
      - security-impact-level
    fips199_impact_levels:
      - fips-199-low
      - fips-199-moderate
      - fips-199-high

  - number: "3"
    title: "Information System Owner"
    description: >
      Identifies the individual or organization responsible for the
      overall procurement, development, integration, modification,
      operation, maintenance, and retirement of the information system.
    oscal_path: "system-security-plan.metadata"
    required_roles:
      - system-owner
    required_party_types:
      - person

  - number: "4"
    title: "Authorizing Official"
    description: >
      Identifies the senior Federal official or executive with the
      authority to formally assume responsibility for operating an
      information system at an acceptable level of risk.
    oscal_path: "system-security-plan.metadata"
    required_roles:
      - authorizing-official

  - number: "5"
    title: "Other Designated Contacts"
    description: >
      Identifies other points of contact including management,
      technical, and other POCs for the information system.
    oscal_path: "system-security-plan.metadata"
    required_roles:
      - system-poc-management
      - system-poc-technical
      - system-poc-other
      - authorizing-official-poc

  - number: "6"
    title: "Assignment of Security Responsibility"
    description: >
      Identifies the Information System Security Officer (ISSO) and
      the Senior Agency Information Security Officer (SAISO).
    oscal_path: "system-security-plan.metadata"
    required_roles:
      - information-system-security-officer
      - senior-agency-information-security-officer

  - number: "7"
    title: "Information System Operational Status"
    description: >
      Describes the current operational status of the information system
      (operational, under-development, under-major-modification, or other).
    oscal_path: "system-security-plan.system-characteristics.status"
    required_fields:
      - state
    valid_states:
      - operational
      - under-development
      - under-major-modification
      - disposition
      - other

  - number: "8"
    title: "Information System Type"
    description: >
      Documents the cloud deployment model and service model for the system.
      FedRAMP requires cloud-service-model and cloud-deployment-model props.
    oscal_path: "system-security-plan.system-characteristics"
    required_props:
      - cloud-service-model
      - cloud-deployment-model
    valid_service_models:
      - saas
      - paas
      - iaas
      - other
    valid_deployment_models:
      - public
      - private
      - government-only-community
      - hybrid

  - number: "9"
    title: "General System Description"
    description: >
      Provides a general description of the system purpose and
      boundary including the authorization boundary description
      and network diagram references.
    oscal_path: "system-security-plan.system-characteristics"
    required_fields:
      - description
      - authorization-boundary

  - number: "10"
    title: "System Environment and Special Considerations"
    description: >
      Describes the network architecture, data flows, and any special
      considerations for the operating environment.
    oscal_path: "system-security-plan.system-characteristics"
    required_fields:
      - network-architecture
      - data-flow

  - number: "11"
    title: "System Services and Interconnections"
    description: >
      Lists all system components, external services, and interconnections
      including leveraged FedRAMP-authorized services.
    oscal_path: "system-security-plan.system-implementation"
    required_fields:
      - components
      - users

  - number: "12"
    title: "Laws, Regulations, Standards, and Guidance Referenced by the SSP"
    description: >
      Lists all applicable laws, regulations, standards, and guidance
      documents that apply to the information system.
    oscal_path: "system-security-plan.back-matter"
    required_fields:
      - resources

# -------------------------------------------------------------------
# Appendix A: FedRAMP Moderate Security Controls
# -------------------------------------------------------------------
appendix_a:
  title: "FedRAMP Moderate Security Controls"
  description: >
    Documents the implementation status and descriptions for all
    security controls in the FedRAMP Moderate baseline (NIST SP 800-53 Rev 5).
  baseline: "moderate"
  oscal_path: "system-security-plan.control-implementation"
  required_fields:
    - description
    - implemented-requirements
    - set-parameters

# -------------------------------------------------------------------
# Section 12: Standard laws and regulations referenced by FedRAMP SSPs
# -------------------------------------------------------------------
laws_and_regulations:
  - title: "Federal Information Security Modernization Act (FISMA)"
    href: "https://www.cisa.gov/federal-information-security-modernization-act"
    resource_id: "resource-fisma"

  - title: "NIST SP 800-53 Rev 5 - Security and Privacy Controls for Information Systems and Organizations"
    href: "https://doi.org/10.6028/NIST.SP.800-53r5"
    resource_id: "resource-nist-800-53r5"

  - title: "NIST SP 800-60 Vol 1 Rev 1 - Guide for Mapping Types of Information and Information Systems to Security Categories"
    href: "https://csrc.nist.gov/publications/detail/sp/800-60/vol-1-rev-1/final"
    resource_id: "resource-nist-800-60"

  - title: "FedRAMP Authorization Act (44 U.S.C. § 3607)"
    href: "https://www.fedramp.gov/assets/resources/documents/Agency_Authorization_Playbook.pdf"
    resource_id: "resource-fedramp-auth-act"

  - title: "FIPS PUB 199 - Standards for Security Categorization of Federal Information and Information Systems"
    href: "https://csrc.nist.gov/publications/detail/fips/199/final"
    resource_id: "resource-fips-199"

  - title: "FIPS PUB 200 - Minimum Security Requirements for Federal Information and Information Systems"
    href: "https://csrc.nist.gov/publications/detail/fips/200/final"
    resource_id: "resource-fips-200"

  - title: "OMB Circular A-130 - Managing Information as a Strategic Resource"
    href: "https://www.whitehouse.gov/wp-content/uploads/legacy_drupal_files/omb/circulars/A130/a130revised.pdf"
    resource_id: "resource-omb-a-130"

  - title: "Executive Order 14028 - Improving the Nation's Cybersecurity"
    href: "https://www.whitehouse.gov/briefing-room/presidential-actions/2021/05/12/executive-order-on-improving-the-nations-cybersecurity/"
    resource_id: "resource-eo-14028"

  - title: "TIC 3.0 Core Guidance Documents"
    href: "https://www.cisa.gov/resources-tools/resources/trusted-internet-connections-30-core-guidance-documents"
    resource_id: "resource-tic-3.0"
