# POA&M Rule Definitions
# Each rule maps a condition to a POA&M finding.
# condition_type: missing_control | low_maturity | missing_evidence | custom
# risk_rating: Critical | High | Moderate | Low

rules:
  - id: RULE-001
    name: Low CISA maturity — Initial
    description: Category has CISA maturity level of 'Initial', indicating significant gaps.
    condition_type: low_maturity
    condition_value: Initial
    risk_rating: High
    recommendation: Develop a formal implementation plan and assign an owner.
    responsible_party: ISSO

  - id: RULE-002
    name: Low CISA maturity — Developing
    description: Category has CISA maturity level of 'Developing', indicating partial gaps.
    condition_type: low_maturity
    condition_value: Developing
    risk_rating: Moderate
    recommendation: Accelerate implementation and document evidence.
    responsible_party: ISSO

  - id: RULE-003
    name: Missing KSI evidence
    description: A Key Security Indicator has no documented evidence source.
    condition_type: missing_evidence
    condition_value: ""
    risk_rating: Moderate
    recommendation: Document the evidence source in the KSI mapping and attach supporting artifacts.
    responsible_party: ISSM

  - id: RULE-004
    name: Missing multi-factor authentication control
    description: The system has no MFA control mapped or documented.
    condition_type: missing_control
    condition_value: IA-5(1)
    risk_rating: Critical
    recommendation: Implement phishing-resistant MFA for all privileged accounts immediately.
    responsible_party: SCA

  - id: RULE-005
    name: Missing continuous monitoring (ISCM) control
    description: Continuous monitoring strategy (CA-7) not documented.
    condition_type: missing_control
    condition_value: CA-7
    risk_rating: High
    recommendation: Define and implement a continuous monitoring strategy per FedRAMP requirements.
    responsible_party: ISSO

  - id: RULE-006
    name: Missing incident response plan
    description: Incident response procedures (IR-8) not documented or mapped.
    condition_type: missing_control
    condition_value: IR-8
    risk_rating: High
    recommendation: Develop and test an incident response plan meeting NIST SP 800-61 requirements.
    responsible_party: ISSO

  - id: RULE-007
    name: Missing supply chain risk management
    description: Supply chain risk management (SR-2) not addressed.
    condition_type: missing_control
    condition_value: SR-2
    risk_rating: Moderate
    recommendation: Establish a supply chain risk management plan and vendor assessment process.
    responsible_party: ISSM

  - id: RULE-008
    name: Missing vulnerability scanning evidence
    description: No vulnerability scanning results present for assessment period.
    condition_type: missing_evidence
    condition_value: vulnerability_scan
    risk_rating: High
    recommendation: Perform authenticated vulnerability scans and document results as POA&M evidence.
    responsible_party: SCA
