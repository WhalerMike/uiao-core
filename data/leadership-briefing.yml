# UIAO Leadership Briefing - Structured Slide Deck Data
# Source: 01_Canon/08_Leadership_Briefing.md

briefing:
  title: "Leadership Briefing - Unified Modernization Program"
  format: "Markdown slide deck"
  audience:
    - CIO
    - CISO
    - CTO
    - PMO
    - Network/Identity Leadership
  status: "Ready for executive review"

slides:
  - id: 1
    title: "Program Overview"
    content:
      heading: "Unified Modernization Program"
      description: >-
        A coordinated modernization effort across five domains
      domains:
        - "Identity (Entra ID + ICAM)"
        - "Network (Cisco Catalyst SD-WAN)"
        - "Addressing (InfoBlox IPAM)"
        - "Telemetry + Location Services"
        - "TIC 3.0 Cloud + Branch"
      strategic_goal: >-
        Transform the agency into a cloud-optimized, identity-driven,
        telemetry-informed, Zero Trust-aligned, TIC 3.0-compliant
        federal enterprise

  - id: 2
    title: "Why Modernization Is Required"
    content:
      current_challenges:
        - "TIC 2.0 hairpin bottlenecks"
        - "AD-centric identity with limited governance"
        - "Fragmented IPAM across cloud and on-prem"
        - "Limited telemetry visibility"
        - "No INR or E911 readiness"
        - "Inconsistent Zero Trust enforcement"
      mission_impact:
        - "Poor M365 performance"
        - "Increased cyber risk"
        - "Compliance gaps"
        - "Operational inefficiencies"

  - id: 3
    title: "Program Vision"
    content:
      end_state: >-
        A unified architecture where Identity is the control plane,
        SD-WAN is the routing control plane, IPAM is the addressing
        truth source, Telemetry is the authoritative signal, and
        TIC 3.0 is the compliance framework
      outcomes:
        - "Faster cloud access"
        - "Stronger security"
        - "Accurate location services"
        - "Real-time routing decisions"
        - "Full Zero Trust alignment"

  - id: 4
    title: "Modernization Workstreams"
    content:
      workstreams:
        - id: A
          name: "Identity (Entra ID + ICAM)"
          tasks:
            - "Conditional Access baseline"
            - "MFA/SSPR modernization"
            - "PIM + Access Reviews"
            - "ICAM governance"
        - id: B
          name: "Network (Cisco Catalyst SD-WAN)"
          tasks:
            - "DIA rollout"
            - "Cloud OnRamp for M365"
            - "Segmentation"
            - "INR readiness"
        - id: C
          name: "Addressing (InfoBlox IPAM)"
          tasks:
            - "Authoritative IPAM"
            - "DNS/DHCP modernization"
            - "Cloud IPAM reconciliation"
            - "Location inference"
        - id: D
          name: "Telemetry + TIC 3.0"
          tasks:
            - "Unified telemetry pipeline"
            - "E911 + location services"
            - "TIC 3.0 Cloud + Branch"
            - "CDM/CLAW integration"

  - id: 5
    title: "Unified Architecture (High-Level)"
    content:
      control_planes:
        - "Identity: Entra ID + ICAM"
        - "Network: Cisco Catalyst SD-WAN"
        - "Addressing: InfoBlox IPAM"
        - "Telemetry: M365 + SD-WAN + IPAM + Endpoint"
        - "Security: TIC 3.0 + Zero Trust"
      integration_points:
        - "Identity > SD-WAN (INR)"
        - "IPAM > Telemetry (location inference)"
        - "Telemetry > Routing decisions"
        - "Telemetry > Zero Trust enforcement"

  - id: 6
    title: "TIC 3.0 Alignment"
    content:
      cloud_use_case:
        - "Cloud OnRamp"
        - "Identity-driven access"
        - "Telemetry-based visibility"
        - "FedRAMP-aligned controls"
      branch_use_case:
        - "DIA"
        - "SD-WAN segmentation"
        - "Local enforcement"
        - "Telemetry export"
      compliance_outcomes:
        - "Eliminates TIC 2.0 hairpins"
        - "Enables cloud-first routing"
        - "Meets federal visibility requirements"

  - id: 7
    title: "Program Timeline (6 Months)"
    content:
      months:
        - month: 1
          milestones: "Entra ID baseline, SD-WAN HLD, IPAM HLD, Telemetry HLD"
        - month: 2
          milestones: "CA baseline, SD-WAN LLD, DNS/DHCP plan, Location plan"
        - month: 3
          milestones: "MFA/SSPR, DIA pilot, Cloud OnRamp pilot, Cloud IPAM reconciliation"
        - month: 4
          milestones: "PIM, Segmentation baseline, Telemetry export, M365 telemetry"
        - month: 5
          milestones: "ICAM governance, Identity-aware routing, Address governance, TIC Cloud"
        - month: 6
          milestones: "INR readiness, IPAM automation, TIC Branch, CDM/CLAW integration"

  - id: 8
    title: "Key Risks and Mitigations"
    content:
      risks:
        - risk: "Legacy authentication"
          mitigation: "Enforce CA baseline"
        - risk: "DNS/DHCP migration errors"
          mitigation: "Phased rollout + validation"
        - risk: "Telemetry gaps"
          mitigation: "Unified pipeline + monitoring"
        - risk: "Location inference inaccuracies"
          mitigation: "IPAM + LLDP/BSSID correlation"
        - risk: "TIC 3.0 documentation delays"
          mitigation: "Early compliance workshops"

  - id: 9
    title: "Expected Benefits"
    content:
      performance:
        - "30-60% reduction in M365 latency"
        - "Faster cloud access via DIA"
      security:
        - "Zero Trust identity enforcement"
        - "Real-time telemetry-driven decisions"
        - "Accurate E911 location"
      compliance:
        - "TIC 3.0 Cloud + Branch"
        - "CDM/CLAW reporting"
      operations:
        - "Unified IPAM"
        - "Automated lifecycle"
        - "Simplified routing"

  - id: 10
    title: "Executive Decision Points"
    content:
      required_approvals:
        - "Program charter"
        - "Funding alignment"
        - "PMO intake"
        - "Vendor engagement"
      required_direction:
        - "Prioritization of DIA rollout"
        - "Enforcement of identity governance"
        - "Mandate for IPAM authority"
        - "Adoption of unified telemetry"

  - id: 11
    title: "Conclusion"
    content:
      modernizes:
        - "Identity"
        - "Network"
        - "Addressing"
        - "Telemetry"
        - "Compliance"
      delivers: >-
        A cloud-first, Zero Trust, TIC 3.0-compliant federal enterprise
