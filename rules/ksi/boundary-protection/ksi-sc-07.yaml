description: All Azure PaaS services must use Private Endpoints exclusively. Hub-Spoke network topology enforced with one Private DNS zone per service type. Azure Firewall Premium inspects all east-west and north-south traffic. No public endpoints permitted except approved WAF-fronted exceptions.
