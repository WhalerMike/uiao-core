version: "1.1"
description: "UIAO-Core KSI Schema - FedRAMP Moderate + GCC Zero Trust Extensions"

ksi_id:
  type: string
  pattern: "^KSI-[A-Z0-9-]+-\\d{2}$"
  example: "KSI-IAM-01"

title: string
category:
  type: string
  enum:
    - iam
    - boundary-protection
    - monitoring-logging
    - configuration-management
    - incident-response
    - planning-personnel
    - other

description: string
security_objective: string

related_controls:
  type: array
  items:
    type: string
    pattern: "^[A-Z]{2}-\\d+(\\(.*\\))?$"

validation_type:
  type: string
  enum: [automated, semi-automated, manual]

evidence_sources:
  type: array
  items:
    type: string
    enum: [scuba, intune, graph_api, sentinel, azure_policy, entra_id, azure_firewall, azure_waf, custom]

pass_criteria:
  type: object
  properties:
    description: string
    type:
      enum: [boolean, percentage, threshold, list_match, custom]
    threshold: number
    operator:
      enum: [equals, greater_than, less_than, contains, all_true]
    logic: string

uiao_extensions:
  type: object
  properties:
    gcc_moderate_focus: boolean
    private_endpoint_enforcement: boolean
    dns_segmentation_required: boolean
    hub_spoke_model: boolean
    video_project_isolation: boolean
    zero_trust_telemetry: boolean
    sase_global_secure_access: boolean
    custom_validation_logic: string

oscal_props:
  type: object
  properties:
    implementation_status_prop: string
    evidence_type: string

version: string
last_updated: string
enabled: boolean
tags:
  type: array
  items: string
