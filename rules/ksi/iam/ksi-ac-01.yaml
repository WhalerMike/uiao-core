ksi_id: KSI-AC-01
title: Enforce Phishing-Resistant MFA and Account Management
category: iam
description: All user and privileged account authentication must use phishing-resistant MFA. Account creation, modification, and termination must be automated and logged with full audit trail.
security_objective: Achieve continuous zero-trust identity enforcement across the GCC environment.

related_controls:
  - AC-2
  - AC-2(3)
  - AC-2(4)
  - AC-2(5)
  - AC-2(9)
  - AC-2(10)
  - IA-2
  - IA-2(1)
  - IA-2(2)
  - IA-5
  - IA-5(1)
  - IA-5(2)

validation_type: automated
evidence_sources:
  - entra_id
  - intune
  - graph_api
  - scuba

pass_criteria:
  description: "100% of non-exempt accounts must use phishing-resistant MFA. Account lifecycle events must be logged within 5 minutes."
  type: percentage
  threshold: 100
  operator: equals

uiao_extensions:
  gcc_moderate_focus: true
  private_endpoint_enforcement: true
  zero_trust_telemetry: true
  sase_global_secure_access: true

oscal_props:
  implementation_status_prop: "satisfied"
  evidence_type: "observation"

version: "1.1"
last_updated: "2026-04-04"
enabled: true
tags:
  - identity-plane
  - zero-trust
  - mfa
