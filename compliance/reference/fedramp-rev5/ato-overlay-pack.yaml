# UIAO ATO Overlay Pack - FedRAMP Rev5
# Maps UIAO capabilities to NIST 800-53 Rev5 controls
# for Authority to Operate (ATO) compliance

metadata:
  title: UIAO FedRAMP Rev5 ATO Overlay Pack
  version: 1.0.0
  baseline: FedRAMP-Moderate
  framework: NIST SP 800-53 Rev5
  last_updated: 2025-05-22
  author: UIAO Core Team
  description: |
    Defines how UIAO platform capabilities satisfy
    FedRAMP Moderate baseline controls across identity,
    access, operations, and compliance domains.

control_families:
  - family: AC
    name: Access Control
    controls:
      - id: AC-2
        title: Account Management
        uiao_capability: identity-lifecycle
        implementation_status: implemented
        description: |
          UIAO automates account provisioning, modification,
          and deprovisioning through identity lifecycle workflows.
        evidence:
          - type: automated
            source: uiao-identity-service
            artifact: audit-log-ac2
      - id: AC-3
        title: Access Enforcement
        uiao_capability: policy-engine
        implementation_status: implemented
        description: |
          UIAO policy engine enforces role-based and
          attribute-based access control decisions.
      - id: AC-6
        title: Least Privilege
        uiao_capability: rbac-manager
        implementation_status: implemented
        description: |
          UIAO enforces least privilege through role-based
          access control with periodic access reviews.
      - id: AC-17
        title: Remote Access
        uiao_capability: zero-trust-gateway
        implementation_status: partial
        description: |
          UIAO zero-trust gateway manages remote access
          with continuous authentication and authorization.

  - family: AU
    name: Audit and Accountability
    controls:
      - id: AU-2
        title: Event Logging
        uiao_capability: audit-service
        implementation_status: implemented
        description: |
          UIAO audit service captures all identity and
          access events for compliance reporting.
      - id: AU-6
        title: Audit Record Review
        uiao_capability: compliance-dashboard
        implementation_status: implemented
        description: |
          UIAO compliance dashboard provides automated
          audit record review and anomaly detection.

  - family: IA
    name: Identification and Authentication
    controls:
      - id: IA-2
        title: Identification and Authentication (Org Users)
        uiao_capability: authn-service
        implementation_status: implemented
        description: |
          UIAO authentication service supports MFA,
          PIV/CAC, and federated identity providers.
      - id: IA-5
        title: Authenticator Management
        uiao_capability: credential-manager
        implementation_status: implemented
        description: |
          UIAO credential manager handles authenticator
          lifecycle including issuance and revocation.
      - id: IA-8
        title: Identification and Authentication (Non-Org Users)
        uiao_capability: federation-broker
        implementation_status: partial
        description: |
          UIAO federation broker manages external identity
          provider integration and trust relationships.

  - family: CM
    name: Configuration Management
    controls:
      - id: CM-2
        title: Baseline Configuration
        uiao_capability: config-service
        implementation_status: implemented
        description: |
          UIAO maintains baseline configurations for all
          identity and access management components.
      - id: CM-6
        title: Configuration Settings
        uiao_capability: policy-engine
        implementation_status: implemented
        description: |
          UIAO policy engine enforces organization-defined
          configuration settings across all components.

  - family: SC
    name: System and Communications Protection
    controls:
      - id: SC-8
        title: Transmission Confidentiality and Integrity
        uiao_capability: tls-manager
        implementation_status: implemented
        description: |
          UIAO enforces TLS 1.3 for all API communications
          and inter-service data transmission.
      - id: SC-13
        title: Cryptographic Protection
        uiao_capability: crypto-service
        implementation_status: implemented
        description: |
          UIAO crypto service provides FIPS 140-2 validated
          cryptographic modules for data protection.

validation:
  automated_tests: true
  continuous_monitoring: true
  poam_integration: true
  scan_frequency: daily
