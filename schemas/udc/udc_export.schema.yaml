# UDC Export Schema v1.0
# Defines output configuration for compiled documents
---
schema_id: udc_export
schema_version: "1.0"
description: >-
  Export schema for UIAO Document Compiler (UDC).
  Defines output formats, naming conventions, and integrity controls.

export_config:
  formats:
    - format: docx
      description: Microsoft Word document
      enabled: true
      tool: python-docx

    - format: pdf
      description: Portable Document Format
      enabled: true
      tool: pandoc

    - format: pptx
      description: Microsoft PowerPoint presentation
      enabled: true
      tool: python-pptx

    - format: xlsx
      description: Microsoft Excel spreadsheet
      enabled: true
      tool: openpyxl

    - format: md
      description: Markdown document
      enabled: true
      tool: jinja2

    - format: html
      description: HTML document
      enabled: true
      tool: pandoc

  naming_convention:
    pattern: "{id}_{title}_{version}.{format}"
    sanitize: true
    lowercase: true
    replace_spaces: "-"

  export_dir: exports/

  integrity:
    hash_algorithm: sha256
    generate_manifest: true
    manifest_file: exports/manifest.json
    immutable: true
    verify_on_read: true

  artifact_upload:
    enabled: true
    retention_days: 90
    compress: true
    compression_format: zip
