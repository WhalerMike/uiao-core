# UDC Templates Schema v1.0
# Defines template binding configuration for document generation
---
schema_id: udc_templates
schema_version: "1.0"
description: >-
  Template binding schema for UIAO Document Compiler (UDC).
  Maps canon artifacts to output templates and field variables.

template_definition:
  required_fields:
    - field: template_id
      type: string
      description: Unique template identifier

    - field: template_type
      type: string
      description: Output format type
      enum:
        - docx
        - pdf
        - pptx
        - xlsx
        - md
        - html

    - field: template_file
      type: string
      description: Path to template file relative to templates/

    - field: field_mappings
      type: array
      description: Variable-to-field mapping definitions
      items:
        type: object
        properties:
          variable:
            type: string
            description: Template variable name
          source_field:
            type: string
            description: YAML source field path (dot notation)
          transform:
            type: string
            description: Optional transformation function
            enum:
              - none
              - uppercase
              - lowercase
              - date_format
              - markdown_to_html
              - list_join

  optional_fields:
    - field: description
      type: string
      description: Human-readable template description

    - field: applies_to
      type: array
      description: Document types this template serves
      items:
        type: string

    - field: page_settings
      type: object
      description: Page layout configuration
      properties:
        orientation:
          type: string
          enum: [portrait, landscape]
        margin_top:
          type: string
        margin_bottom:
          type: string
        margin_left:
          type: string
        margin_right:
          type: string

    - field: header_footer
      type: object
      description: Header and footer configuration
      properties:
        header_text:
          type: string
        footer_text:
          type: string
        include_page_numbers:
          type: boolean
