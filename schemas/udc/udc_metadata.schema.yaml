# UDC Metadata Schema v1.0
# Defines document identity fields for all UIAO canon artifacts
---
schema_id: udc_metadata
schema_version: "1.0"
description: >-
  Metadata schema for UIAO Document Compiler (UDC).
  Defines required identity fields for every canon artifact.

required_fields:
  - field: id
    type: string
    description: Unique document identifier (e.g., UIAO-SPEC-001)
    pattern: "^UIAO-[A-Z]+-[0-9]{3}$"

  - field: title
    type: string
    description: Human-readable document title

  - field: version
    type: string
    description: Semantic version (e.g., 1.0.0)
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"

  - field: status
    type: string
    description: Document lifecycle status
    enum:
      - draft
      - review
      - approved
      - published
      - deprecated

  - field: authors
    type: array
    description: List of document authors
    items:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        organization:
          type: string

  - field: canonical_path
    type: string
    description: Canonical file path within the repository

optional_fields:
  - field: created_date
    type: string
    format: date
    description: ISO 8601 creation date

  - field: modified_date
    type: string
    format: date
    description: ISO 8601 last modified date

  - field: classification
    type: string
    description: Security classification level
    enum:
      - unclassified
      - cui
      - confidential

  - field: tags
    type: array
    description: Taxonomy tags for categorization
    items:
      type: string

  - field: supersedes
    type: string
    description: ID of document this version supersedes

  - field: sha256_hash
    type: string
    description: SHA-256 hash for immutability verification
