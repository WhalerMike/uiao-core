site_name: "UIAO Document Compiler v1.0"
site_description: "Unified Identity‑Addressing‑Overlay Architecture — Leadership Canon and Modernization Documents"
site_author: "UIAO Modernization Program"
repo_name: "uiao-core"
repo_url: "https://github.com/WhalerMike/uiao-core"

nav:
  - Home: index.md
  - Leadership Briefing:
      - "UIAO Leadership Briefing v1.0": leadership_briefing_v1.0.md
  - Program Vision:
      - "Program Vision v1.0": program_vision_v1.0.md
  - Unified Architecture:
      - "Unified Architecture v1.0": unified_architecture_v1.0.md
  - TIC 3.0 Roadmap:
      - "TIC 3.0 Roadmap v1.0": tic3_roadmap_v1.0.md
  - Modernization Timeline:
      - "Modernization Timeline v1.0": modernization_timeline_v1.0.md
  - FedRAMP 22:
      - "FedRAMP 22 Summary v1.0": fedramp22_summary_v1.0.md
  - Zero Trust:
      - "Zero Trust Narrative v1.0": zero_trust_narrative_v1.0.md
  - Deep Dives:
      - "Identity Plane Deep Dive v1.0": identity_plane_deep_dive_v1.0.md
      - "Telemetry Plane Deep Dive v1.0": telemetry_plane_deep_dive_v1.0.md

theme:
  name: "material"
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - footnotes
  - def_list
  - attr_list
