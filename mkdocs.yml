site_name: Modernization Atlas (uiao-core)
site_description: Unified Architecture for Agency Infrastructure
site_author: Michael Stratton

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: black
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    logo: material/library

extra:
  version:
    provider: custom
    default: v1.0-Phase1-Foundation

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence.mermaid_2_custom_fence

plugins:
  - search
  - mermaid2

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture.md
    - Modernized vs Legacy: comparison.md
  - Appendix Canon:
    - Index (A-CZ): appendices.md
    - Scaling Model: scaling.md
  - Telemetry Control:
    - Visibility & Feedback: telemetry.md
  - Pipeline Logic:
    - Automation Workflow: logic.md
  - Project Roadmap: roadmap.md
  - Glossary: glossary.md
