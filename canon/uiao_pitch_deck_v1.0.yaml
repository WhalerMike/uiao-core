version: "1.0"
document: "UIAO Pitch Deck & Executive Summary"
classification: "CUI/FOUO"
audience:
  - CIO
  - CISO
  - CTO
  - PMO
  - Network Leadership
  - Identity Leadership
  - Executive Sponsors

pitch_deck:

  title: "Modernization Atlas - Pitch Deck & Executive Summary"
  subtitle: "Unified Identity-Addressing-Overlay Architecture for Agency Infrastructure"
  template: "pitch_deck_v1.0.md.j2"
  output: "pitch_deck_v1.0.md"

  executive_summary: >
    The Unified Identity-Addressing-Overlay Architecture (UIAO) is a
    structural modernization of how the agency authenticates, addresses,
    routes, observes, and governs every digital interaction. This pitch
    deck provides the executive-level overview of the architecture,
    compliance alignment, timeline, and business case.

  slides:
    - number: 1
      title: "Title Slide"
      content: "Program name, classification, version, audience"
    - number: 2
      title: "The Problem"
      content: "Current state challenges and compliance gaps"
    - number: 3
      title: "The Vision"
      content: "UIAO unified architecture and core pillars"
    - number: 4
      title: "Architecture Overview"
      content: "Five control planes and their functions"
    - number: 5
      title: "Identity Plane Deep Dive"
      content: "Identity as the perimeter, key capabilities"
    - number: 6
      title: "Telemetry Plane Deep Dive"
      content: "Observability as truth source, data sources"
    - number: 7
      title: "Zero Trust Alignment"
      content: "NIST 800-207 compliance mapping"
    - number: 8
      title: "Compliance Crosswalk"
      content: "TIC 3.0, FedRAMP 20x Phase 2, SCuBA, NIST 800-63 alignment"
    - number: 9
      title: "Modernization Timeline"
      content: "Phased approach with milestones"
    - number: 10
      title: "ROI & Business Case"
      content: "Expected outcomes and risk reduction"
    - number: 11
      title: "Ask & Next Steps"
      content: "Recommended actions and resources required"
    - number: 12
      title: "Visibility & Telemetry (Stack 3)"
      content: "Actionable Intelligence & Continuous Monitoring (ConMon)"
      strategy: >
        In a GCC-Moderate environment, visibility must be proactive.
        We leverage Microsoft Sentinel to correlate identity, device,
        and network signals, transforming raw telemetry into automated
        enforcement actions.
      kql_alerts:
        - name: "Privileged Leaver"
          kql: "AuditLogs | where OperationName == 'Disable user' cross-referenced with High-Value Assets"
          response: "Instant Network Kill-Switch - Signals Palo Alto & SD-WAN to revoke all active sessions"
        - name: "Compliance Drift"
          kql: "IntuneDevices | where ComplianceState == 'Noncompliant'"
          response: "Automated Isolation - Moves device to Quarantine VLAN via SD-WAN until remediated"
        - name: "Orchestrator Health"
          kql: "GitHubRepoLogs_CL | where status_s == 'failure'"
          response: "Operational Alert - Immediate notification to SecOps Teams channel for manual override"
      intelligence_loop:
        - "SENSE: Sentinel ingests logs from Entra ID, Intune, and Palo Alto"
        - "ANALYZE: KQL queries identify high-risk anomalies"
        - "ACT: Sentinel triggers Webhook to Atlas Orchestrator (GitHub Actions)"
        - "ENFORCE: Orchestrator updates Palo Alto DAG and vManage policies in real-time"
      leadership_value:
        - "Reduced MTTR: From Hours of Investigation to Seconds of Automation"
        - "Audit Transparency: Every KQL-triggered action logged in ServiceNow for FISMA reviewers"
        - "Workforce Efficiency: Analysts focus on architecture while Atlas handles routine enforcement"
