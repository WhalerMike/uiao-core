version: "1.0"
document: "Operational Handover - Modernization Atlas"
classification: "CUI/FOUO"
audience:
  - Tier 1/2 SecOps
  - Identity Engineers
  - Network Defense Team

operational_handover:

  title: "Operational Handover: Modernization Atlas (V1.0)"
  subtitle: "Secure Orchestration & Automated Enforcement SOPs"
  template: "operational_handover_v1.0.md.j2"
  output: "operational_handover_v1.0.md"

  overview: >
    This document serves as the tactical guide for the Security
    Operations Center (SOC) to maintain, monitor, and govern the
    Modernization Atlas automated loop. It ensures that while the
    system is automated, it remains under human oversight and is
    resilient to the realities of a GCC-Moderate agency environment.

  sops:
    - number: 1
      title: "Monitoring Orchestrator Health"
      checks:
        - name: "Primary Health Check (Sentinel)"
          description: "Monitor Atlas-Orchestrator-Heartbeat alert. Failure to receive success signal within 4 hours triggers P2 incident."
        - name: "GitHub Actions Dashboard"
          description: "Review WhalerMike/uiao-core Actions tab. Green = operational. Red = investigate Sync-Orchestrator run logs for API timeouts or credential failures."
        - name: "Log Verification"
          description: "Check MS Teams #Atlas-Operations channel for Sync Summary Adaptive Cards. Missing daily report indicates pipeline stall."

    - number: 2
      title: "Handling False Positives from KQL Alerts"
      steps:
        - "Validate Identity Source: Cross-check HRIS status and Entra ID accountEnabled attribute."
        - "Verify Device Compliance: If device flagged Non-compliant, check Intune portal for specific reason."
        - "Tuning the KQL: If alert repeatedly fires on valid process, add user/device ID to watchlist_atlas_exceptions list in Sentinel."

    - number: 3
      title: "Manual Override Procedures"
      procedures:
        - name: "ServiceNow Atlas_Ignore Tag"
          action: "Add Atlas_Ignore: True to CI or User Record to prevent Atlas management."
        - name: "Emergency Kill-Switch (GitHub)"
          action: "Tier 2 Engineer disables enforcement_orchestrator.yml workflow."
        - name: "Manual Restoration"
          action: "Use NetworkEnforcer script with --action remove flag or manually delete IP from Atlas_Quarantine_High_Risk DAG."

    - number: 4
      title: "Escalation Paths"
      tiers:
        - tier: "Tier 1 (SOC)"
          responsibility: "Initial Triage & Verification"
          trigger: "Any Sentinel Atlas Alert or Teams Notification failure."
        - tier: "Tier 2 (Eng)"
          responsibility: "Logic & API Troubleshooting"
          trigger: "Pipeline failures, script errors, persistent false positives."
        - tier: "Tier 3 (Lead)"
          responsibility: "Strategic Override / CISO Liaison"
          trigger: "Broad network isolation events or suspected Atlas compromise."

    - number: 5
      title: "Runbook for Failure Scenarios"
      scenarios:
        - scenario: "Credential Expiry"
          immediate_action: "Check GitHub Secrets for expired API keys."
          resolution: "Rotate keys in Vault; update GitHub Secrets."
        - scenario: "API Timeout"
          immediate_action: "Verify network connectivity to .servicenowservices.gov."
          resolution: "Check TIC/VPN outages; retry GitHub Action."
        - scenario: "Rate Limiting"
          immediate_action: "Check API usage logs."
          resolution: "Increase polling intervals."
        - scenario: "Orchestrator Crash"
          immediate_action: "Check scripts for syntax errors."
          resolution: "Review most recent Git commit; rollback if necessary."

  closing_protocol: >
    SecOps must review the Atlas Sync Report during the daily morning
    briefing. Any Failed counts in the report require an immediate
    root-cause analysis (RCA) before the next scheduled sync.
